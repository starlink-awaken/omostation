# Pre-commit hooks for omostation (Round 12 P0 + P1)
#
# Installs: pre-commit install
# Run manually: pre-commit run --all-files
#
# Hook 设计 (Round 12 P1 扩展):
#   - check-yaml:        官方 pre-commit-hooks, 校验所有 .yml/.yaml 可解析
#                        (actionlint 留给 CI 工作流, 避免本地下载二进制)
#   - omo-logs-audit:    跑 omo logs audit, 0 drift 才通过.
#                        若 .omo/_knowledge/ 下没有 .jsonl, 跳过 (新项目可零数据启动).
#   - ruff:              各项目自带 ruff (在 kairon/agora/omo 等 pyproject.toml 中配).
#
# 性能考虑: omo logs audit 是 IO-bound (读 .jsonl), 不会显著拖慢 commit.
#          check-yaml 是纯文本解析, <1s. 两者组合 < 3s per commit.
# 走 CI 周期跑的 (见 .github/workflows/ci-lint.yml):
#   - actionlint (GitHub Actions 工作流静态分析, 二进制 1.5MB, 不在 pre-commit 拉)
#   - shellcheck (scripts/*.sh, 系统包, CI 装一次)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        # Round 12 P1: 锁住所有 .yml/.yaml 可解析
        # exclude: kairon 是 submodule, 单独 lint; protocols/ 含故意宽松 YAML
        exclude: |
          (?x)^(
            projects/kairon/.*\.ya?ml
            | protocols/.*\.ya?ml
            )$
        args: ["--allow-multiple-documents", "--unsafe"]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: omo-logs-audit
        name: omo logs audit (baseline check, 0 增量才通过)
        entry: uv run --directory projects/omo python -m omo.cli logs audit --baseline-check .omo/_knowledge/_audit_baseline.json
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # Round 13 P0 升级: baseline 机制 (实现 Round 12 P0 commit flag 的 TODO).
        # 老 .jsonl 漂移是历史问题, baseline 锚定"已知漂移", pre-commit 只对"增量" fail.
        # 刷新 baseline: uv run --directory projects/omo python -m omo.cli logs audit --baseline-init .omo/_knowledge/_audit_baseline.json
        # Round 12 P0 旧 hook 已被 baseline-check 取代 (删了 files: 过滤, 不再需要).
      - id: health-ssot-consistency
        name: health SSOT consistency (P43 W0: 校验 .omo/state/health.yaml 与 system.yaml 一致)
        entry: python3 bin/check_health_ssot.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # 触发场景: 修改 .omo/state/system.yaml 或 .omo/state/health.yaml 时
        # 校验: 引用路径存在 + 数值一致 + 24h 内生成
        # 刷新: python3 bin/compass_radar.py
      - id: port-hardcode-check
        name: port hardcode check (端口必须在 protocols/port-registry.yaml)
        entry: python3 scripts/check-vault-paths.py --check-ports
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # P47: 端口 enforce 从 .git/hooks/pre-commit (shell, 仅本地) 提升到 framework
        # (pre-commit run + CI + 新 clone 都拦). 复用 scripts/check-vault-paths.py.
        # 历史已知: kairon minerva 8765 + ontoderive 8080 (baseline 容忍).
      - id: cross-deps-check
        name: cross-layer deps check (跨层 import 违规)
        entry: python3 scripts/check-cross-deps.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # P47+: 跨层 enforce (防回归). 规则: cockpit→kairon / agora→cockpit /
        # ecos→kairon / omo→kairon. 注: cockpit→runtime 是设计依赖 (agent_runtime
        # 桥接, GPTCHAS #2), 不拦. 复用 scripts/check-cross-deps.py.
