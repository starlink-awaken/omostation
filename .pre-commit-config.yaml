# Pre-commit hooks for omostation (Round 12 P0 + P1)
#
# Installs: pre-commit install
# Run manually: pre-commit run --all-files
#
# Hook 设计 (Round 12 P1 扩展):
#   - check-yaml:        官方 pre-commit-hooks, 校验所有 .yml/.yaml 可解析
#                        (actionlint 留给 CI 工作流, 避免本地下载二进制)
#   - omo-logs-audit:    跑 omo logs audit, 0 drift 才通过.
#                        若 .omo/_knowledge/ 下没有 .jsonl, 跳过 (新项目可零数据启动).
#   - ruff:              各项目自带 ruff (在 kairon/agora/omo 等 pyproject.toml 中配).
#
# 性能考虑: omo logs audit 是 IO-bound (读 .jsonl), 不会显著拖慢 commit.
#          check-yaml 是纯文本解析, <1s. 两者组合 < 3s per commit.
# 走 CI 周期跑的 (见 .github/workflows/ci-lint.yml):
#   - actionlint (GitHub Actions 工作流静态分析, 二进制 1.5MB, 不在 pre-commit 拉)
#   - shellcheck (scripts/*.sh, 系统包, CI 装一次)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        # Round 12 P1: 锁住所有 .yml/.yaml 可解析
        # exclude: kairon 是 submodule, 单独 lint; protocols/ 含故意宽松 YAML
        exclude: |
          (?x)^(
            projects/kairon/.*\.ya?ml
            | protocols/.*\.ya?ml
            )$
        args: ["--allow-multiple-documents", "--unsafe"]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: omo-logs-audit
        name: omo logs audit (baseline check, 0 增量才通过)
        entry: uv run --directory projects/omo python -m omo.cli logs audit --baseline-check .omo/_knowledge/_audit_baseline.json
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # Round 13 P0 升级: baseline 机制 (实现 Round 12 P0 commit flag 的 TODO).
        # 老 .jsonl 漂移是历史问题, baseline 锚定"已知漂移", pre-commit 只对"增量" fail.
        # 刷新 baseline: uv run --directory projects/omo python -m omo.cli logs audit --baseline-init .omo/_knowledge/_audit_baseline.json
        # Round 12 P0 旧 hook 已被 baseline-check 取代 (删了 files: 过滤, 不再需要).
      - id: health-ssot-consistency
        name: health SSOT consistency
        entry: python3 bin/check_health_ssot.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # 触发场景: 修改 .omo/state/system.yaml 或 .omo/state/health.yaml 时
        # 校验: 引用路径存在 + 数值一致 + 24h 内生成
        # 刷新: python3 bin/compass_radar.py
      - id: port-hardcode-check
        name: port hardcode check (端口必须在 protocols/port-registry.yaml)
        entry: python3 scripts/check-vault-paths.py --check-ports
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # P47: 端口 enforce 从 .git/hooks/pre-commit (shell, 仅本地) 提升到 framework
        # (pre-commit run + CI + 新 clone 都拦). 复用 scripts/check-vault-paths.py.
        # 增量 enforce: --check-ports 自动读 protocols/port-hardcode-baseline.yaml, 只拦新违规.
        # 刷新 baseline (锚定已知历史): python3 scripts/check-vault-paths.py --baseline-init
        # 全景审计: 加 --strict 显示全部含历史.
      - id: cross-deps-check
        name: cross-layer deps check (跨层 import 违规)
        entry: python3 scripts/check-cross-deps.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # P47+: 跨层 enforce (防回归). 规则: cockpit→kairon / agora→cockpit /
        # ecos→kairon / omo→kairon. 注: cockpit→runtime 是设计依赖 (agent_runtime
        # 桥接, GPTCHAS #2), 不拦. 复用 scripts/check-cross-deps.py.
      - id: omo-direct-io-gate
        name: omo direct io gate (非 broker 禁止直接改 .omo / spaces)
        entry: uv run --directory projects/omo python -m omo.cli lint direct-omo-io
        language: system
        files: ^(projects/|scripts/|bin/).+\.py$
        pass_filenames: true
        stages: [pre-commit]
        # P48+: 把 `.omo` / `spaces` 直接写入约束固化到 pre-commit.
        # 允许 broker:
        #   - projects/omo/src/omo/*
        #   - projects/c2g/src/c2g/adapters.py
        #   - projects/c2g/src/c2g/bridge_import.py
        # 其余 Python 改动若直接 write_text/open(...,"w")/unlink/mkdir 到 `.omo`
        # 一律拒绝提交, 强制改走 omo CLI / c2g ingress / 授权 broker.

      - id: omo-task-policy-gate
        name: omo task policy gate (特殊任务红线校验)
        entry: uv run --directory projects/omo python -m omo.cli lint task-policy --all --workspace-root .
        language: system
        files: ^(\.omo/tasks/|\.omo/workers/runs/|projects/omo/src/omo/omo_task_policy\.py|projects/omo/src/omo/omo_lint\.py|projects/omo/tests/test_omo_task_policy\.py|projects/omo/tests/test_omo_direct_io_gate\.py|\.github/workflows/governance-check\.yml|projects/omo/README\.md|\.omo/standards/omo-governance-surfaces\.md).*
        pass_filenames: false
        stages: [pre-commit]
        # P49+: 特殊任务红线统一走 task-policy 注册表, 不再散落 ad-hoc 检查脚本.
        # 当前强制规则见 `.omo/_truth/registry/task-policies.yaml`
        # 后续新增红线时, 只增 TaskPolicy 注册与对应测试/文档, 不新增平行脚本.

      - id: omo-mutation-surface-gate
        name: omo mutation surface gate (brokered write surface registry)
        entry: uv run --directory projects/omo python -m omo.cli lint mutation-surfaces --workspace-root .
        language: system
        files: ^(\.omo/_truth/registry/mutation-surfaces\.yaml|projects/omo/src/omo/omo_governance_surfaces\.py|projects/omo/src/omo/omo_lint\.py|projects/omo/src/omo/omo_ingress\.py|projects/omo/src/omo/omo_goal\.py|projects/omo/src/omo/omo_task\.py|projects/omo/src/omo/omo_bridge\.py|projects/omo/src/omo/omo_knowledge\.py|projects/omo/src/omo/omo_standard\.py|projects/omo/src/omo/omo_state\.py|projects/omo/tests/test_omo_governance_surfaces\.py|projects/omo/tests/test_omo_direct_io_gate\.py|projects/cockpit/src/cockpit/commands/governance\.py|\.github/workflows/governance-check\.yml|projects/omo/README\.md|projects/cockpit/README\.md|\.omo/standards/omo-governance-surfaces\.md).*
        pass_filenames: false
        stages: [pre-commit]
        # P50+: mutation surface 从 surfaces 报告中的顺带检查提升为独立 lint/gate.
        # 新 broker 入口、直写例外和 registry 变更必须一起过门.

      - id: omo-sensitive-governed-write-gate
        name: omo sensitive governed write gate (broker-only)
        entry: uv run --directory projects/omo python -m omo.cli lint sensitive-governed-writes
        language: system
        files: ^(projects/omo/src/omo/.*\.py|projects/omo/tests/test_omo_direct_io_gate\.py|bin/verify-omo\.sh|\.pre-commit-config\.yaml|\.github/workflows/governance-check\.yml|projects/omo/README\.md|\.omo/standards/omo-governance-surfaces\.md).*
        pass_filenames: false
        stages: [pre-commit]
        # system/goals/tasks/capabilities 是高风险治理面.
        # 允许 OMO ingress broker 写, 禁止在其他内核模块重新长出直写口.

      - id: omo-internal-write-profile-gate
        name: omo internal write profile gate (worker runtime write registry)
        entry: uv run --directory projects/omo python -m omo.cli lint internal-write-profiles --workspace-root .
        language: system
        files: ^(\.omo/_truth/registry/internal-write-profiles\.yaml|projects/omo/src/omo/omo_governance_surfaces\.py|projects/omo/src/omo/omo_lint\.py|projects/omo/src/omo/omo_worker_.*\.py|projects/omo/src/omo/omo_rollout\.py|projects/omo/src/omo/omo_experience\.py|projects/omo/src/omo/omo_admission\.py|projects/omo/tests/test_omo_governance_surfaces\.py|projects/cockpit/src/cockpit/commands/governance\.py|\.github/workflows/governance-check\.yml|projects/omo/README\.md|projects/cockpit/README\.md|\.omo/standards/omo-governance-surfaces\.md).*
        pass_filenames: false
        stages: [pre-commit]
        # P51+: worker internal 写路径从 surfaces 报表提升为独立 registry + lint gate.
        # 任何 dispatch/promotion/overlay/experience 写面变更都必须同步 registry.

      - id: omo-state-plane-asset-gate
        name: omo state plane asset gate (持久化/保留语义注册表)
        entry: uv run --directory projects/omo python -m omo.cli lint state-plane-assets --workspace-root .
        language: system
        files: ^(\.omo/_truth/registry/omo-governance-surfaces\.yaml|projects/omo/src/omo/omo_governance_surfaces\.py|projects/omo/src/omo/omo_lint\.py|projects/omo/tests/test_omo_governance_surfaces\.py|\.github/workflows/governance-check\.yml|\.omo/standards/omo-governance-surfaces\.md|AGENTS\.md).*
        pass_filenames: false
        stages: [pre-commit]
        # P52+: `.omo` 顶层资产必须显式登记 persistence_mode/retention_mode.
        # 防止 state/control/delivery/knowledge 再次混写成大杂烩.

      - id: omo-c2g-omo-boundary-gate
        name: omo c2g/omo boundary gate (单一 facade 接入)
        entry: uv run --directory projects/omo python -m omo.cli lint c2g-omo-boundary --workspace-root .
        language: system
        files: ^(projects/c2g/src/c2g/.*\.py|projects/omo/src/omo/omo_governance_surfaces\.py|projects/omo/src/omo/omo_lint\.py|projects/omo/tests/test_omo_governance_surfaces\.py|\.omo/standards/omo-governance-surfaces\.md|AGENTS\.md).*
        pass_filenames: false
        stages: [pre-commit]
        # P53+: c2g 只能通过 c2g/omo_client.py 接入 OMO，避免散弹式 import 内核模块.

      - id: omo-ingress-artifact-gate
        name: omo ingress artifact gate (registry -> artifact -> carrier 对齐)
        entry: uv run --directory projects/omo python -m omo.cli lint ingress-artifacts --workspace-root .
        language: system
        files: ^(\.omo/_delivery/ingress/|projects/omo/src/omo/omo_ingress\.py|projects/omo/src/omo/omo_governance_surfaces\.py|projects/omo/src/omo/omo_lint\.py|projects/omo/tests/test_omo_ingress\.py|projects/omo/tests/test_omo_governance_surfaces\.py|\.omo/standards/omo-governance-surfaces\.md|AGENTS\.md).*
        pass_filenames: false
        stages: [pre-commit]
        # P54+: ingress artifact 不只是“有文件”，还要和 registry、carrier 元数据一致.

      - id: ruff
        name: Ruff Linter
        entry: uv run ruff check --fix
        language: system
        types: [python]
        files: ^(projects|scripts|bin)/.*\.py$
        stages: [pre-commit]

      - id: future-annotations
        name: future annotations check
        entry: python3 scripts/check-future-annotations.py
        language: system
        types: [python]
        files: ^(projects|scripts|bin)/.*\.py$
        stages: [pre-commit]

      - id: mof-drift-check
        name: MOF drift detection (架构漂移检测)
        entry: bin/mof-drift
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # 检测 sys.path hack / TODO 积累 / 测试缺失

      - id: markdownlint
        name: MarkdownLint
        entry: uv run --with pymarkdownlnt pymarkdown scan
        language: system
        types: [markdown]
        stages: [pre-commit]

      - id: verify-spaces
        name: Verify Spaces YAML Schema
        entry: uv run --with jsonschema --with pyyaml python3 bin/verify-spaces.py
        language: system
        files: ^spaces/.*\.yaml$
        pass_filenames: false
        stages: [pre-commit]

      - id: mof-schema-validate
        name: MOF schema validation (M1 ↔ M2 校验)
        entry: uv run --directory projects/ecos python src/ecos/ssot/tools/mof-schema-validate.py --strict
        language: system
        files: ^(projects/ecos/src/ecos/ssot/mof/m1/|projects/ecos/src/ecos/ssot/mof/m2/).*\.yaml$
        pass_filenames: false
        stages: [pre-commit]
        # MOF 本体论约束: 所有 M1 节点必须通过 schema 校验
        # 违反 = 提交被拒绝
