# MCP 默认传输方式 (2026-06-16 收敛)
# 29/29 MCP 服务默认 stdio，HTTP/SSE 需显式标志
mcp_transport_defaults:
  agora: stdio (sse via --sse, http via --http)
  runtime-cron: stdio (http via --http flag, port 7450)
