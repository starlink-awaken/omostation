# Vault Paths SSOT — 所有 vault 路径单一来源
#
# 架构意义: omostation 体系内任何代码/脚本/工具,严禁硬编码
# ~/Documents/X/ 这种 iCloud/iOS 特定路径。必须读这个文件。
#
# 设计原则:
#   1. 显式 opt-in,无静默 fallback
#   2. env 优先(yaml 次之,XDG 兜底),CI/容器化可控
#   3. 任何新增路径 → 先在这里声明 → mof-extract 扫描本文件入 L0 元模型
#
# 解析器: scripts/check-vault-paths.py 提供 resolve_path() 函数
#   用法: from protocols.vault_paths import resolve_path; p = resolve_path('cockpit_root')

version: 2
last_updated: '2026-06-30T00:00:00'

# ── 路径定义 ──────────────────────────────────
# 任何 iCloud/L4 域路径必须在这里声明,硬编码一律报错
paths:
  # 跨域 L4 自我层
  cockpit_root: ~/Documents/@驾驶舱              # 驾驶舱(新 KEMS,带 @ 前缀)
  cockpit_legacy: ~/Documents/@驾驶舱/_archive/legacy-2026-06-08  # 老 KEMS 驾驶舱归档
  vault_root: ~/Documents/@学习进化               # 知识进化 vault
  creative_root: ~/Documents/@创意创作             # 创意创作域（2026-06-09 独立）
  personal_root: ~/Documents/@个人                 # 个人域
  shared_root: ~/Documents/@公共                   # 公共域
  family_root: ~/Documents/@家庭生活               # 家庭生活域
  work-docs_root: ~/Documents/@工作文档                  # @工作文档 聚合域（2026-06-24 新增域,补登）
  work-weijian_root: ~/Documents/@工作文档/卫健委         # @工作文档/卫健委
  work-guozhuan_root: ~/Documents/@工作文档/国转中心       # @工作文档/国转中心
  opc_root: ~/Documents/@OPC
  family-shared_root: ~/Documents/FamilyShared
  obsidian-vault_root: ~/Library/Mobile Documents/iCloud~md~obsidian/Documents
  
  ai-config_root: ~/.ai
  agents-config_root: ~/.agents
  icloud-sharedconf_root: ~/SharedConf
  bin_root: ~/bin
  toolbox-tools_root: ~/ToolBox
  sharedwork_root: /Users/SharedWork
  shareddisk_root: /Volumes/SharedDisk
  model-volume_root: /Volumes/Model
  sharedmodel_root: /Volumes/SharedModel
  minerva_root: ~/minerva
  knowledge-engine_root: ~/knowledge
  l4-kernel_root: ~/Workspace/projects/l4-kernel
  ecos-workbench_root: ~/Workspace
  omo-governance_root: ~/Workspace/.omo                  # OMO 治理域（2026-06-24 新增域,补登）
  spaces_root: ~/Workspace/spaces                        # Spaces 域（2026-06-24 新增域,补登）
  runtime_root: ~/runtime
  
  cockpit_old: null                                # 老路径 (驾驶舱/ 无 @) — 显式 null 表示禁止使用

  # 关键子路径
  cockpit_claude: ~/Documents/@驾驶舱/CLAUDE.md
  cockpit_cards: ~/Documents/@驾驶舱/CARDS
  cockpit_dashboard: ~/Documents/@驾驶舱/DASHBOARD.md
  cockpit_m1_nodes: ~/Documents/@驾驶舱/_generated/m1-nodes
  cockpit_scripts: ~/Documents/@驾驶舱/scripts

  learning_claude: ~/Documents/@学习进化/CLAUDE.md
  learning_control: ~/Documents/@学习进化/_control
  learning_status: ~/Documents/@学习进化/_control/STATUS.md
  learning_knowledge: ~/Documents/@学习进化/_knowledge

  creative_claude: ~/Documents/@创意创作/CLAUDE.md
  personal_claude: ~/Documents/@个人/CLAUDE.md
  family_claude: ~/Documents/@家庭生活/CLAUDE.md
  shared_claude: ~/Documents/@公共/CLAUDE.md
  work_claude: ~/Documents/@工作文档/CLAUDE.md

  # 公约
  convention_file: ~/Documents/@公共/_control/CLAUDE-公约.md
  claude_registry: ~/Documents/@驾驶舱/_control/CLAUDE-REGISTRY.md

  # mof 工具输出
  mof_m1_convention: ~/Workspace/projects/ecos/src/ecos/ssot/mof/m1/convention

  # 数据层
  kei_audit_log: ~/runtime/data/kei_audit.jsonl
  llm_cost_log: ~/runtime/data/llm_cost.jsonl

# ── 解析优先级(由高到低)──────────────────────
resolution_priority:
  1. env VAULT_PATHS_COCKPIT_ROOT 等(显式 opt-in,CI/容器化用)
  2. protocols/vault-paths.yaml(本文件,SSOT 默认)
  3. XDG 规范 ~/.config/omostation/vault-paths.yaml(用户覆盖)
  4. null/空 → 报错 exit 2(绝不静默 fallback 老路径)

# ── 反 sed 模式 ──────────────────────────────────
# 任何代码硬编码这些字符串,check-vault-paths.py 报红:
#   ~/Documents/驾驶舱/         ← 禁用(无 @)
#   ~/Documents/驾驶舱/scripts/  ← 禁用
#   ~/Documents/驾驶舱/CARDS/    ← 禁用
# 正确路径(必须读本文件):
#   ~/Documents/@驾驶舱/        ← 唯一合法
forbidden_patterns:
  - "~/Documents/驾驶舱/"
  - "/Documents/驾驶舱/"
  - "驾驶舱/scripts/"
  - "驾驶舱/CARDS/"
  - "驾驶舱/_generated/"

# ── M2 元模型契约 ──────────────────────────────
# M2 工具运行时通过 resolve_path() 取路径,不直读 env
# L0 知识萃取 (mof-extract) 扫本文件入 convention 节点
# mof-validate 校验: 任何缺必填字段的 vault 节点报缺必填属性
required_fields:
  - cockpit_root
  - cockpit_claude
  - cockpit_dashboard
  - vault_root
  - learning_claude
  - learning_status
  - runtime_root
