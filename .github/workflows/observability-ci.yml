name: observability-ci
# P47 E: observability 是 docker-compose (Langfuse + webhook-bridge → omo).
# CI = compose config 语法校验 + webhook-bridge.py 语法检查.
on: [push, pull_request]

jobs:
  validate:
    name: observability compose config + bridge lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - name: docker compose config -q (语法校验)
        run: cd projects/observability && docker compose config -q
      - name: webhook-bridge.py syntax check
        run: python3 -m py_compile projects/observability/webhook-bridge.py
