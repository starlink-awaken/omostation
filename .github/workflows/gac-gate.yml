name: gac-gate
# GaC 治理即代码 gate.
# 规则、执行脚本、入口文档变更时统一运行共享本地 gate。
on:
  push:
    paths:
      - '.omo/_truth/registry/governance-checks.yaml'
      - 'bin/gac-*.py'
      - '.github/workflows/gac-gate.yml'
      - 'bin/doc-ssot-lint.py'
      - 'bin/doc-link-check.py'
      - 'scripts/check-doc-ssot-snapshots.py'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'ARCHITECTURE.md'
      - 'LAYER-INDEX.md'
      - 'projects/AGENTS.md'
      - 'projects/*/AGENTS.md'
      - 'projects/*/CLAUDE.md'
      - 'projects/*/README.md'
  pull_request:
    paths:
      - '.omo/_truth/registry/governance-checks.yaml'
      - 'bin/gac-*.py'
      - '.github/workflows/gac-gate.yml'
      - 'bin/doc-ssot-lint.py'
      - 'bin/doc-link-check.py'
      - 'scripts/check-doc-ssot-snapshots.py'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'ARCHITECTURE.md'
      - 'LAYER-INDEX.md'
      - 'projects/AGENTS.md'
      - 'projects/*/AGENTS.md'
      - 'projects/*/CLAUDE.md'
      - 'projects/*/README.md'

jobs:
  gac-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: install pyyaml
        run: pip install pyyaml
      - name: gac-local-gate
        run: python3 bin/gac-local-gate.py
