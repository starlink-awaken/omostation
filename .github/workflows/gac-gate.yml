name: gac-gate
# GaC 治理即代码 gate.
# PR: 始终 strict（合并前彻底验）。
# push main: 始终跑（防「非 governance 路径合入后 tip 不重跑」假绿）。
# push 其它分支: 仍用 paths 限流，避免 feature 分支每次 push 全套。
on:
  push:
    branches:
      - main
    # non-main feature branches keep path filter via separate workflow path below
  pull_request:
  workflow_dispatch:
  # feature branch path-filtered runs (not main)
  # implemented as additional push without branch filter + job if:
  # keep simple: always on main + all PRs is enough for protection.

jobs:
  gac-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: install pyyaml
        run: pip install pyyaml
      - name: generate digests
        run: |
          python3 bin/mof/project-layer-index.py --write
          python3 bin/gac/gac-export-agents.py
      - name: check-layers (跨层依赖检查)
        run: python3 bin/layer-dependency-check.py
      - name: gac-local-gate (strict)
        run: python3 bin/gac/gac-local-gate.py --strict
