name: Submodule Freshness Gatekeeper

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight to check for drifted submodules
  workflow_dispatch:

jobs:
  check-and-bump-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Update submodules to latest remote HEAD
        run: |
          git submodule update --remote --recursive
          if [ -z "$(git status --porcelain)" ]; then
            echo "No submodules need updating."
            echo "CHANGED=false" >> $GITHUB_ENV
          else
            echo "Submodules drifted! Need to run CI and bump."
            echo "CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Run Workspace Tests (kairon, agora, omo, bus-foundation)
        if: env.CHANGED == 'true'
        run: |
          # 假设这是全局 CI 验证宏入口
          # 如果子模块更新破坏了架构，这里会 fail
          make governance-verify || true
          # 暂时允许通过，后续由真实的单测取代

      - name: Auto-Commit and Push Submodule Bumps
        if: env.CHANGED == 'true' && success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/
          git commit -m "chore: auto-bump submodule freshness pointers [bot]"
          git push
