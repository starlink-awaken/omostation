name: .omo Governance Check

on:
  pull_request:
    branches: [main]
    paths:
      - '.omo/**'
      - '.github/workflows/governance-check.yml'
      - 'bin/verify-omo.sh'
      - 'scripts/omo_task_schema.py'
      - 'scripts/check-system-consistency.sh'
      - 'scripts/sync_omo_state.py'
      - 'scripts/omo_worker.py'
      - 'scripts/check-state-goals-alignment.py'

jobs:
  governance-validate:
    name: Run governance checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install pyyaml pygithub

      - name: Canonical .omo verification
        run: bash bin/verify-omo.sh

      - name: INDEX.md Coverage Check
        run: |
          python3 scripts/check-index-coverage.py || \
            { echo "::warning::INDEX.md coverage below 95%"; exit 1; }

      - name: State-Goals Alignment Check
        run: python3 scripts/check-state-goals-alignment.py || \
            { echo "::warning::State-goals alignment check failed"; exit 1; }

      - name: System consistency check
        run: bash scripts/check-system-consistency.sh
