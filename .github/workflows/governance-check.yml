name: Governance Check
on:
  push:
    paths:
      - ".github/workflows/governance-check.yml"
      - ".pre-commit-config.yaml"
      - ".omo/**"
      - "docs/OPC-*.md"
      - "projects/*/pyproject.toml"
      - "projects/*/src/**"
      - "projects/omo/tests/**"
      - "projects/ecos/scripts/contract_gatekeeper.py"
      - "scripts/check-*.py"
      - "scripts/opc_*.py"
      - "bin/workspace-audit"
      - "CLAUDE.md"
      - "LAYER-INDEX.md"
  pull_request:
  schedule:
    - cron: "0 8 * * 1"  # 每周一早8点自动运行

jobs:
  interface-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Run governance checks
        run: |
          python3 scripts/check-interfaces.py
          python3 scripts/check-cross-deps.py
          python3 scripts/check-doc-ssot-snapshots.py
          python3 scripts/check-panorama-arch-links.py
          python3 scripts/check-ssot-reference-integrity.py
          python3 scripts/check-truth-m1-governance-mapping.py
          python3 scripts/check-governance-surface-paths.py
          python3 scripts/check-project-arch-doc-contract.py
          python3 scripts/check-project-arch-doc-ssot.py
          python3 scripts/check-project-registry-ssot.py
          python3 scripts/check-truth-inventory-routing.py
          python3 scripts/check-knowledge-index-ssot.py
          python3 scripts/check-design-history-ssot.py
          python3 scripts/check-design-body-ssot.py
          python3 scripts/check-design-risky-phrases.py
          python3 scripts/check-plans-readme-ssot.py
          python3 scripts/check-governance-doc-ssot.py
          python3 scripts/check-governance-mechanism-ssot.py
          python3 scripts/check-governance-guides-ssot.py
          python3 scripts/check-knowledge-history-ssot.py
          python3 scripts/check-phase-closeout-ssot.py
          uv run --directory projects/omo python -m omo.cli governance surfaces --workspace-root . --json > /tmp/omo-governance-surfaces.json
          uv run --directory projects/omo python -m omo.cli lint direct-omo-io
          uv run --directory projects/omo python -m omo.cli lint ingress-registry --workspace-root .
          uv run --directory projects/omo python -m omo.cli lint self-evolution-approval --workspace-root .
          uv run --directory projects/omo pytest \
            tests/test_omo_ingress.py \
            tests/test_omo_cockpit_bridge.py \
            tests/test_omo_gc.py \
            tests/test_omo_governance.py \
            tests/test_omo_governance_surfaces.py \
            tests/test_omo_direct_io_gate.py \
            tests/test_omo_task_policy.py \
            tests/test_opc_phase_governance_alignment.py \
            tests/test_opc_p5_p7_runtime.py \
            -q

  doc-freshness:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Check documentation freshness
        run: |
          python3 scripts/check-interfaces.py --doc-only
