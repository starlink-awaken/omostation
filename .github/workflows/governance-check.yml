name: Governance Check
on:
  push:
    paths:
      - ".github/workflows/governance-check.yml"
      - ".pre-commit-config.yaml"
      - ".omo/**"
      - "docs/OPC-*.md"
      - "projects/*/pyproject.toml"
      - "projects/*/src/**"
      - "projects/omo/tests/**"
      - "projects/ecos/scripts/contract_gatekeeper.py"
      - "scripts/check-*.py"
      - "scripts/opc_*.py"
      - "bin/workspace-audit"
      - "CLAUDE.md"
      - "LAYER-INDEX.md"
  pull_request:
    paths:
      - ".github/workflows/governance-check.yml"
      - ".pre-commit-config.yaml"
      - ".omo/**"
      - "docs/OPC-*.md"
      - "projects/*/pyproject.toml"
      - "projects/*/src/**"
      - "projects/omo/tests/**"
      - "projects/ecos/scripts/contract_gatekeeper.py"
      - "scripts/check-*.py"
      - "scripts/opc_*.py"
      - "bin/workspace-audit"
      - "CLAUDE.md"
      - "LAYER-INDEX.md"
  schedule:
    - cron: "0 */6 * * *"  # 每6小时自动运行，确保SSOT长期绿色

jobs:
  interface-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Run governance checks
        run: |
          # Run each check independently — don't let one failure skip the rest
          python3 scripts/check-interfaces.py || true
          python3 scripts/check-cross-deps.py || true
          python3 scripts/check-doc-ssot-snapshots.py || true
          python3 scripts/check-panorama-arch-links.py || true
          python3 scripts/check-ssot-reference-integrity.py || true
          python3 scripts/check-truth-m1-governance-mapping.py || true
          python3 scripts/check-governance-surface-paths.py || true
          python3 scripts/check-project-arch-doc-contract.py || true
          python3 scripts/check-project-arch-doc-ssot.py || true
          python3 scripts/check-project-registry-ssot.py || true
          python3 scripts/check-truth-inventory-routing.py || true
          python3 scripts/check-knowledge-index-ssot.py || true
          python3 scripts/check-design-history-ssot.py || true
          python3 scripts/check-design-body-ssot.py || true
          python3 scripts/check-design-risky-phrases.py || true
          python3 scripts/check-plans-readme-ssot.py || true
          python3 scripts/check-governance-doc-ssot.py || true
          python3 scripts/check-governance-mechanism-ssot.py || true
          python3 scripts/check-governance-guides-ssot.py || true
          python3 scripts/check-knowledge-history-ssot.py || true
          python3 scripts/check-phase-closeout-ssot.py || true
          cd projects/omo
          uv run python -m omo.cli governance surfaces --workspace-root ../.. --json > /tmp/omo-governance-surfaces.json
          uv run python -m omo.cli lint direct-omo-io
          uv run python -m omo.cli lint sensitive-governed-writes
          uv run python -m omo.cli lint schemas
          uv run python -m omo.cli lint yaml-bypass
          uv run python -m omo.cli lint ingress-registry --workspace-root ../..
          uv run python -m omo.cli lint mutation-surfaces --workspace-root ../..
          uv run python -m omo.cli lint internal-write-profiles --workspace-root ../..
          uv run python -m omo.cli lint state-plane-assets --workspace-root ../..
          uv run python -m omo.cli lint c2g-omo-boundary --workspace-root ../..
          uv run python -m omo.cli lint ingress-artifacts --workspace-root ../..
          uv run python -m omo.cli lint mutation-ledger --workspace-root ../..
          uv run python -m omo.cli lint doc-lifecycle --workspace-root ../..
          uv run python -m omo.cli lint self-evolution-approval --workspace-root ../..
          uv run python -m omo.cli lint task-policy --all --workspace-root ../..
          uv run python -m omo.cli lint god-module --workspace-root ../.. || echo "⚠️ god-module warnings (non-blocking)"
          uv run pytest \
            tests/test_omo_ingress.py \
            tests/test_omo_cockpit_bridge.py \
            tests/test_omo_gc.py \
            tests/test_omo_governance.py \
            tests/test_omo_governance_surfaces.py \
            tests/test_omo_direct_io_gate.py \
            tests/test_omo_task_policy.py \
            tests/test_opc_phase_governance_alignment.py \
            tests/test_opc_p5_p7_runtime.py \
            -q

      - name: MOF security scan
        run: |
          bin/mof-scan || echo "⚠️ Security scan found issues (non-blocking)"

      - name: Agent 准入检查 (metaos admit)
        run: |
          cd projects/metaos
          uv run metaos admit --domain ci --role generator --values "safety,transparency" --otlp --audit-id "ci-${{ github.sha }}" || echo "⚠️ Agent admit check (non-blocking, informational)"

  doc-freshness:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Check documentation freshness
        run: |
          python3 scripts/check-interfaces.py

  governance-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install Python gate deps
        run: pip install pyyaml
      - name: Run full governance verification
        run: make governance-verify
      - name: GaC local gate
        run: python3 bin/gac-local-gate.py
      - name: Emit failure signal on break
        if: failure()
        run: |
          uv run --package omo python -m omo.cli event emit \
            --type governance_verify_failed \
            --source ci/governance-check.yml \
            --payload '{"ref":"${{ github.ref }}","sha":"${{ github.sha }}","run_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            --workspace-root .
          echo "❌ governance-verify failed; signal emitted"
