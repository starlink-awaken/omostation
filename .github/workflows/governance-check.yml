name: Governance Check
on:
  push:
    paths:
      - "projects/*/pyproject.toml"
      - "projects/*/src/**"
      - "scripts/check-*.py"
      - "CLAUDE.md"
      - "LAYER-INDEX.md"
  pull_request:
  schedule:
    - cron: "0 8 * * 1"  # 每周一早8点自动运行

jobs:
  interface-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run governance checks
        run: |
          python3 scripts/check-interfaces.py
          python3 scripts/check-cross-deps.py

  doc-freshness:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Check documentation freshness
        run: |
          python3 scripts/check-interfaces.py --doc-only
