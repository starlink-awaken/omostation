name: Config Check
on:
  push:
    paths: ["projects/kairon/packages/agora/agora-services.json"]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Validate agora config
        run: python3 -c "import json; json.load(open('projects/kairon/packages/agora/agora-services.json')); print('Config valid ✅')"
