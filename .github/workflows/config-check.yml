name: Config Check
on:
  push:
    paths: ["projects/kairon/packages/agora/agora-services.json", "projects/agora/src/agora-services.json"]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Validate agora config
        # P41-W1 fix: projects/kairon is .gitignore'd. Use the in-monorepo agora config (src/agora-services.json)
        # which is the canonical authoritative copy for this monorepo CI.
        run: |
          if [ -f "projects/agora/src/agora-services.json" ]; then
            python3 -c "import json; json.load(open('projects/agora/src/agora-services.json')); print('Config valid (in-monorepo agora-services.json) ✅')"
          elif [ -f "projects/kairon/packages/agora/agora-services.json" ]; then
            python3 -c "import json; json.load(open('projects/kairon/packages/agora/agora-services.json')); print('Config valid (kairon agora-services.json) ✅')"
          else
            echo "No agora-services.json found in monorepo (kairon path is .gitignore'd) — skipping."
          fi
