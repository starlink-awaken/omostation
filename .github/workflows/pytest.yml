name: Pytest
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [agora, minerva, sophia, ontoderive, pallas, eidos]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -e "${{ matrix.project }}"
      - run: make -C "${{ matrix.project }}" test
