name: Pytest
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
      - name: Run omo unit tests
        # P41-W1 fix: projects/kairon is .gitignore'd (separate repo). Run omo tests instead — the
        # only python project fully tracked in this monorepo.
        run: cd projects/omo && uv sync && uv run pytest tests/ -q
