name: eCOS CI
on:
  push:
    branches: [main]
    paths: ['projects/ecos/**', '.github/workflows/ecos-ci.yml']
  pull_request:
    branches: [main]
    paths: ['projects/ecos/**', '.github/workflows/ecos-ci.yml']
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # SSB auth: _load_key() 优先读 SSB_KEY env (ssb_auth.py L23). CI 无 ~/.ecos/LADS/ssb/.ssb_key
      # (运行时目录, 非仓内), 提供 test key 让 SSB 签名测试跑 (一致性测试用同 key 仍过).
      SSB_KEY: ci-test-key-for-signature-tests
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          submodules: recursive
      - name: Init ecos submodule
        run: git submodule update --init projects/ecos
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: cd projects/ecos && uv sync
      - name: Run tests
        # P41-W1 fix: e2e_baseline tests need data/ files (.ssb_key, cross_refs.jsonl, ssb/ecos.jsonl, HANDOFF/LATEST.md)
        # which are .gitignore'd. Skip them in CI; the unit tests still cover SSB auth and core flows.
        run: cd projects/ecos && uv run pytest tests/ -q --ignore=tests/test_e2e_baseline.py -k "not PerformanceBenchmarks"
