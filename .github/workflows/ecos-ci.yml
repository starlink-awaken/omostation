name: eCOS CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: cd projects/ecos && uv sync
      - name: Run tests
        # P41-W1 fix: e2e_baseline tests need data/ files (.ssb_key, cross_refs.jsonl, ssb/ecos.jsonl, HANDOFF/LATEST.md)
        # which are .gitignore'd. Skip them in CI; the unit tests still cover SSB auth and core flows.
        run: cd projects/ecos && uv run pytest tests/ -q --ignore=tests/test_e2e_baseline.py
