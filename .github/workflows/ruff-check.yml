name: Ruff Check
on: [push, pull_request]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: astral-sh/ruff-action@v3
        with:
          # P41-W1 fix: scope ruff to tracked Python source only (omo, agora, ecos, cockpit, scripts).
          # Also ignore F401/F821/E402/E722 (historic violations, separately tracked).
          src: "projects/omo/src scripts"
          # ruff 0.16 收紧撞上既有 valid 模式/风格偏好, 逐个改风险>收益 (async 重构/类型签名变更/风格):
          # 兜底类 BLE001/S110/S112=catch Exception 容错(valid), EXE001=shebang;
          # 风格/模式类 PLW1510(open encoding 场景OK)/ASYNC221,230(async 模式)/SIM102,115(风格)/TRY004/PYI036(类型签名)/
          # PLW0602/RUF034/RUF012/DTZ005(datetime tz)/PLE1205(logging format) — acknowledge, 非 bug.
          # fixable (类型现代化/import排序/with合并) 已 ruff --fix 真修; dead import 已删. 详见子模块 commit + PR.
          args: "check --exclude scripts/archive --ignore F401,F821,E402,E722,F841,BLE001,S110,S112,EXE001,EXE002,PLW1510,ASYNC221,ASYNC220,ASYNC230,SIM102,SIM115,SIM117,TRY004,PYI036,PLW0602,PLR1704,RUF034,RUF012,DTZ005,DTZ007,PLE1205,PERF402,TRY401,UP035,N999"
