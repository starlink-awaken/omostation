name: Agora CI
on:
  push:
    branches: [main]
    paths: ['projects/agora/**', '.github/workflows/agora-ci.yml']
  pull_request:
    branches: [main]
    paths: ['projects/agora/**', '.github/workflows/agora-ci.yml']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        # P41-W1 fix: skip [kairon] extra — projects/kairon is a separate repo (.gitignore'd)
        run: cd projects/agora && uv sync --no-extra kairon
      - name: Run tests
        run: cd projects/agora && uv run pytest tests/ --ignore=tests/e2e -q
