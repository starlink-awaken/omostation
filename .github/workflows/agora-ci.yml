name: Agora CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        # P41-W1 fix: skip [kairon] extra — projects/kairon is a separate repo (.gitignore'd)
        run: cd projects/agora && uv sync --no-extra kairon
      - name: Run tests
        run: cd projects/agora && uv run pytest tests/ --ignore=tests/e2e -q
