name: agora-dashboard-ci

on:
  push:
    paths:
      - 'projects/agora-dashboard/**'
      - '.github/workflows/agora-dashboard-ci.yml'
  pull_request:
    paths:
      - 'projects/agora-dashboard/**'
      - '.github/workflows/agora-dashboard-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/agora-dashboard
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'projects/agora-dashboard/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
