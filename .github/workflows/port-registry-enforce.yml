name: port-registry-enforce
# P47 A1: 端口硬编码 enforce (声明/执行鸿沟收口).
# 复用 scripts/check-vault-paths.py --check-ports (与本地 pre-commit 同一检查).
# 增量 enforce: --check-ports 自动读 protocols/port-hardcode-baseline.yaml,
#   已知历史 (12 处子模块硬编码) 容忍, 新违规 fail.
# 刷新 baseline: python3 scripts/check-vault-paths.py --baseline-init
on: [push, pull_request]

jobs:
  check:
    name: port hardcode check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Init scripts submodule
        # port 检查只需 scripts 子模块 (远程 omostation-scripts 存在). 不用
        # submodules: recursive — 会撞 omo/aetherforge/observability 等缺失远程
        # 导致整个 checkout 失败 (架构债, 见 cross-deps-enforce failure log).
        run: git submodule update --init scripts
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install pyyaml
      - name: Run port hardcode check
        run: python3 scripts/check-vault-paths.py --check-ports
