name: kairon-ci
# kairon monorepo (16 包). make test 循环 pytest + make typecheck-gate mypy 回归门.
on:
  push:
    branches: [main]
    paths: ['projects/kairon/**', '.github/workflows/kairon-ci.yml']
  pull_request:
    branches: [main]
    paths: ['projects/kairon/**', '.github/workflows/kairon-ci.yml']

jobs:
  test:
    name: kairon make test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - name: make test (16 包循环 pytest)
        # 注: kairon 是大 monorepo, make test 可能慢 (~分钟级).
        run: cd projects/kairon && make test

  typecheck-gate:
    name: kairon mypy regression gate (DEBT-CI-MYPY-STRICT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - name: make typecheck-gate (卡增量不卡存量)
        # 存量 1245 errors (见 projects/kairon/mypy-baseline.yaml); CI 卡回归 (新错误致红).
        # mypy 版本漂移致误报时: cd projects/kairon && make typecheck-gate-update 刷新 baseline.
        run: cd projects/kairon && make typecheck-gate
