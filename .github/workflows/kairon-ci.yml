name: kairon-ci
# P47 E: kairon monorepo (31 包, 18.9 万行). 用 make test 循环 pytest.
on: [push, pull_request]

jobs:
  test:
    name: kairon make test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - name: make test (31 包循环 pytest)
        # 注: kairon 是大 monorepo, make test 可能慢 (~分钟级).
        run: cd projects/kairon && make test
