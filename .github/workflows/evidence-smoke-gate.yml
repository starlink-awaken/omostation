name: evidence-smoke-gate
# BOS 声明/执行鸿沟 gate (Meadows 层7规则 + 层8回路固化)
# 防"声明驱动开发"复发: 新 BOS 声明必须 resolve, score<95 或 real_gap>0 则 fail
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  # Also path-filtered on any branch for fast feedback (union with above)
  # GitHub ORs events — main already covered; keep paths for non-main pushes:
  # Use second workflow trigger only via paths on push without branch limit would
  # double-run on main. So: main always + PR always is enough.

jobs:
  evidence-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
      - name: bos-registry drift (mirror vs bos-services)
        run: uv run --with pyyaml python bin/ssot/sync-bos-registry.py --check
        working-directory: ${{ github.workspace }}
      # evidence-smoke 依赖 agora venv (pydantic + resolver.services)
      - name: evidence-smoke gate (score>=95, real_gap=0)
        run: uv run --directory projects/agora python ${{ github.workspace }}/bin/gac/evidence-smoke.py --gate 95
        working-directory: ${{ github.workspace }}
