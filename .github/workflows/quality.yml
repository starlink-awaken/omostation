name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff-lint:
    name: Ruff lint (all Python projects)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: "./ontoderive/src ./pallas/src ./sophia/src ./minerva/src ./agora/src ./gateway/src ./eidos/src ./kronos/src ./SSOT/src ./Forge/src ./codeanalyze/src ./MetaOS/src"

  prettier:
    name: Pre-commit hooks check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: pre-commit/action@v3.0.1
        continue-on-error: true
