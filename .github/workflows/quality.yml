name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff-lint:
    name: Ruff lint (tracked projects)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: astral-sh/ruff-action@v3
        with:
          # P41-W1 fix: projects/kairon is .gitignore'd. Lint tracked projects instead.
          src: "projects/omo/src projects/ecos/src projects/agora/src projects/cockpit/src"
          args: "check --ignore F401,F821,E402,E722"

  prettier:
    name: Pre-commit hooks check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v4
      - uses: pre-commit/action@v3.0.1
