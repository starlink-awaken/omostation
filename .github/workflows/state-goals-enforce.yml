name: state-goals-enforce
# P47+: state/goals 对齐 enforce. 复用 scripts/check-state-goals-alignment.py.
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {submodules: recursive}
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - run: python3 scripts/check-state-goals-alignment.py
