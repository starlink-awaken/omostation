# =============================================================================
# SharedBrain × kairon Integration Test Pipeline
# Phase A-0: Infrastructure verification + Phase A: Protocol bridging
# =============================================================================
name: SharedBrain × kairon Integration

on:
  push:
    branches: [main, develop]
    paths:
      - 'projects/SharedBrain/**'
      - 'projects/kairon/packages/agora/**'
      - 'projects/kairon/packages/eidos/**'
      - '.github/workflows/sharedbrain-kairon-integration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'projects/SharedBrain/**'
      - 'projects/kairon/packages/agora/**'
      - 'projects/kairon/packages/eidos/**'
      - '.github/workflows/sharedbrain-kairon-integration.yml'
  workflow_dispatch:  # Manual trigger

env:
  COMPOSE_FILE: projects/SharedBrain/tests/integration/docker-compose.yml

jobs:
  unit-tests:
    name: Unit Tests
    strategy:
      fail-fast: false
      matrix:
        project:
          - { name: SharedBrain, dir: projects/SharedBrain }
          - { name: agora, dir: projects/kairon/packages/agora }
          - { name: eidos, dir: projects/kairon/packages/eidos }
        python-version: ["3.12"]

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.project.dir }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install kairon core models (dependency)
        if: matrix.project.name != 'SharedBrain'
        run: |
          pip install ../core-models/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        run: |
          python -m pytest tests/ -q --timeout=60 --continue-on-collection-errors --tb=short
        continue-on-error: ${{ matrix.project.name == 'SharedBrain' }}
        # SharedBrain has 16K tests; we only run a subset in CI

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build all Docker images
        run: |
          docker compose -f $COMPOSE_FILE build --parallel

      - name: List built images
        run: docker images --filter "reference=*sharedbrain*" --filter "reference=*agora*" --filter "reference=*eidos*"

  integration-test:
    name: Integration Test
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start all services
        run: |
          docker compose -f $COMPOSE_FILE up --build -d
          echo "Waiting for all services to become healthy..."
          for svc in sharedbrain agora agora-mcp eidos; do
            echo "  Waiting for $svc..."
            docker compose -f $COMPOSE_FILE wait $svc
          done
          echo "All services healthy."

      - name: Verify service connectivity (smoke test)
        run: |
          echo "=== Smoke Test ==="
          echo "1. SharedBrain health..."
          curl -f http://localhost:8080/health/simple && echo "  ✓ SharedBrain healthy" || echo "  ✗ SharedBrain FAILED"

          echo "2. Agora health..."
          curl -f http://localhost:7430/ && echo "  ✓ Agora healthy" || echo "  ✗ Agora FAILED"

          echo "3. Eidos health..."
          curl -f http://localhost:8750/ && echo "  ✓ Eidos healthy" || echo "  ✗ Eidos FAILED"

          echo "4. SharedBrain MCP..."
          curl -s http://localhost:7421/health/simple && echo "  ✓ SharedBrain MCP healthy" || echo "  ✗ SharedBrain MCP FAILED"

      - name: Run Python integration tests
        run: |
          docker compose -f $COMPOSE_FILE run --rm -T sharedbrain \
            python bin/bos pulse --limit 5

      - name: Collect logs
        if: always()
        run: |
          docker compose -f $COMPOSE_FILE logs --tail=100 > /tmp/integration-logs.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: /tmp/integration-logs.txt

      - name: Cleanup
        if: always()
        run: docker compose -f $COMPOSE_FILE down -v

  kairon-e2e-test:
    name: kairon E2E (Containerized)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/kairon

    steps:
      - uses: actions/checkout@v4

      - name: Build kairon E2E image
        run: |
          docker compose -f docker/docker-compose.e2e.yml build

      - name: Start E2E services
        run: |
          docker compose -f docker/docker-compose.e2e.yml up -d postgres

      - name: Wait for postgres
        run: |
          for i in $(seq 1 10); do
            if docker compose -f docker/docker-compose.e2e.yml exec -T postgres pg_isready -U kairon -d gbrain_test 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/10)"
            sleep 3
          done

      - name: Run E2E tests (core path: ontoderive smoke)
        run: |
          docker compose -f docker/docker-compose.e2e.yml run --rm kairon-e2e \
            uv run --no-sync pytest packages/ontoderive/tests/test_e2e.py \
              -v --timeout=120 -q --tb=short -p no:cacheprovider

      - name: Collect E2E test logs
        if: failure()
        run: |
          docker compose -f docker/docker-compose.e2e.yml logs --tail=100 > /tmp/kairon-e2e-logs.txt

      - name: Upload E2E test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kairon-e2e-logs
          path: /tmp/kairon-e2e-logs.txt

      - name: Cleanup E2E environment
        if: always()
        run: docker compose -f docker/docker-compose.e2e.yml down -v
