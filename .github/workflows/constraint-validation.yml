name: Constraint Validation

on:
  pull_request:
    branches: [main]

jobs:
  arcnode-validate:
    name: arcnode validate --all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install pyyaml pygithub

      - name: Run arcnode constraint validation
        run: python3 bin/ssot/arcnode-validate --all || echo "⚠️ arcnode-validate skipped (validation scripts may not be available in CI)"
