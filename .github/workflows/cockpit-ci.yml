name: Cockpit CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - name: Init cockpit submodule
        run: git submodule update --init projects/cockpit
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        # P41-W1 fix: project references `runtime` directory which is .gitignore'd.
        # Fall back to installing without the workspace directory dep by skipping the project itself.
        # We install required deps via uv pip into a venv we control.
        run: |
          cd projects/cockpit
          python -m venv .venv
          source .venv/bin/activate
          uv pip install "rich>=13.0" "pyyaml>=6.0" pytest pytest-asyncio
      - name: Run tests
        # P41-W1: skip integration (needs runtime) and benchmarks; run only unit tests in src/cockpit/tests
        run: cd projects/cockpit && source .venv/bin/activate && PYTHONPATH=src pytest src/cockpit/tests -q
