name: hermes-console-ci
# P47 E: hermes-console (TS + bun + Vite). 复用已加的 "test": "bun test" (bus_adapter 5 pass).
on: [push, pull_request]

jobs:
  test:
    name: hermes-console bun test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: bun test
        run: cd projects/hermes-console && bun install --frozen-lockfile && bun test
