name: cockpit-ui-ci
# P47 E 续: hermes-console (TS + bun + Vite) 已合并入 projects/cockpit-ui/ (P30 重组).
# 测试入口: npm test → bash tests/baseline-check.sh
on: [push, pull_request]

jobs:
  test:
    name: cockpit-ui baseline check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: bun install
        run: cd projects/cockpit-ui && bun install --frozen-lockfile
      - name: baseline check
        run: cd projects/cockpit-ui && bash tests/baseline-check.sh
