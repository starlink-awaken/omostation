name: cockpit-ui-ci
# cockpit-ui is an embedded repo (not a git submodule), tracked in .gitignore.
# CI cannot checkout it from the root repo. This workflow runs in the
# cockpit-ui repo itself (omostation-hermes-console) via its own .github/workflows/.
# This root workflow is disabled to avoid false failures.
on:
  workflow_dispatch: {}

jobs:
  test:
    name: cockpit-ui baseline check (disabled — runs in cockpit-ui repo)
    runs-on: ubuntu-latest
    steps:
      - run: echo "cockpit-ui CI runs in its own repo (omostation-hermes-console)"
