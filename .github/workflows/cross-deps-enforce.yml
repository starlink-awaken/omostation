name: cross-deps-enforce
# P47+: 跨层 import 违规 enforce (防回归).
# 复用 scripts/check-cross-deps.py. 规则: cockpit→kairon / agora→cockpit /
# ecos→kairon / omo→kairon. cockpit→runtime 是设计依赖 (agent_runtime 桥接) 不拦.
on: [push, pull_request]

jobs:
  check:
    name: cross-layer deps check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run cross-deps check
        run: python3 scripts/check-cross-deps.py
