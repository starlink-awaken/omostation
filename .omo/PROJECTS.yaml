# PROJECTS.yaml — 全系统项目注册表
# 根目录下所有项目的注册信息。未注册的目录应移入 projects/ 或 _archived/

runtime:
  agentmesh: { path: agentmesh, status: active }
  KOS: { path: KOS, status: active }
  ops: { path: ops, status: active }
  Agora: { path: Agora, status: active }
  SharedBrain: { path: SharedBrain, status: active }
  Forge: { path: Forge, status: active }

tool:
  kronos: { path: kronos, status: active }
  Iris: { path: Iris, status: active }
  eidos: { path: eidos, status: active }
  ontoderive: { path: ontoderive, status: active }
  minerva: { path: minerva, status: active }
  sophia: { path: sophia, status: active }
  SSOT: { path: SSOT, status: active }
  gbrain-repo: { path: gbrain-repo, status: active }
  MetaOS: { path: MetaOS, status: active }
  codeanalyze: { path: codeanalyze, status: active }
