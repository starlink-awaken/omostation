# PROJECTS.yaml — 全系统项目注册表
# 基于 omostation unified repo 架构（2026-05-29 更新）

# 嵌入式仓库（projects/ 下，每个有自己的 .git）
embedded:
  kairon:
    path: projects/kairon
    status: active
    type: python-monorepo
    packages: 17
    tech: UV workspace, hatchling, ruff
    desc: 知识工程与研究栈（知识摄取/推理/研究/治理/认知）

  SharedBrain:
    path: projects/SharedBrain
    status: active
    type: python
    lines: 71K
    tech: conductor, fastapi, uvicorn
    desc: 数字化生命 OS

  agentmesh:
    path: projects/agentmesh
    status: active
    type: typescript-monorepo
    packages: 7
    tech: bun, TypeScript
    desc: 多 Agent SDK（网关+编排+工具包+引擎+CLI）

  gbrain:
    path: projects/gbrain
    status: active
    type: typescript
    tech: bun, TypeScript, Postgres (TypeORM)
    desc: Postgres 原生知识脑

  _archived:
    path: projects/_archived
    status: archived
    type: archive
    items: 22
    desc: 已迁移旧项目的统一备份

# 根仓库元项目
root:
  omostation:
    path: .
    status: active
    type: root-repo
    desc: 统一入口 + 治理 + CI/CD
    remote: starlink-awaken/omostation

# 治理（omostation 根仓库的一部分）
governance:
  .omo:
    path: .omo
    status: active
    type: governance-kb
    files: 89 tracked
    desc: 治理知识库（状态/架构/审计/复盘/标准）

  .github:
    path: .github/workflows
    status: active
    type: ci-cd
    desc: GitHub Actions 工作流
