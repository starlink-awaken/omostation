description: |
  北极星场景 B：omostation 项目持续升级情报雷达

  目标：建立自动化的技术情报订阅→分析→沉淀→建议机制，让 omostation 能感知并吸收外部技术进展。

  数据源（初期）：
    - ArXiv（cs.AI / cs.IR / cs.MA 类别）
    - GitHub Trending（Python/TypeScript，AI/Agent 方向）
    - HuggingFace 新模型/工具发布
    - 技术博客 RSS（LangChain、LlamaIndex、Anthropic 等）

  处理流程：
    1. 定期抓取（每日/每周）→ 去重过滤
    2. 与 omostation 当前架构（agora/kairon/gbrain）做相关性匹配
    3. 有价值内容自动入库 gbrain/KOS，打标签（#tech-radar #upgrade-candidate）
    4. 每周生成《技术雷达简报》：Top 候选升级项 + 理由 + 落地难度评估

  验收标准：
    - 运行完整一个周期（7 天）
    - 输出包含 ≥3 条有效升级建议的技术雷达简报
    - 至少 1 条建议已转化为 omostation planned 任务
    - gbrain 中可查询到 ≥10 条带标签的技术情报记录

  实现策略：
    - 优先复用 kairon 现有研究/爬取能力（minerva/sophia 包）
    - 调度通过现有 agora 网关或 cron
    - 不引入新的外部依赖，先用 kairon 内部能力跑通
