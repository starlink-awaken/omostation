id: REMEDIATE-WF-CONV-P0-DISPATCHER
phase: '42'
priority: P0
title: Phase 7 — dispatcher 独立化为 L3 daemon
description: |
  核心矛盾：ecos 是 L0 协议层，无法 import L1/L2 项目。
  当前 ecos/workflow/executor.py 在 try/except 中尝试 import metaos/runtime/aetherforge，
  但 ecos 的 pyproject.toml 永远不能加这些依赖（否则破坏 L0 约束）。

  方案：
  1. ecos/workflow 保留：DSL 定义 (M1 YAML) + schema 校验 + X1-X4 治理管线 + 后端注册表定义
  2. 新建 ecos/workflow/daemon.py (L3 兼容层)：
     - 继承 backend_registry 注册表定义
     - 可 import metaos/runtime/aetherforge（因为 L3 可依赖 L2/L1）
     - 提供 execute_m1_workflow(实际调用后端) 作为对外 API
  3. ecos/workflow/executor.py 保持不变（纯 subprocess，无新增依赖）
  
  更简洁实现：在 ecos 内部用 subprocess 替代 try/except import。
  因为 swarm 和 runtime 都有 CLI 入口，通过 subprocess 调用比 import 更符合分层原则。
status: active
risk_level: L2
allowed_operation_level: L3
human_approval_required: false
acceptance_criteria:
- ecos/workflow/executor.py 不包含任何 try/except import 上层包
- swarm backend 通过 subprocess 调用 aetherforge CLI 执行
- runtime backend 通过 subprocess 调用 runtime CLI 执行
- symphony backend 无变化（同为 L0）
- 66 workflow tests 全过
- 780 ecos tests 全过
deliverables:
- 重写 swarm_backend.py (subprocess 模式)
- 重写 runtime_backend.py (subprocess 模式)
- 回归测试
