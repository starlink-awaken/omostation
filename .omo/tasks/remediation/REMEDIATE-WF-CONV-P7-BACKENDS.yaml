title: 修复 swarm/runtime backend 为 subprocess + agora MCP 路由
description: "当前 swarm 和 runtime backends 试图直接 import 上层包（aetherforge/runtime），\n由于 ecos 是 L0 无法依赖这些包，全部 fallback 到 mock。\n\
  \n修复方案：\n1. swarm_backend.py：改为通过 subprocess 调用 aetherforge CLI\n   `uv run --package aetherforge python -m aetherforge.main\
  \ swarm run --json`\n2. runtime_backend.py：改为通过 subprocess 调用 runtime CLI\n   `uv run --package runtime python -m runtime.cli\
  \ exec run --json`\n3. 保留 agora MCP 路由模式为第一优先（通过 agora MCP 工具）\n4. subprocess 模式为第二优先（不依赖 agora 可用性）\n5. mock 为最后 fallback\n"
