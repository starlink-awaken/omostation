id: OPC-P3-GATE-D-OPENING
title: "OPC-P3 Gate D 实施追踪 (D1→D2→D3→D4→D5→D)"
status: in_progress
priority: P0
domain: opc
created: "2026-06-11"
parent_task: OPC-P3-SWARM-SPINE
prerequisites:
  - opc_phase2_gate_c_passed
  - opc_p2_implementation_complete
description: |
  Track P3 Gate D implementation sub-gates per OPC-MASTER-EXECUTION-PLAYBOOK §8.
  Each sub-gate requires real runtime evidence before being claimed passed.

  Strategic note (2026-06-11): P3 D1 (Task Object Runtime Binding) was attempted
  and blocked by:
    1. swarm-engine: deep refactor drift (organs.* imports broken since SOLID
       refactor). SwarmLifecycleManager cannot be instantiated without stubbing
       12 missing modules. Patching this is out of scope for D1 mini-close.
    2. omo: _promotion_eval expects task status=candidate/pending and phase
       matching goals current+1, but task create defaults to status=planned
       with no phase field. Worker-cmd task subcommands are not wired into
       the omo CLI dispatcher (only task list/create are exposed).
  Strategic options to break the block:
    A) Patch swarm-engine imports (low priority, high risk of regression)
    B) Build a thin P3 binding using only omo + cockpit (skip swarm-engine)
       and document the architectural debt
    C) Escalate to upstream (block P3 entirely until swarm-engine refactor
       lands)
  Per Playbook §3 "no agent may apply for a later gate while an earlier gate
  in the same phase is still open" — D2-D5 are blocked until D1 closes.
  Per Playbook §4.1 "do not write passed before runtime evidence exists" —
  we don't claim D1 passed.
sub_gates:
