description: |
  Track P2 Gate C implementation sub-gates per OPC-MASTER-EXECUTION-PLAYBOOK §7.
  Each sub-gate requires real runtime evidence (command output, test results)
  before being claimed passed. No Gate C-level "passed" until C1-C4 all close.

  Red lines (per Playbook §7):
    - no fake zone_count
    - no crash path hidden by docs-only updates
    - no single subprocess stdout blob counted as a knowledge hit
    - do not claim ingest/archive from design text alone
    - do not close Gate C with local-only prose and no trace
sub_gates:
  - id: OPC-P2-C1
    title: "Local Contract Hardening"
    status: passed
    claimed_verdict: pass
    criteria:
      - "cockpit search --all --json returns valid JSON"
      - "top-level response fields complete (zone, query, zone_count, results, total)"
      - "no traceback when KOS is unavailable"
      - "tests exist and pass for local-only, --all, --json, and empty results"
    evidence:
      command: "cd projects/cockpit && uv run pytest tests/test_cli.py::TestP2GateC1LocalContract -v"
      result: "5/5 tests passed in 0.10s"
      files_changed:
        - "projects/cockpit/src/cockpit/cli.py (removed dead 'return 0', replaced hard-coded zone_count.kos=1 + fake result injection with real KOS response parsing via _extract_kos_items(), added text-mode 'query:' field, added _log_kos_skip helper)"
        - "projects/cockpit/tests/test_cli.py (added TestP2GateC1LocalContract class with 5 tests)"
      runtime_evidence: |
        - "cockpit search 'test' --json → {zone:all, query:test, total:2, zone_count:{local:2}, results:[2 items with 8 T4 fields]}"
        - "cockpit search 'test' --all --json → zone_count:{local:2, kos:0}, total:2, KOS results injected: 0"
        - "cockpit search 'x' --all (KOS unavailable) → exit 0, no traceback, zone_count:{local:0, kos:0}"
        - "ruff check cli.py + test_cli.py → All checks passed!"
      self_check:
        - "test_local_only_json_contract: PASS"
        - "test_all_with_kos_unavailable_no_traceback: PASS"
        - "test_text_and_json_express_same_facts: PASS"
        - "test_empty_results_returns_well_formed: PASS"
        - "test_kos_zone_count_is_real_not_fake: PASS (red line guard)"
      residual_risk: |
        - "KOS zone still 0 — Gate C2 will activate real KOS query path"
        - "Vault zone still missing — Gate C3 will add vault source"
        - "P2-T0 persistence debts (kairon JSONL, gbrain non-atomic) remain open, non-blocking for C1"
    closed_at: "2026-06-11"
  - id: OPC-P2-C2
    title: "KOS Activation"
    status: not_started
    criteria:
      - "one real query returns non-empty local and/or KOS results through unified format"
      - "KOS output is structured as result items, not raw stdout"
      - "zone_count.kos matches actual merged items"
    red_lines:
      - "do not count a single subprocess stdout blob as one valid knowledge hit"
      - "do not call Gate C2 passed if query does not actually reach KOS"
  - id: OPC-P2-C3
    title: "Vault Activation"
    status: not_started
    criteria:
      - "at least one real query hits two zones"
      - "zone_count shows more than one non-zero zone in at least one acceptance run"
      - "vault results carry T4 metadata"
    red_lines:
      - "no file listing masquerading as search"
      - "no empty shell route counted as zone activation"
  - id: OPC-P2-C4
    title: "Real Trace Closure"
    status: not_started
    criteria:
      - "at least one query has a trace with input, zones queried, result count, and writeback/archive evidence"
      - "trace is reproducible by command and file reference"
    red_lines:
      - "do not claim ingest/archive from design text alone"
      - "do not close Gate C with local-only prose and no trace"
gate: Gate C
