  ❌ P3 Gate D 退回到 not_yet_passed
  ❌ llm-gateway/compute-mesh 仓未拉取
final_close_condition: |
  ✅ E1-E4 全部 runtime 实证
  ✅ 验收包 6 项全有 evidence
  ✅ 红线 6 项全 hold

