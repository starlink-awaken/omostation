id: OPC-P4-MODEL-COMPUTE
title: "OPC-P4: Model & Compute Plane"
status: in_progress
priority: P0
domain: opc
created: "2026-06-11"
prerequisites:
  - opc_phase3_gate_d_passed
  - llm_gateway_repo_available
  - compute_mesh_repo_available
  - opc_p2_section5_boundaries_established
  - opc_section19_cross_repo_debt_closed   # E1-E4 收口
description: |
  P4 removes direct model/provider coupling from business modules.
  llm-gateway = only model provider; compute-mesh = only worker discovery.
  Business code NEVER imports openai/anthropic/vertexai or runs subprocess
  for inference directly.

  Source-of-truth: docs/OPC-PHASE4-MODEL-COMPUTE.md
sub_gates:
  - id: P4-E1
    title: "Model Registry SSOT (models.yaml in llm-gateway)"
    status: passed
    criteria:
      - '≥3 provider × ≥2 model per provider'

      - '字段含 provider/model_id/context/cost/latency'

    evidence_requirement: "llm-gateway/src/llm_gateway/registry_data/models.yaml 落地 + ≥10 model"
  - id: P4-E2
    title: "Compute Mesh Worker Discovery"
    status: passed
    criteria:
      - '≥1 worker (本地 ollama 或 stub) registered'

      - '5s heartbeat 跑通'

      - '≥1 任务端到端 dispatch 成功'

    evidence_requirement: "compute-mesh worker registered + heartbeat trace"
  - id: P4-E3
    title: "任务 budget policy 落地"
    status: passed
    closed_at: "2026-06-12T02:35:00Z"
    criteria:
      - '≥1 业务调用 (P3 D5 demo) 实测 budget 拒绝路径'

      - '触发 §19 debt register'

    evidence_requirement: "P3 D5 demo 跑通 + §19 debt register hit"
    evidence:
      - ".omo/tasks/registry/done/OPC-P4-E3/evidence-package.md"
      - ".omo/tasks/registry/done/OPC-P4-E3/budget-reject-summary.md"
      - ".omo/debt/items/DEBT-OPC-P4-BUDGET-OPC-P4-BUDGET-DEMO.yaml"
    closeout: |
      E3 closeout 2026-06-12: budget policy governance hardened.
      - 5 fields in route_info.budget_policy (task_id/budget_usd/estimated_cost_usd/model/debt_path)
      - Debt file reuse policy: same task_id → same file, refresh in-place
        with occurrence_count + first_seen_at + last_seen_at (no junk accumulation)
      - 20/20 executor engine tests pass (3 new closeout tests added)
      - scripts/opc_p4_budget_audit_demo.py exit=0, debt file produced
    red_lines_followed:
      - 'no business path bypassed llm-gateway'
      - 'no traceback leaked — structured error dict returned'
      - 'no debt file accumulation on repeat triggers'
  - id: P4-E4
    title: "跨仓 audit trail 归因"
    status: passed
    closed_at: "2026-06-12T02:48:00Z"
    criteria:
      - '每次 LLM 调用写入 llm-gateway/audit/...'

      - '含 task_id/role/model/cost/latency'

      - 'omo audit-rollout 跨仓聚合'

    evidence_requirement: "audit trail + omo audit-rollout report 实证"
    evidence:
      - ".omo/tasks/registry/done/OPC-P4-E4/evidence-package.md"
      - ".omo/tasks/registry/done/OPC-P4-E4/audit-rollout-summary.md"
      - ".omo/tasks/registry/done/OPC-P4-E4/llm-audit-sample.json"
    closeout: |
      E4 closeout 2026-06-12: LLM audit trail 跨仓归因闭环.
      - Pydantic schema (LLMCallAuditRecord) 强制 8 必填字段:
        task_id/role/provider/model/input_tokens/output_tokens/total_cost_usd/latency_ms
        + ts (UTC Z) / route / metadata
      - 空字符串 task_id/role 触发 ValueError (schema-level guard)
      - fcntl 进程锁保证 jsonl 并发写安全
      - 5/5 llm-gateway P4 audit 测试通过 (3 新增 closeout 测试)
      - omo audit-rollout 跨仓聚合: workspace R0 (density=0.0) + omo n/a
        (子仓缺 §17 dispatcher 入口, 显式诚实标记, 非虚假绿)
      - 真实 audit 样本: llm-audit-sample.json = 1 条 record (task_id=opc-p4-audit-demo)
    red_lines_followed:
      - 'audit-rollout 不假装全绿 (omo n/a 诚实标记)'
      - 'sample.json 是从 demo 跑后真实 jsonl 复制, 非手写 fixture'
      - 'drift 比例 73.8% 属 §19 历史债, 不在 E4 关账范围'

  - id: P4-FINAL
    title: "Gate E 三面一致收口"
    status: passed
    closed_at: "2026-06-12T03:10:00Z"
    evidence:
      - "docs/OPC-PHASE4-MODEL-COMPUTE.md (Status: Gate E passed)"
      - "docs/OPC-MASTER-EXECUTION-PLAYBOOK.md (P4 line: Gate E passed)"
      - "projects/omo/tests/test_opc_phase_governance_alignment.py (2 new tests)"
    closeout: |
      Gate E closed 2026-06-12: 三面一致 (docs/omo tests/projects).
      - docs/OPC-PHASE4-MODEL-COMPUTE.md: Status: Gate E passed, signal opc_phase4_gate_e_passed
      - docs/OPC-MASTER-EXECUTION-PLAYBOOK.md: P4 line: implementation complete; Gate E passed (2026-06-12, E1-E4 closed)
      - omo tests: test_p4_gate_e_three_way_alignment_closed_2026_06_12 + test_p5_prerequisite_signal_now_satisfied
      - 9/9 omo alignment tests pass

gate: Gate E
gate_status: passed
gate_closed_at: "2026-06-12T02:55:00Z"
gate_note: |
  P4 implementation entry opened on 2026-06-12 after P3 Gate D passed.
  E1 passed on 2026-06-12: static registry seeds + loader + CLI route landed,
  and runtime executor `_call_llm()` now routes one real business path through
  llm-gateway registry role selection.
  E2 passed on 2026-06-12: compute-mesh now has a minimal worker registry,
  5s heartbeat, and dispatch demo (`compute_mesh.api.cli worker-demo --json`).
  E3 passed on 2026-06-12: budget policy governance closeout landed.
  Engine `_call_llm()` enforces budget pre-provider-call, registers/refreshes
  OMO debt at `.omo/debt/items/DEBT-OPC-P4-BUDGET-*.yaml`, exposes 5 governance
  fields in `route_info.budget_policy` (task_id/budget_usd/estimated_cost_usd/
  model/debt_path), and refuses budget overflow without raising tracebacks.
  20/20 executor engine tests pass; evidence at
  `.omo/tasks/registry/done/OPC-P4-E3/evidence-package.md`.
  E4 passed on 2026-06-12: LLM audit trail 跨仓归因闭环.
  `LLMCallAuditRecord` Pydantic schema 强制 8 必填字段
  (task_id/role/provider/model/input_tokens/output_tokens/total_cost_usd/latency_ms)
  + ts/route/metadata. fcntl 进程锁保证 jsonl 并发写安全. 5/5 llm-gateway
  P4 audit 测试通过. omo audit-rollout 跨仓聚合: workspace R0 (density=0.0)
  + omo 子仓 n/a (显式诚实标记). 真实 audit 样本: task_id=opc-p4-audit-demo.
  证据: `.omo/tasks/registry/done/OPC-P4-E4/evidence-package.md`.
  Gate E closed on 2026-06-12 after E1-E4 all passed and
  docs/omo tests/projects three-way alignment verified.
