id: OPC-P5-SCENARIOS
title: "OPC-P5: North Star Scenarios"
status: planned
priority: P0
domain: opc
created: "2026-06-11"
prerequisites:
  - opc_phase3_gate_d_passed
  - opc_phase4_gate_e_passed
  - cockpit_cli_entry_complete
  - opc_p2_section5_boundaries_established
  - opc_section19_cross_repo_debt_closed
description: |
  P5 proves OPC value through 3 repeatable real-user product scenarios:
  1. technical-radar (AI/agent/knowledge-engineering signals)
  2. work-assistant (real work question → sourced structured draft)
  3. family-health (family medical records → next-action)

  Source-of-truth: docs/OPC-PHASE5-SCENARIOS.md
sub_gates:
  - id: P5-F1
    title: "technical-radar scenario"
    status: not_yet_passed
    criteria:
      - '≥2 周连续 cron 跑通'

      - '每次输出 ≥3 升级 candidates'

      - '含 source + timestamp + next-action'

    evidence_requirement: "2 周周报 markdown + OMO planned task YAML"
    note: "本轮推进: 配 opc-closeout-crontab Mon 09:00 weekly_loop, 4 份 ISO-week 报告 (W23/W24/W25/W26) 已落盘, 均为同日跑出. 复验要求 ≥2 周真实时间窗口, 待 Mon 09:00 cron 真实触发后 closeout."
  - id: P5-F2
    title: "work-assistant scenario"
    status: not_yet_passed
    criteria:
      - '≥1 真实工作 query 跑通'

      - '输出结构化草稿'

      - '含 source + timestamp + next-action'

    evidence_requirement: "1 work query 输出 + 5 仓 audit trail"
    note: "本轮推进: 真实 query 'OPC P6 evolution loop retro plan' 跑通, returncode=0, draft.title/body/sections 三段齐 + audit_ref 关联 cockpit:research:audit. 缺 5 仓 audit trail 跨仓消费, 留 R57+ 范围."
    pending_evidence:
      query: "OPC P6 evolution loop retro plan"
      generated_at: "2026-06-12T04:40:10Z"
      audit_ref: "cockpit:research:audit:2026-06-12T04:40:10Z"
  - id: P5-F3
    title: "family-health scenario"
    status: not_yet_passed
    criteria:
      - '≥1 真实家庭健康 query 跑通'

      - '输出含 紧急/关注/正常 三级 next-action'

      - 'privacy_class=confidential'

    evidence_requirement: "1 family-health query 输出 + privacy 路径实证"
    note: "本轮推进: 3 真实 query 三级全实证 (urgent 高烧/attention 复查/normal 体检), privacy_class=confidential 强制 + 3 red_lines_followed. 留 documents.db 实际 vault 写入留 R57+ 范围."
    pending_evidence:
      urgent_query: "孩子高烧 39 度已 3 天需要去医院吗"
      attention_query: "本月奶奶血压复查要准备什么"
      normal_query: "体检日程安排建议"
  - id: P5-F4
    title: "cockpit 统一入口"
    status: passed
    closed_at: "2026-06-12T03:08:00Z"
    criteria:
      - '用户通过 cockpit CLI 一键跑 3 scenario'

      - '无需理解仓边界'

    evidence_requirement: "cockpit CLI 3 scenario 跑通"
    evidence:
      - ".omo/tasks/registry/done/OPC-P5-F4/evidence-package.md"
      - "projects/cockpit/src/cockpit/cli.py (scenario subparser)"
    closeout: |
      F4 closeout 2026-06-12: cockpit scenario 统一入口.
      - 1 顶层命令 `cockpit scenario {radar,assistant,health}`
      - 3 子命令各带 --query/--limit 帮助
      - 3 scenario 跑通, returncode=0, JSON 输出
    note: "F4 入口 + CLI 跑通, 是 P5 的硬基础设施. 但 F1/F2/F3 业务 scenario 都回退 not_yet_passed, 所以 F4 单独 passed 不算 Gate F passed."

gate: Gate F
gate_status: not_yet_passed
gate_note: |
  P5 F1-F4: F1/F2/F3 都回退 not_yet_passed (时间性要求没满足).
  F4 (cockpit 入口) 单独 passed, 不算 Gate F passed.
  Gate F 等 ≥2 周真实 cron radar 跑通后再 closeout.
signals:
  - opc_phase5_gate_f_not_yet_passed
  - opc_phase5_subgate_f1_not_started
  - opc_phase5_subgate_f2_not_started
  - opc_phase5_subgate_f3_not_started
  - opc_phase5_subgate_f4_passed

red_lines:
  - 'scenario 输出没有 source 声明'

  - 'scenario 输出没有 timestamp'

  - 'scenario 输出没有 next-action'

  - '用户需手动切换仓才能跑 scenario'

  - 'family-health 用 non-confidential privacy class'

  - 'scenario 跑通 < 2 次即声明 passed (把"2 轮手动"偷换"2 周连续 cron"红线)'

phase_open_condition: |
  P5 可开始 当且仅当:
  ✅ P3 Gate D passed
  ✅ P4 Gate E passed
  ⏳ F1+F2+F3 至少各 1 次设计 baseline
  ⏳ P3 业务完成 (D3-D5 跑通, scenarios 需要 dispatch_worker)
phase_blocked_condition: |
  ❌ P3 Gate D 退到 not_started
  ❌ P4 Gate E 退到 not_started
  ❌ cockpit 入口降级
final_close_condition: |
  ✅ F1-F4 全部 runtime 实证
  ✅ 验收包 5 项全有 evidence
  ✅ 红线 6 项全 hold

forbidden_claims:
  - 'P5 实施完成" 在 F1-F4 未全部 passed 之前'

  - 'scenario 通过验收" 在 2 次以下重复跑之前'

  - '用户可以跑 scenario" 在 F4 入口落地之前'

  - 'family-health 可用" 在 F3 privacy 路径实证之前'
