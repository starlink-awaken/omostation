id: REMEDIATE-ARC-CONV-P6-CALIBRATE
phase: '45'
priority: P2
title: Phase 6 — AAMF 治理节点重同步与校准
description: >
  AAMF 注册了 28 个 ARCH_NODE，但 governance 日志停摆 28 天。
  - governance.jsonl 最后一条 2026-05-26
  - runtime_drift 观测（agora/kos offline）来自 5 月，未跟进
  - arcnode-calibrate 从未运行过
  - 子系统列表 vs ARCH_NODE 注册表可能已不一致

  方案：
  1. 运行 arcnode-drift-check 获取当前 drift 状态
  2. 运行 arcnode-calibrate 获取评分基线
  3. 对比 workspace 16 个活跃项目 VS AAMF 28 个节点
     - 缺少的：c2g, bus-foundation, observability, omo-debt, cockpit,
       aetherforge, l4-kernel, family-hub, spaces, hermes-console, model-driven
     - 过期的：agentmesh（已归档）, aggre-research（已归档）,
       hermes-self-evolution（已归档）, gateway（已归档）
  4. 更新或重新注册节点 YAML
  5. 运行 arcnode-evolve --self-report 获取 Level 2 指标
  6. 建立校准 baseline-latest.json + scorecard-latest.md

  执行顺序：先 P1 激活 cron → 等待几次 drift-check/evelve 积累数据 →
  再执行 P6 校准。
