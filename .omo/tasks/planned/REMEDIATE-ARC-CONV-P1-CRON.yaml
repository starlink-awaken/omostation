description: >
  AAMF 框架建了 17 个 arcnode-* 脚本，但治理自动化 cron job 全部未调度。
  governance.jsonl 最后一条：2026-05-26，停摆 28 天。

  当前仅 2 个 cron job：gateway 日志轮转 + omo-cleanup。
  缺失的 9 个 cron job：
  - arcnode-drift-check 每日 5:00 (no_agent)
  - arcnode-evolve 每日 6:00 (agent)
  - arcnode-sniff-deps 每日 6:05 (no_agent)
  - arcnode-dep-aging 每日 6:10 (no_agent)
  - arcnode-sync-constitution 每日 6:20 (no_agent)
  - arcnode-graph 每周一 7:00 (agent)
  - arcnode-resolve-review 每周一 9:00 (no_agent)
  - arcnode-report 每周一 9:30 (agent)
  - arcnode-calibrate 每季度 (agent)

  方案：
  1. 用 cronjob tool 注册全部 9 个 cron job
  2. 固定运行顺序（不冲突的时间窗口）
  3. 首次运行后验证 governance.jsonl 有新条目
  4. 检查并修复 5 月的 runtime_drift 观测（agora/kos offline）
