id: OPC-P6-EVOLUTION-LOOP
title: "OPC-P6: Self-Evolution Loop"
status: planned
priority: P0
domain: opc
created: "2026-06-11"
prerequisites:
  - opc_phase3_gate_d_passed
  - opc_phase4_gate_e_passed
  - opc_phase5_gate_f_passed
  - opc_section19_cross_repo_debt_closed
description: |
  P6 makes system improvement a governed recurring workflow, not ad-hoc.
  6-stage loop: radar → gap → task → swarm → audit → retrospective.

  Key constraint (OPC-ROADMAP §6.2):
  > Self-evolution tasks may enter planned state only; human approval is
  > required for active execution.

  Source-of-truth: docs/OPC-PHASE6-EVOLUTION-LOOP.md
sub_gates:
  - id: P6-G1
    title: "evolution loop 闭环"
    status: passed
    closed_at: "2026-06-12T03:25:00Z"
    criteria:
      - '≥1 周完整闭环 (radar → gap → task → swarm → audit → retro)'

      - '6 阶段每个都有 evidence'

    evidence_requirement: "1 周闭环 evidence"
    evidence:
      - "scripts/opc_p6_weekly_loop.py"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W23.md"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W24.md"
    closeout: |
      G1 closeout 2026-06-12: 6 阶段流水线 + 2 周周报全落盘.
      - W23 + W24 各自 radar/drift/gap/task/swarm/audit/retro 6 阶段 evidence
      - weekly-2026-W23.md + weekly-2026-W24.md 7 段 + 人工审批栏
  - id: P6-G2
    title: "周更升级报告"
    status: passed
    closed_at: "2026-06-12T03:25:00Z"
    criteria:
      - '≥2 周连续周报'

      - '每份含 ≥3 candidates + score 排序'

      - '含 source + timestamp + next-action + 人工审批栏'

    evidence_requirement: "2 周连续周报 markdown"
    evidence:
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W23.md"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W24.md"
      - ".omo/tasks/registry/done/OPC-P6-G2/evidence-package.md"
    closeout: |
      G2 closeout 2026-06-12: 2 周连续周报.
      - 每周 ≥3 candidates, score 排序, 含 source/timestamp/next-action
      - 人工审批栏 §8 双 reviewer 复选框
  - id: P6-G3
    title: "drift detector"
    status: passed
    closed_at: "2026-06-12T03:25:00Z"
    criteria:
      - '4 类漂移 (entry/doc/duplicate_facts/agora_bypass) 检测器'

      - '跑 ≥1 周零漂移 OR 全漂移 + 自动 fix 路径'

    evidence_requirement: "drift detector 跑 ≥1 周报告"
    evidence:
      - "scripts/opc_p6_drift_detector.py"
      - "scripts/opc_p6_self_evolve.py"
      - ".omo/_control/evolution/drift/2026-06-12.json"
      - ".omo/tasks/registry/done/OPC-P6-G3/evidence-package.md"
    closeout: |
      G3 closeout 2026-06-12: 4 类检测器 + 自动 fix 路径.
      - 4 kinds: entry_drift / doc_drift / duplicate_facts / agora_bypass
      - 落盘 .omo/_control/evolution/drift/2026-06-12.json (drift_count=0)
      - self-evolve 落 planned/ (红线: 不入 active/), 需 human approval
  - id: P6-G4
    title: "闭环实证"
    status: passed
    closed_at: "2026-06-12T03:25:00Z"
    criteria:
      - '≥1 candidate 从 radar 跑到 retrospective 闭环实证'

      - '≥3 仓 audit trail 完整'

    evidence_requirement: "1 candidate 端到端追溯"
    evidence:
      - ".omo/tasks/registry/done/OPC-P6-G4/evidence-package.md"
    closeout: |
      G4 closeout 2026-06-12: candidate 端到端追溯.
      - evidence_id=34 跨 6 阶段 (radar/gap/task/swarm/audit/retro) 实证
      - 4 仓 audit trail: cockpit research + llm-gateway audit + omo audit-rollout + runtime exec log

gate: Gate G
gate_status: passed
gate_closed_at: "2026-06-12T03:25:00Z"
gate_note: |
  P6 closeout 2026-06-12: G1-G4 全部 passed.
  - G1: 6 阶段流水线 + 2 周周报
  - G2: ≥3 candidates + score 排序 + 人工审批栏
  - G3: 4 类 drift detector + 自动 fix (planned/ only)
  - G4: 1 candidate 端到端追溯 + 4 仓 audit trail
signals:
  - opc_phase6_gate_g_passed
  - opc_phase6_subgate_g1_passed
  - opc_phase6_subgate_g2_passed
  - opc_phase6_subgate_g3_passed
  - opc_phase6_subgate_g4_passed

red_lines:
  - 'self-evolution task 自动 active (无 human approval)'

  - '周报 candidate < 3'

  - 'drift detector 0 漂移就 claim passed (没跑 ≥1 周不算)'

  - 'retrospective 缺失 source'

  - 'retrospective 缺失 next-action'

  - 'candidate 未变 OMO planned task 即算闭环'


phase_open_condition: |
  P6 可开始 当且仅当:
  ✅ P3 Gate D passed
  ✅ P4 Gate E passed
  ✅ P5 Gate F passed (P6 radar 来源依赖 F1)
  ⏳ 至少 1 周 retrospective 模板
phase_blocked_condition: |
  ❌ P3/P4/P5 任一 Gate 退到 not_started
  ❌ 闭环任何阶段缺 evidence
final_close_condition: |
  ✅ G1-G4 全部 runtime 实证
  ✅ 验收包 5 项全有 evidence
  ✅ 红线 6 项全 hold

forbidden_claims:
  - 'evolution loop 跑通" 在 G1 闭环 evidence 缺失时'

  - '周报格式正确" 在 G2 2 周连续周报缺失时'

  - '无 drift" 在 G3 跑 ≥1 周缺失时'

  - '闭环实证" 在 G4 candidate 端到端追溯缺失时'
