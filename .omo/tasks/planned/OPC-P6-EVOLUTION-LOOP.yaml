id: OPC-P6-EVOLUTION-LOOP
title: "OPC-P6: Self-Evolution Loop"
status: in_progress
priority: P0
domain: opc
created: "2026-06-11"
prerequisites:
  - opc_phase3_gate_d_passed
  - opc_phase4_gate_e_passed
  - opc_phase5_gate_f_passed
  - opc_section19_cross_repo_debt_closed
description: |
  P6 makes system improvement a governed recurring workflow, not ad-hoc.
  6-stage loop: radar → gap → task → swarm → audit → retrospective.

  Key constraint (OPC-ROADMAP §6.2):
  > Self-evolution tasks may enter planned state only; human approval is
  > required for active execution.

  Source-of-truth: docs/OPC-PHASE6-EVOLUTION-LOOP.md
sub_gates:
  - id: P6-G1
    title: "evolution loop 闭环"
    status: not_yet_passed
    criteria:
      - '≥1 周完整闭环 (radar → gap → task → swarm → audit → retro)'

      - '6 阶段每个都有 evidence'

    evidence_requirement: "1 周闭环 evidence"
    evidence:
      - ".omo/tasks/registry/done/OPC-P6-G1/evidence-package.md"
      - "scripts/opc_p6_weekly_loop_cron.sh"
      - ".omo/_control/evolution/loop/trace-index.json"
      - ".omo/_control/evolution/loop/2026-W23.json"
      - ".omo/_control/evolution/loop/2026-W24.json"
      - ".omo/_control/evolution/loop/2026-W25.json"
      - ".omo/_control/evolution/loop/2026-W26.json"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W23.md"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W24.md"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W25.md"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W26.md"
    assessment: |
      2026-06-12 复验: 6 阶段实现与 weekly 载体存在, 但周级闭环证据主要来自
      同日模拟/预演, 未达到"≥1 周完整闭环"验收边界.

      Readiness / Cadence 区分 (2026-06-12 复验):
      - Readiness: 6 阶段脚本链路可运行, trace-index / weekly markdown / loop json 可落盘
      - Cadence: 周级闭环 evidence 来自真实周窗 (≥1 周)
      当前 Readiness 已满足, Cadence 仍未满足.
  - id: P6-G2
    title: "周更升级报告"
    status: not_yet_passed
    criteria:
      - '≥2 周连续周报'

      - '每份含 ≥3 candidates + score 排序'

      - '含 source + timestamp + next-action + 人工审批栏'

    evidence_requirement: "2 周连续周报 markdown"
    evidence:
      - ".omo/tasks/registry/done/OPC-P6-G2/evidence-package.md"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W23.md"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W24.md"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W25.md"
      - ".omo/tasks/registry/done/OPC-P6-G1/weekly-2026-W26.md"
      - ".omo/_control/evolution/approval-board/current.json"
    assessment: |
      2026-06-12 复验: 周报格式与字段实现已具备, 但未满足"≥2 周连续周报"的
      真实时间窗口要求, 暂不通过.

      Readiness / Cadence 区分 (2026-06-12 复验):
      - Readiness: weekly markdown 包含 source/timestamp/next-action/审批栏
      - Cadence: ≥2 周连续周报来自真实 cron / 周窗
      当前 Readiness 已满足, Cadence 仍未满足.
  - id: P6-G3
    title: "drift detector"
    status: not_yet_passed
    criteria:
      - '4 类漂移 (entry/doc/duplicate_facts/agora_bypass) 检测器'

      - '跑 ≥1 周零漂移 OR 全漂移 + 自动 fix 路径'

    evidence_requirement: "drift detector 跑 ≥1 周报告"
    evidence:
      - ".omo/tasks/registry/done/OPC-P6-G3/evidence-package.md"
      - "scripts/opc_p6_self_evolve_cron.sh"
      - "scripts/opc_p6_approval_board.py"
      - ".omo/_control/evolution/approval-board/current.json"
      - ".omo/_control/evolution/approval-board/current.md"
      - ".omo/_control/evolution/drift/2026-06-12T044316.json"
      - ".omo/_control/evolution/drift/2026-06-12T050610.json"
      - ".omo/_control/evolution/drift/ (17 files total)"
    assessment: |
      2026-06-12 复验: 4 类 detector 已落地, 但尚无"跑 ≥1 周"的真实时间性证据.
      同日多次运行不能替代周级观测.

      Readiness / Cadence 区分 (2026-06-12 复验):
      - Readiness: 4 类 drift detector 已实现, self-evolve 保持 planned-only
      - Cadence: 跑 ≥1 周零漂移 OR 漂移+fix 来自真实连续运行
      当前 Readiness 已满足, Cadence 仍未满足.
  - id: P6-G4
    title: "闭环实证"
    status: not_yet_passed
    criteria:
      - '≥1 candidate 从 radar 跑到 retrospective 闭环实证'

      - '≥3 仓 audit trail 完整'

    evidence_requirement: "1 candidate 端到端追溯"
    evidence:
      - ".omo/tasks/registry/done/OPC-P6-G4/evidence-package.md"
      - ".omo/_control/evolution/loop/2026-W23.json"
      - ".omo/_control/evolution/loop/trace-index.json"
      - ".omo/_delivery/audit-rollout/2026-06-12-5repos.json"
    assessment: |
      2026-06-12 复验: 存在端到端 candidate trace 和跨仓 audit trail, 但依赖
      未通过的周级闭环与升级报告, 因此前置标准未满足, G4 暂不通过.

      Readiness / Cadence 区分 (2026-06-12 复验):
      - Readiness: trace-index 可追 candidate -> weekly -> approval lane
      - Cadence: candidate 追溯来自真实周窗 (依赖 G1/G2 真实 cadence)
      当前 Readiness 已满足, Cadence 仍未满足.

gate: Gate G
gate_status: not_yet_passed
gate_note: |
  2026-06-12 复验后 Gate G 回退为 not_yet_passed.
  - G1-G4 均有实现或预演证据
  - 但时间性要求与人工审批红线未被硬证据满足
  Gate G 在真实周级运行和审批约束完成前不得再次申请通过.

  Readiness / Cadence 区分 (2026-06-12 复验):
  - Readiness: loop / report / detector / trace / approval board 全部已落地
  - Cadence: 真实周级运行窗口 (G1/G2/G3/G4 都缺)
  当前 Readiness 已满足, Cadence 仍未满足.
signals:
  - opc_phase6_gate_g_not_yet_passed
  - opc_phase6_subgate_g1_not_yet_passed
  - opc_phase6_subgate_g2_not_yet_passed
  - opc_phase6_subgate_g3_not_yet_passed
  - opc_phase6_subgate_g4_not_yet_passed

red_lines:
  - 'self-evolution task 自动 active (无 human approval)'

  - '周报 candidate < 3'

  - 'drift detector 0 漂移就 claim passed (没跑 ≥1 周不算)'

  - 'retrospective 缺失 source'

  - 'retrospective 缺失 next-action'

  - 'candidate 未变 OMO planned task 即算闭环'


phase_open_condition: |
  P6 可开始 当且仅当:
  ✅ P3 Gate D passed
  ✅ P4 Gate E passed
  ⏳ P5 Gate F passed (P6 radar 来源依赖 F1; 当前未满足)
  ⏳ 至少 1 周 retrospective 模板
phase_blocked_condition: |
  ❌ P3/P4/P5 任一 Gate 退到 not_started
  ❌ 闭环任何阶段缺 evidence
final_close_condition: |
  ✅ G1-G4 全部 runtime 实证
  ✅ 验收包 5 项全有 evidence
  ✅ 红线 6 项全 hold

forbidden_claims:
  - 'evolution loop 跑通" 在 G1 闭环 evidence 缺失时'

  - '周报格式正确" 在 G2 2 周连续周报缺失时'

  - '无 drift" 在 G3 跑 ≥1 周缺失时'

  - '闭环实证" 在 G4 candidate 端到端追溯缺失时'
