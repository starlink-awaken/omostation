description: '战役 2 前置: 定义 5 Domain (Memory/Governance/Analysis/Persona/Capability)
  与 kairon 19 个活跃包

  (P31 合并后) 的精确映射, 产出 ADR-0007。


  5 Domain 边界:

  - Memory: kos, kronos, kairon-observability, kairon-pipeline

  - Governance: eidos, protocols-layer, ssot, kairon-lib-events, governance-layer
  (待确认)

  - Analysis: ontoderive, minerva, codeanalyze, sophia

  - Persona: sharedbrain-bridge, core-models, iris

  - Capability: forge, engine-core, llm-gateway, llm-gateway-kernel, kairon-plugin-sdk


  BOS URI 命名约定: bos://<domain>/<package>/<action>

  例: bos://memory/kos/search, bos://governance/eidos/schemas


  W1 实施 (P33-W1 战役 2 起步, 2026-06-06):

  - 6 SEED URI 已注册到本地 JSON (.omo/_knowledge/bos-registry.json)

  - 持久化走本地 JSON (避开 KOS 写入复杂), 战役 1 agora 接入时再迁 KOS

  - omo_bos.py 模块 + 15 单元测试

  - audit 总分 100.0 (A+) 守住, agora health 12/12 保持


  产 ADR-0007 包含:

  - 5 Domain 边界 + 19 包映射表

  - URI 命名语法 (严格 kebab-case)

  - 注册协议 (HTTP/SSE/stdio 任选)

  - 反向引用 (战役 1 动态注册时使用)

  - 战役 2 各 Domain 拆任务建议


  战役 2 子任务 (P33-W2-DOMAIN-*) 由本任务驱动派生。

