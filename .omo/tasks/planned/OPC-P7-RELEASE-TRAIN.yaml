  - opc_phase7_gate_h_not_yet_passed
  - opc_phase7_subgate_h1_not_started
  - opc_phase7_subgate_h2_not_started
  - opc_phase7_subgate_h3_not_started
  - opc_phase7_subgate_h4_not_started
  - opc_phase7_subgate_h5_passed

red_lines:
  - 'release notes 缺 summary/validation/debt 三件套'

  - 'phase 缺 retrospective 落盘'

  - 'dashboard 缺 phase/milestone/blockers/debt 4 字段'

  - 'cross-repo metrics 仅规划无消费'

  - '在 P3/P4/P5/P6 任一 Gate 未 passed 前 claim P7 Gate H'

  - 'P7 业务实施跳 H1-H5 顺序'


phase_open_condition: |
  P7 可开始 当且仅当:
  ✅ P3 Gate D passed
  ✅ P4 Gate E passed
  ✅ P5 Gate F passed
  ✅ P6 Gate G passed
  ✅ OPC 路线图所有前序 gate 收口 (P3-P6)
phase_blocked_condition: |
  ❌ P3/P4/P5/P6 任一 Gate 退到 not_started
  ❌ 任何前序 phase retrospective 缺失
final_close_condition: |
  ✅ H1-H5 全部 runtime 实证
  ✅ 验收包 6 项全有 evidence
  ✅ 红线 6 项全 hold
  ✅ OPC 路线图 8 阶段 (M0-M7) 全部 done
  ✅ 9 个连续 Gate (A → B → B2 → C → D → E → F → G → H) 全部 hit

forbidden_claims:
  - 'P7 完成" 在 H1-H5 未全部 passed 之前'

  - 'release train 跑通" 在 H1 retrospective 落盘缺失时'

  - 'phase gate 自动化" 在 H2 实证缺失时'

  - 'cross-repo metrics 治理闭环" 在 H3 cron 实证缺失时'

  - 'OPC 路线图 100% 收口" 在 Gate H 未 passed 时'
