id: OPC-P7-RELEASE-TRAIN
title: "OPC-P7: Governance Hardening & Release Train"
status: planned
priority: P0
domain: opc
created: "2026-06-11"
prerequisites:
  - opc_phase3_gate_d_passed
  - opc_phase4_gate_e_passed
  - opc_phase5_gate_f_passed
  - opc_phase6_gate_g_passed
  - opc_section19_cross_repo_debt_closed
description: |
  P7 makes OPC maintainable as a long-running personal OS.
  1-2 周 release train (cut → review → ship) + phase gates + cross-repo
  audit rollout + 文档同步 policy.

  Source-of-truth: docs/OPC-PHASE7-RELEASE-TRAIN.md
sub_gates:
  - id: P7-H1
    title: "release train 节奏"
    status: not_yet_passed
    criteria:
      - '≥1 个 1-2 周周期跑通 (cut → review → ship)'

      - 'retrospective 落盘'

    evidence_requirement: "1 release cycle + retrospective 落盘"
    evidence:
      - "scripts/opc_p7_release_cycle.py"
      - "scripts/opc_p7_release_cycle_cron.sh"
      - ".omo/_delivery/release/index.json"
      - ".omo/_delivery/release/v2026-06-12-r1.json"
      - ".omo/_delivery/release/v2026-06-15-r1.json"
      - ".omo/_delivery/release/v2026-06-19-r1.json"
      - ".omo/_delivery/release/v2026-06-22-r2.json"
      - ".omo/_delivery/release/v2026-06-26-r2.json"
      - ".omo/_delivery/release/CHANGELOG.md"
      - ".omo/tasks/registry/done/OPC-P7-H1/retrospective-v2026-06-12-r1.md"
      - ".omo/tasks/registry/done/OPC-P7-H1/retrospective-v2026-06-15-r1.md"
      - ".omo/tasks/registry/done/OPC-P7-H1/retrospective-v2026-06-19-r1.md"
      - ".omo/tasks/registry/done/OPC-P7-H1/retrospective-v2026-06-22-r2.md"
      - ".omo/tasks/registry/done/OPC-P7-H1/retrospective-v2026-06-26-r2.md"
      - ".omo/tasks/registry/done/OPC-P7-H1/evidence-package.md"
    assessment: |
      2026-06-12 复验: release runner / cron wrapper / cadence index 已落地, 但当前
      证据仍是同日预演/模拟周期, 不等于 1-2 周真实 release train.
  - id: P7-H2
    title: "跨仓 phase gate 实装"
    status: passed
    closed_at: "2026-06-12T06:52:00Z"
    criteria:
      - 'check_phase_gate.py 跑通'

      - '8 Gate acceptance 自动检查'

      - 'audit 写入'

    evidence_requirement: "check_phase_gate.py + 8 Gate 实证"
    evidence:
      - "scripts/opc_p7_phase_gate_check.py"
      - ".omo/_delivery/phase-gate/2026-06-12.json"
      - ".omo/_delivery/phase-gate/2026-06-12.md"
      - ".omo/tasks/registry/done/OPC-P7-H2/evidence-package.md"
    assessment: |
      2026-06-12 closeout: phase-gate checker 已稳定落盘 markdown/json 双报告, 并与
      plan/doc 当前状态保持自洽. H2 达标.
  - id: P7-H3
    title: "跨仓 audit rollout 硬扩"
    status: not_yet_passed
    criteria:
      - 'E2 dispatcher cron (monthly + weekly + pre-release)'

      - '5 仓 §17 metrics 自动聚合'

    evidence_requirement: "cron 实证 + 5 仓 metrics 聚合"
    evidence:
      - "scripts/opc_section17_metrics.py"
      - "scripts/opc_audit_rollout_5repos.py"
      - "scripts/opc_p7_audit_rollout_daemon.py"
      - "scripts/opc_p7_audit_rollout_cron.sh"
      - ".omo/_delivery/audit-rollout/index.json"
      - ".omo/_delivery/audit-rollout/2026-06-12-5repos.json"
      - ".omo/_delivery/audit-rollout/2026-06-12-weekly.json"
      - ".omo/cron/opc-closeout-crontab"
      - ".omo/tasks/registry/done/OPC-P7-H3/evidence-package.md"
    assessment: |
      2026-06-12 复验: 5 仓聚合和 cron wrapper 已落地, 但未形成真实 cron 触发的
      时间性证据. 同日手动运行不能视为 cron 实证.
  - id: P7-H4
    title: "文档同步 policy"
    status: passed
    closed_at: "2026-06-12T06:52:00Z"
    criteria:
      - '4 关键文档自动 lint (PANORAMA/ENTRY/JOURNEY/ROADMAP)'

      - '跨文档术语一致'

      - '0 stale'

    evidence_requirement: "doc-sync-lint 跑过"
    evidence:
      - "scripts/opc_p7_doc_lint.py"
      - ".omo/_delivery/doc-lint/2026-06-12.json"
      - ".omo/_delivery/doc-lint/2026-06-12.md"
      - ".omo/_delivery/doc-lint/index.json"
      - ".omo/tasks/registry/done/OPC-P7-H4/evidence-package.md"
    assessment: |
      2026-06-12 closeout: doc-lint 对 6 关键文档跑通, drift_total=0, 历史 index
      已建立且可持续累计. H4 以实现与当前零漂移为验收边界, 达标.
  - id: P7-H5
    title: "评审模板"
    status: passed
    closed_at: "2026-06-12T03:35:00Z"
    criteria:
      - 'REVIEW-TEMPLATE.md 落地'

      - '≥1 次 review 跑通'

    evidence_requirement: "REVIEW-TEMPLATE.md + 1 review"
    evidence:
      - "docs/OPC-REVIEW-TEMPLATE.md"
      - ".omo/tasks/registry/done/OPC-P7-H5/sample-review-P7-H1.md"
    closeout: |
      H5 closeout 2026-06-12: REVIEW-TEMPLATE.md 8 字段模板 + 1 真实 review.
      - 模板 8 字段: Phase/Subgate / Objective / Files / Commands / Runtime / Doc writeback / Open risks / Verdict
      - sample review 复审 P7-H1 release cycle runner (8 字段全填, verdict=LGTM)
    note: "H5 模板 + 1 真实 review 是硬基础设施, 已 closeout. H1-H4 因时间性/反证原因回退."

gate: Gate H
gate_note: |
  2026-06-12 复验后 Gate H 回退为 not_yet_passed.
  - H1 仍缺真实 1-2 周 release cycle 时间窗
  - H3 仍缺真实 cron 触发证据
  - H2/H4/H5 已有真实实现与当前 evidence
  OPC 路线图当前仅 P0-P4 确认 passed, P5-P7 仍在治理收口阶段.
gate_status: not_yet_passed
signals:
  - opc_phase7_gate_h_not_yet_passed
  - opc_phase7_subgate_h1_not_yet_passed
  - opc_phase7_subgate_h2_passed
  - opc_phase7_subgate_h3_not_yet_passed
  - opc_phase7_subgate_h4_passed
  - opc_phase7_subgate_h5_passed

red_lines:
  - 'release notes 缺 summary/validation/debt 三件套'

  - 'phase 缺 retrospective 落盘'

  - 'dashboard 缺 phase/milestone/blockers/debt 4 字段'

  - 'cross-repo metrics 仅规划无消费'

  - '在 P3/P4/P5/P6 任一 Gate 未 passed 前 claim P7 Gate H'

  - 'P7 业务实施跳 H1-H5 顺序'


phase_open_condition: |
  P7 可开始 当且仅当:
  ✅ P3 Gate D passed
  ✅ P4 Gate E passed
  ⏳ P5 Gate F passed (当前未满足)
  ⏳ P6 Gate G passed (当前未满足)
  ⏳ OPC 路线图所有前序 gate 收口 (P3-P6; 当前未满足)
phase_blocked_condition: |
  ❌ P3/P4/P5/P6 任一 Gate 退到 not_started
  ❌ 任何前序 phase retrospective 缺失
final_close_condition: |
  ✅ H1-H5 全部 runtime 实证
  ✅ 验收包 6 项全有 evidence
  ✅ 红线 6 项全 hold
  ✅ OPC 路线图 8 阶段 (M0-M7) 全部 done
  ✅ 9 个连续 Gate (A → B → B2 → C → D → E → F → G → H) 全部 hit

forbidden_claims:
  - 'P7 完成" 在 H1-H5 未全部 passed 之前'

  - 'release train 跑通" 在 H1 retrospective 落盘缺失时'

  - 'phase gate 自动化" 在 H2 实证缺失时'

  - 'cross-repo metrics 治理闭环" 在 H3 cron 实证缺失时'

  - 'OPC 路线图 100% 收口" 在 Gate H 未 passed 时'
