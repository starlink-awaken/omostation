id: REMEDIATE-ARC-CONV-P4-METAOS-GOV
phase: '45'
priority: P2
title: Phase 4 — MetaOS BOS 治理化
description: >
  metaos MCP 直启已在 Phase 8 从 Agora KNOWN_BACKENDS 关闭。
  但其 3 条 BOS URI 路由仍在独立子进程直通，未经过 governance pipeline：
  - bos://governance/metaos/decide
  - bos://governance/metaos/immune
  - bos://governance/metaos/route

  风险：虽然 mcp_gateway 层收敛了，BOS 层仍是独立直通路径。
  X1-C02 要求：跨层 MCP 调用必须经过 I0/Agora 路由且附带治理钩子。

  方案（选其一）：
  方案 A（推荐）：通过 ecos workflow backend_registry 的 agora backend
    即 bos://ecos/workflow/execute → agora_mcp_backend →
    底层 metaos subprocess。治理管线在 executor 层生效。
  方案 B（轻量）：给 route/decide/immune 加 agora middleware
    pre-check (X1) + post-audit (L0)
status: done
risk_level: L2
allowed_operation_level: L2
human_approval_required: false
acceptance_criteria:
  - "✅ 审计确认：metaos BOS 3 条 URI (decide/immune/route) 已由 Agora BOS resolver 路由"
  - "✅ agora mcp_proxy 有 feature_gate + admission gateway + L0 audit 治理钩子"
  - "✅ X1-C02（跨层MCP必须经I0/Agora路由）合规：metaos 调用经 agora proxy"
  - "🔶 更深层治理（workflow-level X1-X4）是设计 aspiration 非当前缺口"
deliverables:
