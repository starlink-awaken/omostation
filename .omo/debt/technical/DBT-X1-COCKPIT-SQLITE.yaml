id: DBT-X1-COCKPIT-SQLITE
type: architecture
level: moderate
status: resolved
created: "2026-06-13"
description: |
  cockpit/commands/scenario.py 中 family-health 场景使用了 sqlite3 直接读取
  projects/family-hub/family_hub.db。这违反了 X1 跨层通信必须经过 Agora 代理的原则。
context: |
  由于数据密级为 confidential 且避免 llm-gateway 泄露，此为临时方案。
  长远来看，应当开发本地的 MCP Server，将其作为 bos://family-hub 挂载，使得
  cockpit 既能保持隐私安全，又能符合 X1 隔离标准。
resolution:
  planned_phase: P6
  assignee: system
  resolved_at: "2026-06-13"
  comment: "已在 projects/family-hub 中实现 MCP Server，并通过 agora bos://persona/family-hub/health 挂载调用"
