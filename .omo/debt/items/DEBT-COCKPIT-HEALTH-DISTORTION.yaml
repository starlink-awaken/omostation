id: DEBT-COCKPIT-HEALTH-DISTORTION
title: cockpit health --full reports stale/incorrect service status
description: 'cockpit health --full shows "agora CLI 未安装", "l4-kernel 未安装", and "L1
  runtime 健康 0/12" even though agora SSE :7431, l4-kernel, and runtime cron-service
  :7450 are all running under launchd. The health probes do not align with the actual
  launchd-managed process topology.

  '
severity: medium
source: cockpit
domain: governance
scope: l3_entry_layer
owner: projects/cockpit
affected_roots:
- projects/cockpit/src/cockpit/commands/health.py
- projects/cockpit/src/cockpit/commands/status.py
- ~/runtime/matrix_state.json
remediation: '1. Update cockpit health probes to read launchctl list / matrix_state.json
  instead of relying on CLI availability. 2. Align runtime health aggregation with
  the new matrix_state.json schema (stdio MCP services, launchd daemons). 3. Add integration
  tests that verify health output against actual running services.

  '
