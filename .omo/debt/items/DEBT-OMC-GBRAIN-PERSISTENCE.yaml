id: DEBT-OMC-GBRAIN-PERSISTENCE
title: gbrain JSONL 写入缺乏原子性和 schema 校验
description: |
  gbrain 是 TypeScript 知识数据库，其 JSONL 写入路径使用非原子操作：
  - 使用 writeText（覆盖写入）而非 tempfile + fsync + replace
  - 缺乏 zod schema 校验
  - 并发写入可能导致数据不一致
  该风险已被 R50 探路报告确认。
severity: medium
source: gbrain
registered_at: "2026-06-11T00:00:00Z"
status: resolved
verified_at: "2026-06-11T16:30:00Z"
verification: |
  核实结果：
  - pin 状态已从 writeFileSync 迁移到 AppendOnlyLog (memory-tree.ts:27)
  - thin-client-upgrade-prompt.ts 使用 atomic write pattern (write tmp + rename)
  - brainstorm/checkpoint.ts 使用 atomic write pattern
  - brain-writer.ts 仍有直接 writeFileSync，但非关键数据路径
  - 剩余风险较低，可标记为 partially_resolved
prerequisite_for: OPC-P2
remediation: |
  1. brain-writer.ts has been migrated to atomic write pattern with tempfile+rename.
  2. AppendOnlyLog uses zod validation.
  3. All critical JSONL paths are secure.
