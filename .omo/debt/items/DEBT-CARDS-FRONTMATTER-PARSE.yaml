id: DEBT-CARDS-FRONTMATTER-PARSE
title: CARDS debt frontmatter YAML parsing fails when title contains colon
description: 'cockpit health --full and cards scanning report "mapping values are
  not allowed here" for multiple debt cards under ~/Documents/@驾驶舱/CARDS/debts/*.md.
  The root cause is unquoted title fields containing the colon character (`:`), which
  YAML interprets as key-value separators.

  '
severity: medium
source: cockpit
domain: governance
scope: l4_self_layer
owner: projects/cockpit
affected_roots:
- ~/Documents/@驾驶舱/CARDS/debts
- .omo/debt
remediation: '1. Audit all CARDS markdown files and quote title/frontmatter values
  that contain special YAML characters. 2. Add a frontmatter lint step to cockpit
  cards --check. 3. Consider migrating debt cards to the canonical .omo/debt/items
  registry.

  '
