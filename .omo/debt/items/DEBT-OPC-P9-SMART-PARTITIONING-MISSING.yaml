id: DEBT-OPC-P9-SMART-PARTITIONING-MISSING
title: "蜂群动态能力调度 (Smart Partitioning) 未实装"
description: >
  Phase 9 规划了 `11-dynamic-capability-load-balancing.md`。虽然在 `SwarmNode` 
  中已经实现了通过 `psutil` 上报 CPU/Memory 负载，但 `TaskRouter` 或 `ProxyManager` 
  在进行 BOS 路由或 A2A 转发时，并没有使用这些指标进行动态过滤。目前依然是
  随机或基于可用性的基础选路。
severity: medium
source: agora
registered_at: '2026-06-17T03:45:00Z'
last_seen_at: '2026-06-17T03:45:00Z'
status: open
remediation: >
  在 `agora.mcp_proxy.manager` 或 `bos_resolver.py` 中引入负载感知调度算法。
  当存在多个副本节点提供相同 BOS URI 时，优先选择 `load_score` 更低的节点。
