title: kairon JSONL 写入路径缺乏 schema 校验和原子写保障
description: 'kairon 是多包工作区（16 packages），部分包直接使用 json.dumps + open("a", ...)

  写入 JSONL 文件，未经过 schema 校验（Pydantic/AppendOnlyLog）或原子写入

  （tempfile + fsync + replace）。这可能导致：

  - 写入途中进程崩溃 → 部分行丢失

  - 并发写入冲突 → 行交错

  - schema 演化后旧数据与新 schema 不兼容

  '
severity: medium
