# X1-X4 治理检查器注册表
#
# 统一管理所有治理检查器，支持动态注册和执行
# 位置: .omo/_truth/registry/governance-checks.yaml

version: 1.0
description: X1-X4 治理检查器注册表

# 检查器注册
checkers:
  # X1 审计链
  - id: x1-audit-chain
    dimension: X1
    name: "审计链检查器"
    description: "检查操作是否安全：债务审计 + 操作审计"
    module: "ecos.l0.governance.checkers"
    class: "X1AuditChainChecker"
    type: python  # python / shell / mcp
    severity: high
    enabled: true
    schedule: "daily"  # daily / weekly / on-demand
    
  # X2 抗熵
  - id: x2-staleness
    dimension: X2
    name: "抗熵检查器"
    description: "检查数据是否新鲜：债务新鲜度 + 健康度趋势"
    module: "ecos.l0.governance.checkers"
    class: "X2StalenessChecker"
    type: python
    severity: medium
    enabled: true
    schedule: "daily"
    
  # X3 价值栈
  - id: x3-value
    dimension: X3
    name: "价值栈检查器"
    description: "检查投入是否合理：债务优先级 + SLA 达成"
    module: "ecos.l0.governance.checkers"
    class: "X3ValueChecker"
    type: python
    severity: medium
    enabled: true
    schedule: "weekly"
    
  # X4 一致性
  - id: x4-consistency
    dimension: X4
    name: "一致性检查器"
    description: "检查规则是否被遵守：CI + pre-commit + 文档"
    module: "ecos.l0.governance.checkers"
    class: "X4ConsistencyChecker"
    type: python
    severity: high
    enabled: true
    schedule: "daily"

# 执行策略
execution:
  # 并发执行
  parallel: true
  max_workers: 4
  
  # 超时设置
  timeout_seconds: 300
  
  # 重试策略
  retry:
    enabled: true
    max_retries: 2
    backoff_seconds: 5

# 告警配置
alerting:
  # 告警渠道
  channels:
    - type: log
      enabled: true
    - type: webhook
      enabled: false
      url: ""
  
  # 告警阈值
  thresholds:
    critical: 1   # 1 个 critical 立即告警
    high: 3       # 3 个 high 告警
    medium: 10    # 10 个 medium 汇总告警

# SLA 配置
sla:
  X1:
    response_hours: 1
    resolution_hours: 24
  X2:
    response_hours: 24
    resolution_hours: 168
  X3:
    response_hours: 24
    resolution_hours: 168
  X4:
    response_hours: 24
    resolution_hours: 72

# ════════════════════════════════════════════════════════════
# GaC 治理即代码 (Governance-as-Code) — ADR-0106 / 北极星 NORTH-STAR.md
# ════════════════════════════════════════════════════════════
# 动态一致性 7 机制: 声明式 + schema + 泛化执行器 + drift + 矛盾 + lifecycle + MOF 派生
# 加规则 = 加 YAML 条目 (不改代码); 执行器 (hook/MCP/gate) 读注册表泛化执行
gac:
  version: "1.0"
  north_star: ".omo/_knowledge/gac/NORTH-STAR.md"
  adr: "ADR-0106"

  # GaC schema (每条规则必填字段; 阶段 2 实现 pydantic 校验)
  schema:
    required: [id, dimension, layer, check_type, executor, lifecycle, version, created_at]
    source_type_enum: [native, indexed]  # native=GaC 是 SSOT; indexed=原真是策略 SSOT, GaC 执行索引
    indexed_required: [source_ref]  # source_type=indexed 时必填 (指向原真策略文件)
    dimension_enum: [X1, X2, X3, X4]
    layer_enum: [M0, L0, L1, L2, L3, L4, I0, X, meta]
    check_type_enum: [ssot_pointer, mof_stage_gate, bos_resolve, task_field, drift_audit, freshness, value_roi, audit_chain, direct_io_gate, hygiene_zero_byte, hygiene_case, legacy_index, schema_integrity, yaml_bypass, sensitive_write, mutation_surface, registry_integrity, internal_write_profile, state_plane_asset, ingress_boundary, ingress_artifact, mutation_ledger, doc_lifecycle, doc_archival, self_evolution_approval, task_policy, god_module, test_coverage, ssot_lint, mesh_routing, memory_rag, ingress_precheck, consistency_drift]
    lifecycle_enum: [draft, active, deprecated, removed]
    executor_enum: [hook_pre_edit, hook_post, ci_gate, omo_audit, mcp_tool, mof_validate, mof_audit, evidence_smoke, radar_cron, gc_cron, gac_local_gate]

  # GaC 规则注册 (声明式; 阶段 0 登记代表规则, 阶段 2 补全)
  rules:
    # ── X4 一致性: 跨层 SSOT (治 system.yaml vs CLAUDE.md vs 报告三处不一致病根) ──
    - id: CR-X4-HEALTH-SSOT
      dimension: X4
      layer: L2
      name: "健康分 SSOT"
      description: "health_score 唯一源 system.yaml, 文档用指针不复制"
      check_type: ssot_pointer
      target: ".omo/state/system.yaml::health_score"
      forbid_copy_in: ["CLAUDE.md", "**/*.md", "HEALTH_DASHBOARD.md"]
      executor: [hook_pre_edit, ci_gate, omo_audit]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-26"
      adr: "ADR-0106"

    # ── M0 model-driven: 7 阶段 Stage/Gate 派生一致 ──
    - id: CR-M0-STAGE-GATE
      dimension: X4
      layer: M0
      name: "M0 7 阶段 Stage/Gate 派生一致"
      description: "M1→M2→M3 派生必走 mof Stage/Gate (零风险派生)"
      check_type: mof_stage_gate
      target: "projects/model-driven (7 阶段引擎)"
      executor: [mof_validate, mof_audit, ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-26"
      adr: "ADR-0106"

    # ── L0 ecos: BOS 声明必须 resolve (治 102:0 声明/执行鸿沟) ──
    - id: CR-L0-BOS-RESOLVE
      dimension: X1
      layer: L0
      name: "BOS 声明/执行一致"
      description: "BOS URI 声明必须 resolve (evidence-smoke 防 alive 标志假阳)"
      check_type: bos_resolve
      target: "projects/agora/etc/bos-services.yaml"
      executor: [evidence_smoke, ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-26"
      adr: "ADR-0106"

    # ── L2 omo: 任务必声明 deliverable ──
    - id: CR-L2-TASK-DELIVERABLE
      dimension: X4
      layer: L2
      name: "任务 deliverable 文件路径必填"
      description: "OMO 任务必声明 deliverables (task-yaml-rules 规则 1)"
      check_type: task_field
      target: ".omo/tasks/**/*.yaml::deliverables"
      executor: [omo_audit, ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-26"
      adr: "ADR-0106"

    # ── X2 抗熵: GaC drift 自检 (元治理核心, 防 GaC 自己走偏) ──
    - id: CR-X2-GAC-DRIFT
      dimension: X2
      layer: meta
      name: "GaC drift 自检 (注册表 vs 实际执行)"
      description: "防 GaC 自己走偏: 注册表规则 vs hook/mcp/gate 实际注册, drift 告警 + 自愈"
      check_type: drift_audit
      target: "governance-checks.yaml::gac.rules vs executor 实际注册"
      executor: [radar_cron]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-26"
      adr: "ADR-0106"

    # ── X1 审计: agent 操作留痕 ──
    - id: CR-X1-AGENT-AUDIT
      dimension: X1
      layer: meta
      name: "agent 操作审计链"
      description: "agent 编辑经 MCP/omo CLI, 自动记 AppendOnlyLog (可追溯)"
      check_type: audit_chain
      target: "runtime/omo/_delivery/ingress/ingress-trail.jsonl"
      executor: [mcp_tool, omo_audit]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-26"
      adr: "ADR-0106"

    # ── X3 价值栈: 投入产出分级 (补 dimension 覆盖) ──
    - id: CR-X3-DEBT-TIER
      dimension: X3
      layer: L2
      name: "债务 X3 tier 必声明"
      description: "debt items 必声明 x3_tier (价值分级, 投入产出可量化)"
      check_type: value_roi
      target: ".omo/debt/items/*.yaml::x3_tier"
      executor: [omo_audit, ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-26"
      adr: "ADR-0106"

    # ── L1 运行时: 健康新鲜 (补 layer 覆盖) ──
    - id: CR-L1-RUNTIME-HEALTH
      dimension: X2
      layer: L1
      name: "运行时健康监控新鲜"
      description: "runtime 健康监控数据新鲜 (不超 24h, X2 抗熵)"
      check_type: freshness
      target: "projects/runtime (健康监控)"
      executor: [omo_audit, ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ── L3 入口: cockpit 唯一 CLI (补 layer 覆盖) ──
    - id: CR-L3-COCKPIT-ENTRY
      dimension: X4
      layer: L3
      name: "cockpit 唯一人类 CLI 入口"
      description: "cockpit 是唯一人类 CLI/Web 入口 (其他 CLI 程序接口, X4 一致)"
      check_type: ssot_pointer
      target: "projects/cockpit (唯一入口)"
      executor: [omo_audit, ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ── 直写红线: .omo 直写拦截 (报告债务①, direct-omo-io gate) ──
    - id: CR-L2-DIRECT-IO
      dimension: X1
      layer: L2
      name: ".omo 直写拦截 (走 omo ingress, 禁原生 write_text/mkdir)"
      description: "禁止绕过 omo ingress 直写 .omo (防状态竞态死锁, 报告债务① Critical)"
      check_type: direct_io_gate
      target: ".omo/ (omo lint direct-omo-io gate)"
      executor: [ci_gate, omo_audit]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ── hygiene: 0字节文件 + 大小写 inode (报告债务③, 防复发) ──
    - id: CR-HYG-01
      dimension: X4
      layer: meta
      name: "0 字节文件检查 (防空文件污染)"
      description: "pre-commit 扫描 0 字节文件 (报告建议3 CR-HYG-01)"
      check_type: hygiene_zero_byte
      target: "**/* (0 字节文件)"
      executor: [ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    - id: CR-HYG-02
      dimension: X4
      layer: meta
      name: "大小写 inode 一致 (防 APFS plan/Plans 混淆)"
      description: "pre-commit 大小写拼写一致性 (报告建议3 CR-HYG-02, APFS case-insensitive)"
      check_type: hygiene_case
      target: "**/* (大小写 inode 冲突)"
      executor: [ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ── 文档 SSOT: doc-ssot-lint (正交拆分, 禁硬编码项目元数据) ──
    - id: CR-X4-DOC-SSOT
      dimension: X4
      layer: meta
      name: "文档 SSOT (markdown 禁硬编码项目元数据, 引用 project-registry)"
      description: "markdown 禁硬编码 (包数/版本/Phase/健康分), 引用 docs/project-registry.yaml (bin/doc-ssot-lint.py 扫描)"
      check_type: ssot_pointer
      target: "docs/project-registry.yaml + bin/doc-ssot-lint.py 扫描范围"
      forbid_copy_in: ["AGENTS.md", "CLAUDE.md", "**/README.md", "LAYER-INDEX.md"]
      executor: [ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ── L2 omo: governance surfaces 面定义完整性 (阶段2, 架构 OWN 引用非 ingest) ──
    - id: CR-L2-SURFACES-INTEGRITY
      dimension: X4
      layer: L2
      name: "governance surfaces 面定义完整 (state/kernel/ingress plane)"
      description: "omo-governance-surfaces.yaml 面定义权威 (plane 资产归属), GaC 引用不复制; omo governance surfaces 校验完整"
      check_type: ssot_pointer
      target: ".omo/_truth/registry/omo-governance-surfaces.yaml::governance_stack"
      executor: [omo_audit, ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ── L2 omo: mutation surfaces broker 写权限 (阶段2, 架构 OWN 引用非 ingest) ──
    - id: CR-L2-MUTATION-BROKER
      dimension: X1
      layer: L2
      name: "mutation surfaces broker 写权限注册 (非 broker 禁写)"
      description: "mutation-surfaces.yaml broker 注册权威 (entrypoint+target+mode), workspace governance verify 校验; 非 broker 写 .omo = 违规"
      check_type: audit_chain
      target: ".omo/_truth/registry/mutation-surfaces.yaml::surfaces"
      executor: [omo_audit]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ── L0 protocols: 端口/vault/x-axis 注册表 SSOT (阶段3, 补 protocols 缺口) ──
    - id: CR-L0-PROTOCOLS-SSOT
      dimension: X4
      layer: L0
      name: "protocols 注册表 SSOT (端口/vault/x-axis 禁硬编码)"
      description: "protocols/{port,vault-paths,x-axis}-registry.yaml 协议层 SSOT, markdown/代码禁硬编码端口号; scripts/check-vault-paths.py CI 校验"
      check_type: ssot_pointer
      target: "protocols/port-registry.yaml + vault-paths.yaml + x-axis-registry.yaml"
      forbid_copy_in: ["**/*.md", "**/*.py"]
      executor: [ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ── X2 元治理递归: GaC 自举 (GaC 治 GaC 自身完整性, 深度分析 gap1/2/4) ──
    - id: CR-X2-GAC-BOOTSTRAP
      dimension: X2
      layer: meta
      name: "GaC 自举递归 (工具活/indexed 完整/exec 有效/schema 自洽)"
      description: "GaC 治一切, GaC 自己也要被治 (NORTH-STAR 元治理递归); bin/gac-bootstrap.py 检测 4 层: 工具活/死 + indexed source_ref 完整 + executor 执行有效 + schema 自洽"
      check_type: drift_audit
      target: "bin/gac-bootstrap.py (GaC 自身完整性自检)"
      executor: [ci_gate, radar_cron]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ── X2 元治理递归: GaC executor 注册 drift (机制3/4深化, 声明 vs 实际存在) ──
    - id: CR-X2-GAC-EXEC-DRIFT
      dimension: X2
      layer: meta
      name: "GaC executor 注册 drift (声明 vs 实际存在)"
      description: "GaC 规则声明 executor (ci_gate/omo_audit/evidence_smoke 等), 验证实际存在 (文件/命令/CI workflow); bin/gac-executor.py 检测 missing executor = 规则声明不存在的执行器"
      check_type: drift_audit
      target: "bin/gac-executor.py (executor 声明 vs 实际存在性)"
      executor: [ci_gate, radar_cron]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-06-27"
      adr: "ADR-0106"

    # ADR-0124 F-补 (2026-07-02): X2 governance-semantic-gate 规则补登记.
    # 病根: PR #17 S1 follow-up 时, bin/governance-semantic-gate.py 落地 + M1 实例
    # (projects/ecos/src/ecos/ssot/mof/m1/governance/GAC-RULE-CR-X2-GOVERNANCE-SEMANTIC-GATE.yaml)
    # 派生, 但本 registry SSOT 未登记 (X-Plane 跨边界工作残留).
    # 治本: 补登记, 满足 gac-convergence 守门 (P71 类 B: 工具未接 caller 反向).
    # 留 S2 F-14 治 sub-tools 漂移后, lifecycle 可考虑收紧.
    - id: CR-X2-GOVERNANCE-SEMANTIC-GATE
      dimension: X2
      layer: meta
      name: "治理语义门禁统一契约"
      description: "防声明/执行语义错位: 本地 gate 不只看 exit code, 还消费 gac-bootstrap/gac-executor/gac-mof-validate/mof-schema/adr-coverage/AGCP/package 的 JSON ok 字段; release 模式硬挡 active runs 和 release package 未决. PR #17 落地工具 (bin/governance-semantic-gate.py), M1 实例同步派生, 但 registry SSOT 漏登记 — 本 commit 补."
      check_type: schema_integrity
      target: "bin/governance-semantic-gate.py (统一消费治理工具 JSON 语义)"
      executor: [ci_gate, gac_local_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-07-02"
      adr: "ADR-0121"

    # ── X1 审计: GaC 元规则 — 声明绿必须真跑 (补元治理递归盲区) ──
    - id: CR-X1-EVIDENCE-RUNNABLE
      dimension: X1
      layer: meta
      name: "GaC 声明可执行证据 (声明绿必须真跑过)"
      description: "防元治理盲区: CR-X2-GAC-EXEC-DRIFT 验 'executor 文件存在' 不够, 需证据证明 'executor 真能跑出结果'. 元规则: 任何声明的 executor (尤其 evidence_smoke/mcp_tool/mof_validate 等低频/人工触发型) 必须在最近 N 天内有 evidence 落盘 (./omo/_delivery/evidence-smoke/<date>.json 等), 否则标 ghost executor. P2-1 (2026-07-02) — 实现见 radar_cron 周期检查 + ci_gate 兜底"
      check_type: audit_chain
      target: "executor_evidence_manifest: .omo/_delivery/evidence-smoke/<date>.json + .omo/_log/mof-validate.jsonl"
      executor: [radar_cron, ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-07-02"
      adr: "ADR-0106"

    # ── L0 协议: BOS URI 5 域边界 + kind 标签 (P2-2 2026-07-02) ──
    - id: CR-L0-BOS-DOMAIN-NORM
      dimension: X4
      layer: L0
      name: "BOS URI 5 域锁定 + kind 标签"
      description: "防 BOS 域越界 + 协议漂移: eCOS v6 锁定 5 主域 (memory/governance/analysis/persona/capability), 扩展域 (meta/omo/swarm/system/toolbox) 走 kind:bridge|facet. 跨域越界需在 .omo/standards/bos-uri-domain-standard.md 登记, 不可直接 commit. 标准: docs/PANORAMA.md + .omo/standards/bos-uri-domain-standard.md (P2-2 2026-07-02)"
      check_type: bos_resolve
      target: "projects/agora/etc/bos-services.yaml + .omo/standards/bos-uri-domain-standard.md"
      executor: [ci_gate]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-07-02"
      adr: "ADR-0106"

    # ── X4 一致性: bin 工具命名空间 (P3-1 ADR-0115 Phase 1 2026-07-02) ──
    - id: CR-META-BIN-NAMING
      dimension: X4
      layer: meta
      name: "bin 工具命名空间一致"
      description: "防命名漂移: bin/*.py 工具按域归类共享单前缀 (gac-/governance-/adr-/doc-/x2-/auto-merge-/submodule- 等), 禁止短前缀 gov- 代替 governance-. 命名迁移计划见 ADR-0115 Phase 2 (gov-history-stats → governance-history-stats). 标准: .omo/standards/bin-tool-naming.md"
      check_type: registry_integrity
      target: ".omo/standards/bin-tool-naming.md + bin/*.py"
      executor: [ci_gate, radar_cron]
      lifecycle: active
      version: "1.0.0"
      created_at: "2026-07-02"
      adr: "ADR-0106"

    # ── X1 审计: bin 工具未接 caller drift (P3-1 ADR-0115 Phase 1 2026-07-02) ──
    - id: CR-META-BIN-ORPHAN
      dimension: X1
      layer: meta
      name: "bin 工具未接 caller drift (工具存在但 0 caller)"
