doctor_checks:
  - id: root-agent-workflow-list
    description: Root runner can list workflows.
    required: true
    command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, list]
  - id: root-agent-workflow-agents
    description: Root runner can list registered agent profiles.
    required: true
    command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, agents]
  - id: root-agent-workflow-adapters
    description: Root runner can list external adapter contracts.
    required: true
    command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, adapters]
  - id: root-agent-workflow-integrations
    description: Root runner can list internal integration contracts.
    required: true
    command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, integrations]
  - id: root-agent-workflow-observe
    description: Observer audit can inspect run, lock, and ledger consistency.
    required: true
    command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, observe]
  - id: root-agent-workflow-verify-plan
    description: Root runner can select diff-aware verification checks.
    required: true
    command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, verify, --file, bin/agent-workflow.py]
  - id: root-agent-workflow-compliance
    description: Root runner can audit run, lock, ledger, and evidence compliance.
    required: true
    command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, compliance]
  - id: root-agent-workflow-status
    description: Root runner can summarize AGCP run, lock, claim, compliance, and lane status.
    required: true
    command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, status, --json]
  - id: root-governance-evolution-status
    description: Root runner can summarize systemic governance evolution roadmap status.
    required: true
    command: [uv, run, --with, pyyaml, python, bin/governance-evolution.py, status, --json]
  - id: cockpit-agent-workflow-list
    description: Cockpit L3 entry can delegate to the root runner.
    required: true
    command: [uv, run, --project, projects/cockpit, cockpit, agent-workflow, list]
  - id: cockpit-agent-bootstrap
    description: Cockpit L3 agent entry can show startup context.
    required: true
    command: [uv, run, --project, projects/cockpit, cockpit, agent, bootstrap, --skip-health]
  - id: cockpit-agent-status
    description: Cockpit L3 agent entry can show AGCP status.
    required: true
    command: [uv, run, --project, projects/cockpit, cockpit, agent, status, --json]
  - id: cockpit-agent-workflow-agents
    description: Cockpit L3 entry can expose registered agent profiles.
    required: true
    command: [uv, run, --project, projects/cockpit, cockpit, agent-workflow, agents]
  - id: cockpit-compass-help
    description: Cockpit C2G compass entry is available.
    required: true
    command: [uv, run, --project, projects/cockpit, cockpit, compass, --help]
  - id: c2g-bet-help
    description: C2G pitch-to-task ingress command is available.
    required: true
    command: [uv, run, --project, projects/c2g, c2g, bet, --help]
  - id: omo-bridge-help
    description: OMO bridge compatibility path for BMAD/OpenSpec is available.
    required: true
    command: [uv, run, --project, projects/omo, omo, bridge, --help]
  - id: mof-capabilities-registry
    description: MOF capability registry is present as the MOF SSOT.
    required: true
    command: [test, -f, .omo/_truth/registry/mof-capabilities.yaml]
  - id: mof-schema-validate
    description: MOF M1/M2 schema validation is runnable.
    required: true
    command: [python3, projects/ecos/src/ecos/ssot/tools/mof-schema-validate.py, --json]
  - id: mof-state-bridge
    description: MOF state bridge can report OMO task alignment.
    required: true
    command: [python3, projects/ecos/src/ecos/ssot/tools/mof-state-bridge.py, --json]
  - id: mof-drift
    description: MOF architecture drift detector is runnable.
    required: true
    command: [bin/mof-drift]
diff_checks:
  - id: agent-workflow-lint
    description: Workflow runner and registry contract validation.
    required: true
    paths:
      - bin/agent-workflow.py
      - .omo/_truth/registry/agent-workflows.yaml
      - .agents/skills/project-governance/SKILL.md
      - .omo/standards/agent-workflow-contract.md
    command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
  - id: agent-workflow-tests
    description: Focused tests for executable agent workflow control plane.
    required: true
    paths:
      - bin/agent-workflow.py
      - bin/change-lane-check.py
      - bin/gac-local-gate.py
      - .omo/_truth/registry/agent-workflows.yaml
      - tests/test_agent_workflow.py
    command: [uv, run, pytest, tests/test_agent_workflow.py, -q]
  - id: governance-evolution-validate
    description: Governance evolution roadmap structure and traceability validation.
    required: true
    paths:
      - .omo/_truth/registry/governance-evolution-roadmap.yaml
      - bin/governance-evolution.py
      - tests/test_governance_evolution.py
      - docs/GOVERNANCE-EVOLUTION-ROADMAP.md
      - README.md
      - AGENTS.md
    command: [uv, run, --with, pyyaml, python, bin/governance-evolution.py, validate, --json]
  - id: governance-evolution-tests
    description: Focused tests for governance evolution roadmap and CLI.
    required: true
    paths:
      - .omo/_truth/registry/governance-evolution-roadmap.yaml
      - bin/governance-evolution.py
      - tests/test_governance_evolution.py
    command: [uv, run, pytest, tests/test_governance_evolution.py, -q]
  - id: cockpit-agent-entry-tests
    description: Cockpit L3 entry tests for agent workflow delegation.
    required: true
    paths:
      - projects/cockpit/src/cockpit/cli.py
      - projects/cockpit/src/cockpit/commands/agent_workflow.py
      - projects/cockpit/src/cockpit/tests/test_agent_workflow_command.py
    command:
      - uv
      - run
      - --project
      - projects/cockpit
      - pytest
      - projects/cockpit/src/cockpit/tests/test_agent_workflow_command.py
      - -q
  - id: agora-bos-registry-tests
    description: Agora BOS registry tests for agent workflow governance routes.
    required: true
    paths:
      - projects/agora/etc/bos-services.yaml
      - projects/agora/tests/unit/test_bos_registry.py
    command:
      - uv
      - run
      - --project
      - projects/agora
      - pytest
      - projects/agora/tests/unit/test_bos_registry.py
      - -q
  - id: mof-schema-validate
    description: MOF M1/M2 schema validation for model edits.
    required: true
    paths:
      - .omo/_truth/registry/mof-capabilities.yaml
      - .omo/_truth/mof-version.yaml
      - projects/ecos/src/ecos/ssot/mof/**
      - projects/ecos/src/ecos/ssot/tools/mof-*.py
    command: [python3, projects/ecos/src/ecos/ssot/tools/mof-schema-validate.py, --json]
  - id: mof-state-bridge
    description: MOF to OMO state bridge alignment report for model edits.
    required: true
    paths:
      - .omo/_truth/registry/mof-capabilities.yaml
      - .omo/_truth/mof-version.yaml
      - projects/ecos/src/ecos/ssot/mof/**
      - projects/ecos/src/ecos/ssot/tools/mof-*.py
    command: [python3, projects/ecos/src/ecos/ssot/tools/mof-state-bridge.py, --json]
  - id: mof-drift
    description: MOF architecture drift detector for model edits.
    required: true
    paths:
      - .omo/_truth/registry/mof-capabilities.yaml
      - .omo/_truth/mof-version.yaml
      - projects/ecos/src/ecos/ssot/mof/**
      - projects/ecos/src/ecos/ssot/tools/mof-*.py
    command: [bin/mof-drift]
  - id: doc-ssot-lint
    description: Documentation SSOT semantic contract.
    required: true
    paths:
      - "*.md"
      - docs/**/*.md
      - docs/generated/**
      - .omo/standards/**/*.md
      - projects/*/AGENTS.md
      - projects/*/CLAUDE.md
      - projects/*/README.md
    command: [uv, run, --with, pyyaml, python, bin/doc-ssot-lint.py, --json]
  - id: project-layer-index
    description: Generated project layer digest freshness.
    required: true
    paths:
      - docs/project-registry.yaml
      - docs/generated/project-layer-index.md
      - bin/project-layer-index.py
    command: [uv, run, --with, pyyaml, python, bin/project-layer-index.py, --check]
  - id: ssot-guardian
    description: State-plane and generated artifact SSOT guard.
    required: true
    paths:
      - .omo/**
      - spaces/**
      - AGENTS.md
      - CLAUDE.md
      - README.md
      - ARCHITECTURE.md
      - LAYER-INDEX.md
      - docs/generated/**
    command: [uv, run, --with, pyyaml, python, bin/ssot-guardian.py]
  - id: gac-local-gate
    description: Full local governance gate for broad contract changes.
    required: true
    allowed_lanes: [code, docs, governance_code, governance_state, config]
    paths:
      - Makefile
      - bin/**
      - .omo/_truth/registry/**
      - .omo/standards/**
      - docs/**
      - AGENTS.md
      - CLAUDE.md
      - README.md
      - ARCHITECTURE.md
      - LAYER-INDEX.md
    command: [make, gac-local-gate]
workflows:
  - id: project-doc-change
    title: Project documentation change
    purpose: Keep documentation changes executable, SSOT-safe, and verifiable.
    agents:
      roles: [docs-agent, governance-agent]
      observer_policy: optional_for_broad_doc_rewrites
    allowed_lanes: [docs, governance_code, config]
    lock_scopes: [docs, doc-ssot]
    surfaces:
      read:
        - AGENTS.md
        - ARCHITECTURE.md
        - CLAUDE.md
        - LAYER-INDEX.md
        - README.md
        - .omo/standards/**
        - .agents/skills/project-governance/SKILL.md
        - bin/doc-ssot-lint.py
        - bin/gac-export-agents.py
        - bin/project-layer-index.py
        - docs/**
        - docs/generated/**
        - projects/*/AGENTS.md
        - projects/*/CLAUDE.md
        - projects/*/README.md
      write:
        - AGENTS.md
        - ARCHITECTURE.md
        - CLAUDE.md
        - LAYER-INDEX.md
        - README.md
        - .omo/standards/**
        - .agents/skills/project-governance/SKILL.md
        - bin/doc-ssot-lint.py
        - bin/gac-export-agents.py
        - bin/project-layer-index.py
        - docs/**
        - docs/generated/**
        - projects/*/AGENTS.md
        - projects/*/CLAUDE.md
        - projects/*/README.md
    phases:
      preflight:
        - id: status
          mode: required
          command: [git, status, --short]
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
      execute:
        - id: edit-docs
          mode: manual
          command: [agent, edit, docs-with-ssot-pointers]
      verification:
        - id: doc-ssot-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/doc-ssot-lint.py, --json]
        - id: ssot-guardian
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/ssot-guardian.py]
        - id: gac-local-gate
          mode: required
          command: [make, gac-local-gate]
      closeout:
        - id: diff-stat
          mode: required
          command: [git, diff, --stat]

  - id: project-code-change
    title: Project code change
    purpose: Route code changes through project-local verification and workspace governance gates.
    agents:
      roles: [engineering-agent, qa-agent, governance-agent]
      observer_policy: use_for_high_blast_radius_or_unattended_runs
    allowed_lanes: [code, governance_code, config]
    lock_scopes: ["project:{project}", root-gate]
    surfaces:
      read:
        - projects/{project}/**
        - docs/project-registry.yaml
        - .omo/_truth/registry/governance-checks.yaml
      write:
        - projects/{project}/**
    phases:
      preflight:
        - id: root-status
          mode: required
          command: [git, status, --short]
        - id: project-status
          mode: advisory
          cwd: projects/{project}
          command: [git, status, --short]
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
      execute:
        - id: implement
          mode: manual
          command: [agent, edit, project-code]
      verification:
        - id: project-tests
          mode: manual
          cwd: projects/{project}
          command: [project-local, test-command]
        - id: gac-local-gate
          mode: required
          command: [make, gac-local-gate]
      closeout:
        - id: diff-stat
          mode: required
          command: [git, diff, --stat]

  - id: governance-state-mutation
    title: Governed OMO or spaces mutation
    purpose: Force state-plane changes through OMO/C2G broker paths instead of ad-hoc file writes.
    agents:
      roles: [governance-agent, c2g-agent]
      observer_policy: recommended
    allowed_lanes: [governance_state]
    lock_scopes: [.omo, spaces, omo-broker]
    surfaces:
      read:
        - .omo/**
        - spaces/**
        - projects/omo/**
        - projects/c2g/**
      write:
        - .omo/**
        - spaces/**
    phases:
      preflight:
        - id: status
          mode: required
          command: [git, status, --short]
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
      execute:
        - id: broker-write
          mode: manual
          command: [omo-or-c2g, broker, mutate-state]
      verification:
        - id: ssot-guardian
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/ssot-guardian.py]
        - id: gac-local-gate
          mode: required
          command: [make, gac-local-gate]
      closeout:
        - id: mutation-ledger
          mode: manual
          command: [omo, event, emit, agent_mutation_complete]

  - id: c2g-spec-ingress
    title: C2G external spec ingress
    purpose: Convert BMAD/OpenSpec/Pitch inputs into governed OMO planned tasks.
    agents:
      roles: [strategy-agent, c2g-agent, governance-agent]
      observer_policy: optional
    allowed_lanes: [governance_state, docs]
    lock_scopes: [c2g-ingress, .omo/tasks/planned]
    surfaces:
      read:
        - runtime/sandbox/**
        - .omo/pitches/**
        - projects/c2g/**
        - projects/omo/**
      write:
        - .omo/tasks/planned/**
        - .omo/_delivery/ingress/**
    phases:
      preflight:
        - id: adapter-doctor
          mode: advisory
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, doctor]
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
      execute:
        - id: import-spec
          mode: manual
          command: [uv, run, --project, projects/omo, omo, bridge, --format, "{format}", "{source_file}"]
        - id: pitch-bet
          mode: manual
          command: [uv, run, --project, projects/cockpit, cockpit, compass, bet, "{source_file}"]
      verification:
        - id: ssot-guardian
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/ssot-guardian.py]
        - id: gac-local-gate
          mode: required
          command: [make, gac-local-gate]
      closeout:
        - id: planned-task-review
          mode: manual
          command: [agent, inspect, .omo/tasks/planned]

  - id: mof-model-change
    title: MOF model change
    purpose: Route M1/M2/M3 model edits through schema validation, state bridge audit, drift checks, and MOF version evidence.
    agents:
      roles: [mof-agent, governance-agent]
      observer_policy: recommended
    allowed_lanes: [governance_code, governance_state, docs]
    lock_scopes: [mof-model, mof-capabilities, omo-state-bridge]
    surfaces:
      read:
        - .omo/_truth/registry/mof-capabilities.yaml
        - .omo/_truth/mof-version.yaml
        - projects/ecos/src/ecos/ssot/mof/**
        - projects/ecos/src/ecos/ssot/tools/mof-*.py
      write:
        - .omo/_truth/registry/mof-capabilities.yaml
        - .omo/_truth/mof-version.yaml
        - projects/ecos/src/ecos/ssot/mof/**
    phases:
      preflight:
        - id: status
          mode: required
          command: [git, status, --short]
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
        - id: mof-schema-validate
          mode: required
          command: [python3, projects/ecos/src/ecos/ssot/tools/mof-schema-validate.py, --json]
      execute:
        - id: edit-mof-model
          mode: manual
          command: [agent, edit, mof-m1-m2-m3]
        - id: mof-version-record
          mode: manual
          command: [bin/mof-version, record, "<description>"]
      verification:
        - id: mof-schema-validate
          mode: required
          command: [python3, projects/ecos/src/ecos/ssot/tools/mof-schema-validate.py, --json]
        - id: mof-state-bridge
          mode: required
          command: [python3, projects/ecos/src/ecos/ssot/tools/mof-state-bridge.py, --json]
        - id: mof-drift
          mode: required
          command: [bin/mof-drift]
        - id: gac-local-gate
          mode: required
          command: [make, gac-local-gate]
      closeout:
        - id: diff-stat
          mode: required
          command: [git, diff, --stat]

  - id: mof-state-bridge-audit
    title: MOF state bridge audit
    purpose: Read-only audit of MOF schema health, M1/M2 coverage, and OMO task bridge alignment.
    agents:
      roles: [mof-agent, observer-agent, governance-agent]
      observer_policy: read_only_required
    allowed_lanes: [governance_code, governance_state]
    lock_scopes: [mof-state-bridge-readonly]
    surfaces:
      read:
        - .omo/_truth/registry/mof-capabilities.yaml
        - .omo/_truth/mof-version.yaml
        - .omo/tasks/**
        - projects/ecos/src/ecos/ssot/mof/**
      write: []
    phases:
      preflight:
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
      execute:
        - id: mof-schema-validate
          mode: required
          command: [python3, projects/ecos/src/ecos/ssot/tools/mof-schema-validate.py, --json]
        - id: mof-state-bridge
          mode: required
          command: [python3, projects/ecos/src/ecos/ssot/tools/mof-state-bridge.py, --json]
      verification:
        - id: mof-drift
          mode: required
          command: [bin/mof-drift]
        - id: agent-workflow-doctor
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, doctor]
      closeout:
        - id: handoff
          mode: manual
          command: [agent, report, mof-state-bridge-findings]

  - id: external-adapter-sync
    title: External adapter integration sync
    purpose: Keep BMAD, OpenSpec, beads, gstack, and Superpowers wired as optional inputs or discipline layers without making them SSOT authorities.
    agents:
      roles: [adapter-agent, strategy-agent, c2g-agent, governance-agent]
      observer_policy: optional
    allowed_lanes: [docs, governance_code, governance_state]
    lock_scopes: [external-adapters, c2g-ingress, agent-skills]
    surfaces:
      read:
        - .omo/_truth/registry/agent-workflows.yaml
        - .agents/skills/**
        - projects/c2g/**
        - projects/omo/**
      write:
        - .omo/_truth/registry/agent-workflows.yaml
        - .agents/skills/**
        - docs/**
    phases:
      preflight:
        - id: adapter-doctor
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, doctor]
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
      execute:
        - id: bmad-import
          mode: manual
          command: [uv, run, --project, projects/omo, omo, bridge, --format, bmad, "<source-file>"]
        - id: openspec-import
          mode: manual
          command: [uv, run, --project, projects/omo, omo, bridge, --format, openspec, "<source-file>"]
        - id: beads-import
          mode: manual
          command: [agent, import, beads-items-to-c2g-or-omo]
        - id: gstack-handoff
          mode: manual
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, handoff, "<run-id>"]
      verification:
        - id: adapter-doctor
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, doctor]
        - id: ssot-guardian
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/ssot-guardian.py]
        - id: gac-local-gate
          mode: required
          command: [make, gac-local-gate]
      closeout:
        - id: integration-map-review
          mode: manual
          command: [agent, inspect, external-adapter-health]

  - id: submodule-pointer-close
    title: Submodule pointer closeout
    purpose: Close project submodule work without dangling root pointers or unreachable SHAs.
    agents:
      roles: [release-agent, governance-agent]
      observer_policy: recommended_for_multi_submodule_updates
    allowed_lanes: [submodule_pointer, config]
    lock_scopes: [root-gitlinks, submodules]
    surfaces:
      read:
        - .gitmodules
        - projects/**
      write:
        - projects/*
    phases:
      preflight:
        - id: status
          mode: required
          command: [git, status, --short]
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
      execute:
        - id: pointer-transaction
          mode: required
          command: [bash, bin/submodule-pointer-transaction.sh, --dry-run]
      verification:
        - id: reachability
          mode: required
          command: [make, governance-release-gate]
        - id: gac-local-gate
          mode: required
          command: [make, gac-local-gate]
      closeout:
        - id: diff-stat
          mode: required
          command: [git, diff, --stat]

  - id: handoff-resume
    title: Compression-safe handoff and resume
    purpose: Persist enough workflow state that another agent or a compressed session can continue.
    agents:
      roles: [any-agent]
      observer_policy: optional
    allowed_lanes: [docs, code, governance_code, governance_state, config, submodule_pointer]
    lock_scopes: ["agent-run:{run_id}"]
    surfaces:
      read:
        - .omo/_delivery/agent-workflows/runs/**
        - .agents/**
      write:
        - .omo/_delivery/agent-workflows/runs/**
    phases:
      preflight:
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
      execute:
        - id: resume
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, resume, "{run_id}"]
      verification:
        - id: run-record
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, show-run, "{run_id}"]
      closeout:
        - id: close-run
          mode: manual
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, close, "{run_id}", --status, ok]

  - id: observer-audit
    title: Agent workflow observer audit
    purpose: Read-only oversight for workflow runs, locks, ledger events, and handoff evidence.
    agents:
      roles: [observer-agent, governance-agent]
      observer_policy: read_only_required
    allowed_lanes: [governance_code, governance_state]
    lock_scopes: [observer-readonly]
    surfaces:
      read:
        - .omo/_delivery/agent-workflows/runs/**
        - .omo/_delivery/agent-workflows/locks/**
        - .omo/_delivery/agent-workflows/events.jsonl
      write: []
    phases:
      preflight:
        - id: workflow-lint
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, lint]
      execute:
        - id: observe
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, observe]
      verification:
        - id: observe-json
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, observe, --json]
      closeout:
        - id: doctor
          mode: required
          command: [uv, run, --with, pyyaml, python, bin/agent-workflow.py, doctor]
