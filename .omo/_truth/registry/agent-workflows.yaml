---
status: active
lifecycle: ssot
owner: governance-team
last-reviewed: 2026-06-29
---

version: 1
description: Project-level executable workflows for AI agents working in omostation.
ssot:
  governance_rules: .omo/_truth/registry/governance-checks.yaml
  agent_protocol: .omo/standards/agent-mutation-protocol.md
  omo_surfaces: .omo/standards/omo-governance-surfaces.md
  doc_contract: .omo/standards/doc-ssot-contract.md
internal_integrations:
  gac:
    status: integrated
    authority: governance_gate
    owner: governance-team
    ssot_rule: Governance rules are canonical in .omo/_truth/registry/governance-checks.yaml; Markdown may only point to generated summaries.
    gate: make gac-local-gate
    gate_binding: make gac-local-gate
    runner_lint_binding: bin/gac-local-gate.py::agent-workflow-lint
    health_command: [bin/gac-validate.py, --gate]
    health_required: true
  omo:
    status: integrated
    authority: state_broker
    owner: omo-team
    ssot_rule: OMO owns governed state mutation; direct .omo writes are exceptional and must be called out.
    bridge_compat: uv run --project projects/omo omo bridge --format <format> <source-file>
    state_broker: projects/omo
    gate_binding: omo-bridge-help
    health_command: [uv, run, --project, projects/omo, omo, bridge, --help]
    health_required: true
  c2g:
    status: integrated
    authority: strategy_ingress
    owner: strategy-team
    ssot_rule: Strategy and external specs enter governed work through C2G/OMO planned task materialization.
    pitch_bet: uv run --project projects/c2g c2g bet <pitch.md>
    cockpit_entry: uv run --project projects/cockpit cockpit compass bet <pitch.md>
    gate_binding: c2g-bet-help
    health_command: [uv, run, --project, projects/c2g, c2g, bet, --help]
    health_required: true
  cockpit:
    status: integrated
    authority: entrypoint
    owner: cockpit-team
    ssot_rule: Cockpit is the L3 human entrypoint and delegates governance behavior to registered lower-layer tools.
    compass: uv run --project projects/cockpit cockpit compass --help
    agent: uv run --project projects/cockpit cockpit agent
    workflow: uv run --project projects/cockpit cockpit agent-workflow --help
    gate_binding: cockpit-agent-workflow-list
    health_command: [uv, run, --project, projects/cockpit, cockpit, agent-workflow, list]
    health_required: true
  mof:
    status: integrated
    authority: model_registry
    owner: ecos-team
    ssot_rule: MOF M1/M2/M3 model facts and capability tools are canonical under ecos/mof registries.
    capabilities: .omo/_truth/registry/mof-capabilities.yaml
    schema_validate: python3 projects/ecos/src/ecos/ssot/tools/mof-schema-validate.py --json
    state_bridge: python3 projects/ecos/src/ecos/ssot/tools/mof-state-bridge.py --json
    drift: bin/mof-drift
    gate_binding: mof-schema-validate
    health_command: [python3, projects/ecos/src/ecos/ssot/tools/mof-schema-validate.py, --json]
    health_required: true
runner:
  entrypoint: bin/agent-workflow.py
  generated_skill: .agents/skills/project-governance/SKILL.md
  run_state_dir: .omo/_delivery/agent-workflows/runs
  lock_state_dir: .omo/_delivery/agent-workflows/locks
  ledger_path: .omo/_delivery/agent-workflows/events.jsonl
  lock_ttl_hours: 24
claim_policy:
  mode: advisory
  required_paths:
    - AGENTS.md
    - CLAUDE.md
    - README.md
    - docs/GOVERNANCE-EVOLUTION-ROADMAP.md
    - projects/AGENTS.md
  tiers:
    - id: core-governance-required
      mode: required
      paths:
        - .agents/skills/**
        - .omo/_truth/registry/**
        - .omo/standards/**
        - bin/agent-workflow.py
        - bin/change-lane-check.py
        - bin/gac-local-gate.py
        - bin/governance-evolution.py
        - projects/agora/etc/bos-services.yaml
        - projects/cockpit/src/cockpit/cli.py
        - projects/cockpit/src/cockpit/commands/agent_workflow.py
        - projects/cockpit/src/cockpit/tests/test_agent_workflow_command.py
        - projects/ecos/src/ecos/ssot/mof/**
        - tests/test_agent_workflow.py
    - id: agent-entrypoint-advisory
      mode: advisory
      paths:
        - AGENTS.md
        - CLAUDE.md
        - README.md
        - docs/GOVERNANCE-EVOLUTION-ROADMAP.md
        - projects/AGENTS.md
evidence_schema:
  version: 1
  required_event_fields: [ts, event, run_id]
  command_result_fields: [id, command, returncode, duration_s, ok]
  closeout_required_events:
    - agent_workflow_verify
    - agent_workflow_closeout
    - agent_workflow_close
compliance_slo:
  stale_locks: 0
  closed_ok_without_evidence: 0
  required_integration_health: 100%
  doc_ssot_conflicts: 0
  generated_digest_drift: 0
agent_profiles:
  docs-agent:
    purpose: Maintain Markdown and project docs without duplicating SSOT facts.
    allowed_workflows: [project-doc-change]
    can_write_lanes: [docs]
    closeout_required: [doc-ssot-lint, ssot-guardian, gac-local-gate]
  engineering-agent:
    purpose: Implement project-local code changes with project tests and workspace gates.
    allowed_workflows: [project-code-change]
    can_write_lanes: [code, config]
    closeout_required: [project-tests, gac-local-gate]
  qa-agent:
    purpose: Verify code behavior and report failures without owning broad implementation changes.
    allowed_workflows: [project-code-change]
    can_write_lanes: [code]
    closeout_required: [project-tests]
  governance-agent:
    purpose: Route governance-sensitive edits through GAC, OMO, C2G, and SSOT checks.
    allowed_workflows:
      - project-doc-change
      - project-code-change
      - governance-state-mutation
      - c2g-spec-ingress
      - mof-model-change
      - mof-state-bridge-audit
      - external-adapter-sync
      - submodule-pointer-close
      - observer-audit
    can_write_lanes: [docs, governance_code, governance_state, config, submodule_pointer]
    closeout_required: [agent-workflow-lint, agent-workflow-observe, gac-local-gate]
  mof-agent:
    purpose: Maintain MOF M1/M2/M3 model changes, schema validation, state bridge alignment, and MOF version evidence.
    allowed_workflows: [mof-model-change, mof-state-bridge-audit]
    can_write_lanes: [governance_code, governance_state, docs]
    closeout_required: [mof-schema-validate, mof-state-bridge, mof-drift, gac-local-gate]
  c2g-agent:
    purpose: Convert strategy inputs, pitches, BMAD, or OpenSpec material into governed planned tasks.
    allowed_workflows: [governance-state-mutation, c2g-spec-ingress, external-adapter-sync]
    can_write_lanes: [governance_state, docs]
    closeout_required: [ssot-guardian, gac-local-gate]
  strategy-agent:
    purpose: Shape upstream intent before it is materialized into C2G or OMO task state.
    allowed_workflows: [c2g-spec-ingress, external-adapter-sync]
    can_write_lanes: [docs, governance_state]
    closeout_required: [planned-task-review]
  adapter-agent:
    purpose: Inspect and synchronize optional external tools without making them new governance authorities.
    allowed_workflows: [external-adapter-sync]
    can_write_lanes: [docs, governance_code, governance_state]
    closeout_required: [adapter-doctor, integration-map-review]
  release-agent:
    purpose: Close submodule pointer and release-gate work without dangling SHAs.
    allowed_workflows: [submodule-pointer-close]
    can_write_lanes: [submodule_pointer, config]
    closeout_required: [reachability, gac-local-gate]
  observer-agent:
    purpose: Run read-only oversight for locks, run records, ledger events, and handoff evidence.
    allowed_workflows: [observer-audit, mof-state-bridge-audit]
    can_write_lanes: []
    closeout_required: [observe-json, doctor]
  any-agent:
    purpose: Resume or hand off a compressed session through persisted run state.
    allowed_workflows: [handoff-resume]
    can_write_lanes: [docs, code, governance_code, governance_state, config, submodule_pointer]
    closeout_required: [run-record]
external_patterns:
  superpowers:
    status: integrated
    skill: using-superpowers
    authority: discipline_layer
    ssot_rule: Delegates project-specific truth to this registry, GAC, OMO/C2G, and MOF registries.
    ingress_workflow: project-governance-skill
    pattern: skill-first execution with explicit checklist and verification before closeout
    adapter: project-governance skill points back to this registry and runner
    health_command: [test, -f, .agents/skills/project-governance/SKILL.md]
    health_required: true
  bmad:
    status: optional_adapter
    command: bmad
    authority: input_adapter
    ssot_rule: BMAD specs may seed governed work but OMO/C2G planned tasks remain canonical.
    ingress_workflow: c2g-spec-ingress
    bridge: uv run --project projects/omo omo bridge --format bmad <source-file>
    pattern: structured product/agent specs become governed OMO planned tasks through the OMO bridge compatibility path
    health_command: [bmad, status]
    health_required: false
  openspec:
    status: optional_adapter
    command: openspec
    authority: input_adapter
    ssot_rule: OpenSpec changes may seed governed work but OMO/C2G planned tasks remain canonical.
    ingress_workflow: c2g-spec-ingress
    bridge: uv run --project projects/omo omo bridge --format openspec <source-file>
    pattern: specs become contracts before implementation and then enter OMO through the bridge compatibility path
    health_command: [openspec, list]
    health_required: false
  gstack:
    status: optional_adapter
    command: gstack
    authority: memory_adapter
    ssot_rule: GStack memory may enrich handoff evidence but agent-workflow run records remain canonical.
    ingress_workflow: handoff-resume
    pattern: per-worktree memory, learnings, and handoff logs can feed workflow resume evidence
    health_command: [gstack, --help]
    health_required: false
    degrade_to: bin/agent-workflow.py handoff <run-id>
  beads:
    status: optional_adapter
    command: beads
    authority: input_adapter
    ssot_rule: beads items may seed governed work but OMO/C2G planned tasks remain canonical.
    ingress_workflow: external-adapter-sync
    pattern: small dependency-tracked work items can be imported as OMO planned tasks when available
    health_command: [beads, version]
    health_required: false
    degrade_to: c2g-spec-ingress plus OMO planned tasks
