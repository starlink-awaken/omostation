# 调度服务注册 (Scheduling Contract) — 理想态注册→生成→drift 闭环
#
# 调度配置 (launchd plist / GHA schedule / daemon) 从本注册生成, 不手写.
# 生成器 bin/mof/gen-service-configs.py 读此 → 产 plist (稳定锚点, 杜绝 uv 临时路径炸弹).
# GaC drift check: plist vs 本注册不一致 = drift.
# 见 P73 pattern + governance-ssot-edit skill.
#
# interpreter 锚点: stable-python3 → shutil.which("python3"); 绝对路径 → 直接用 (须稳定).

services:
  - id: governance.watch
    enabled: true
    scheduler: launchd
    trigger: watchpaths
    label: com.l4.governance.watch
    program:
      interpreter: stable-python3
      entrypoint: bin/gac/state-stale-emit.py
      # args 与 install-watch-agent.py 触发 + state-stale-emit --surface 需求一致 (SSOT 完整声明)
      args: [--source, launchd-watch, --trigger, watchpaths, --surface, .omo/_truth/registry, --surface, projects/ecos/src/ecos/ssot]
    watch_paths:
      - .omo/_truth/registry
      - projects/ecos/src/ecos/ssot
    environment:
      PATH: /opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin
    resilience:
      keepalive: crashed
      throttle_interval: 10
    run_at_load: true
    outputs:
      stdout: runtime/logs/watch_stdout.log
      stderr: runtime/logs/watch_stderr.log
    liveness:
      signal: .omo/_knowledge/omo-events.jsonl
      event_kind: state_stale
      max_stale_hours: 24
    generated_by: bin/mof/gen-service-configs.py
    note: "原 install-watch-agent.py 硬编码 plist (sys.executable 炸弹), 治本后从本注册生成"

  # ── 引导扇区 (阶段4 元递归): GaC/health 工具自身调度注册 ──────────
  # 这些工具是 evidence/health/gac 真源, 调度注册为元递归闭环 (GaC 治含自身).
  # scheduler=gha/manual (非 launchd), gen-service-configs 跳过不生配置 —
  # 引导扇区: 这些工具定义 gen/evidence/health 本身, 不能由自己生成自己 (避循环),
  # 仅声明注册 (SSOT 完整: services.yaml 含所有调度含 GaC 自身).
  - id: evidence-smoke
    enabled: true
    scheduler: gha
    trigger: schedule
    program:
      interpreter: stable-python3
      entrypoint: bin/gac/evidence-smoke.py
    schedule_ref: .github/workflows/evidence-smoke-gate.yml
    liveness:
      signal: .omo/_delivery/evidence-smoke/
      max_stale_hours: 24
    note: "实测 health (回路多源 OR/BOS/dirty). gha 调度. 引导扇区 (evidence 源, 不自生)."
  - id: compass-radar
    enabled: true
    scheduler: gha
    trigger: schedule
    program:
      interpreter: stable-python3
      entrypoint: bin/compass_radar.py
    schedule_ref: .github/workflows/c2g-radar-daily.yml
    liveness:
      signal: .omo/state/health.yaml::generated_at
      max_stale_hours: 24
    note: "合成 health_score (含 feedback 硬门槛 PR#81). gha daily. 引导扇区."
  - id: gen-service-configs
    enabled: true
    scheduler: manual
    trigger: on-registry-change
    program:
      interpreter: stable-python3
      entrypoint: bin/mof/gen-service-configs.py
    note: "从本注册生 launchd plist (scheduler=launchd 项). manual/on-registry-change. 引导扇区 (生成本身, 不自生)."
