# X2 Freshness Rules — 抗熵与过期检测
#
# 定义哪些组件/项目需要 freshness 检查，以及过期后的处理动作。

documentation_contract:
  ssot_role: authoritative_freshness_source
  derived_consumers:
    - AGENTS.md
    - .omo/_truth/INDEX.md
    - .omo/standards/omo-governance-surfaces.md

rules:
  - rule_id: X2-FRESH-OMO-GOVERNANCE-SURFACES
    title: OMO 三层治理契约必须持续保鲜
    type: governance_surface_freshness
    status: active
    created: '2026-06-16'
    target: .omo/_truth/registry/omo-governance-surfaces.yaml
    freshness:
      mechanism: registry-review
      threshold_days: 14
      action: escalate
    owner: governance-team
    notes: >
      `.omo` 顶层资产、`projects/omo` 路径常量、`projects/c2g` 入口元数据
      只要任一发生显著变化，14 天内必须同步更新标准与注册表。

  - rule_id: X2-FRESH-EVIDENCE-ALIAS
    title: evidence 兼容别名必须持续收敛
    type: compatibility_alias_watch
    status: active
    created: '2026-06-17'
    target: .omo/evidence/
    freshness:
      mechanism: alias-backlog-review
      threshold_days: 30
      action: warn
    owner: governance-team
    notes: >
      `.omo/evidence/` 仅允许作为 `_delivery` 下真实证据目录的兼容别名存在；
      若 30 天内没有继续消化历史引用与迁移计划，需显式登记为治理债务。

  - rule_id: X2-FRESH-ARCHIVED-LLMGATEWAY
    title: llm-gateway 已归档，禁止产生新的活跃任务
    type: project_archive
    status: active
    created: '2026-06-16'
    target: projects/llm-gateway/
    freshness:
      mechanism: git-commit-staleness
      threshold_days: 90
      action: warn
    archived: true
    replacement:
      project: aetherforge
      entrypoint: packages/gateway/
    notes: >
      llm-gateway 代码已迁移至 aetherforge/packages/gateway/src/llm_gateway/_legacy/。
      仅允许消化 _legacy/ 中的能力，不允许在 projects/llm-gateway/ 新增功能。

  - rule_id: X2-FRESH-MERGE-CHECKLIST
    title: MERGE-CHECKLIST 必须按计划推进
    type: artifact_review
    status: active
    created: '2026-06-16'
    target: projects/aetherforge/packages/gateway/MERGE-CHECKLIST.md
    freshness:
      mechanism: manual-review
      threshold_days: 30
      action: escalate
    owner: architecture-team
    notes: >
      _legacy/ 中的能力需在 30 天内逐项消化或明确废弃。

  - rule_id: X2-FRESH-DEBT-EVIDENCE-INTEGRITY
    title: DEBT closure evidence 完整性 14 天巡检
    type: governance_loop_freshness
    status: active
    created: '2026-06-20'
    target: .omo/debt/items/D-*.yaml
    freshness:
      mechanism: governance-audit
      threshold_days: 14
      action: escalate
    owner: governance-team
    notes: >
      P43 闭环确立 debt closure 必带 resolution_evidence 的强制约束。
      P84 R2 修正: target 改为 D-*.yaml (历史 debt 用 D- 前缀, 非 DEBT-).
      `omo governance` 每 14 天自动审计: lifecycle_state=closed 的 debt
      必须有 ≥ 20 字符的 resolution_evidence；lifecycle_state=deferred 的 debt
      必须有 next_review_at + gate_level。审计失败触发 debt integrity score 扣分。
      巡检脚本: projects/omo/src/omo/omo_audit.py:governance_check_debt

  - rule_id: X2-FRESH-CROSS-PROJECT-LINT
    title: 全子项目 ruff 0 errors 7 天巡检
    type: governance_loop_freshness
    status: active
    created: '2026-06-20'
    target: projects/*/src/**/*.py
    freshness:
      mechanism: governance-audit
      threshold_days: 7
      action: escalate
    owner: governance-team
    notes: >
      P43 R5 收口确立 9 子项目 ruff 全 0 baseline。每 7 天通过 `omo governance`
      (governance_check_lint) 自动扫描 kairon packages/，其他子项目走
      `cd projects/<x> && uv run ruff check src/` 手动验证。
      任何子项目回归非 0 即触发 lint score 扣分并降级 governance 等级。

  - rule_id: X2-FRESH-MOF-VERSION-BUMP
    title: MOF 模型版本变更 30 天巡检
    type: model_drift_freshness
    status: active
    created: '2026-06-20'
    target: .omo/_truth/mof-version.yaml
    freshness:
      mechanism: git-commit-staleness
      threshold_days: 30
      action: warn
    owner: architecture-team
    notes: >
      MOF 模型版本 (当前 v0.0.12) 超过 30 天无变化时告警, 提示
      mof-extract 钩子是否失活 / 是否需要新阶段登记。需配合 `bin/mof-version show`
      与 `.omo/_knowledge/audits/*.md` 联合审计。

  - rule_id: X2-FRESH-DOC-LIFECYCLE
    title: 文档生命周期健康度必须持续维护
    type: doc_lifecycle_freshness
    status: active
    created: '2026-06-22'
    target: .omo/
    freshness:
      mechanism: doc-lifecycle-lint
      threshold_days: 7
      action: warn
    owner: governance-team
    notes: >
      P45 R2: 用 `omo lint doc-lifecycle` 检查 .omo/ 全部 .md/.yaml 文件.
      健康分 < 70 触发告警, 提示:
      - frontmatter 覆盖率 < 80% (缺 status/lifecycle/owner)
      - 死文档占比 > 30% (contract/pattern 0 引用)
      - 矛盾路径 > 0 (代码引用 .omo/_archive/ 或 .omo/_knowledge/management/)
      治理面: 触发时在 cron 邮件中加 §doc-lifecycle 健康分.

  - rule_id: X2-FRESH-COMMIT-FATIGUE
    title: 工作树累积预警 (commit fatigue detector)
    type: commit_closure_freshness
    status: active
    created: '2026-06-23'
    target: .omo/
    freshness:
      mechanism: git-working-tree-accumulation
      threshold_days: 1
      threshold_count: 100
      action: escalate
    owner: governance-team
    notes: >
      P59 暴露 571 文件未提交的失闭环事件。本规则监控工作树累积,
      防止 agent 在长会话中累积大量修改而不提交。
      P85 R1 修正: action 改为 'escalate' (warn@100files / escalate@500files
      拆为 freshness 子字段, 单一 action).
      实现: bin/check-commit-fatigue.py (P60+ 实现) + pre-commit 钩子。
      参考: L0-constraints.yaml:CR-GOV-COMMIT-FREQUENCY-01
  - rule_id: X2-FRESH-OMO-LINT-SIZE
    title: "P90 omo_lint.py 抗 god-module 拆解监控 (P89-A 待拆 schemas 432L)"
    type: governance_loop_freshness
    status: active
    target: projects/omo/src/omo/omo_lint.py
    freshness:
      mechanism: manual-review
      threshold_days: 7
      action: warn
    owner: governance-team
    notes: >
      P90 R2 新增 rule (omo_lint.py 抗 god-module 监控).

  - rule_id: X2-FRESH-GOV-DASHBOARD
    title: "P91 governance-dashboard cron 持续运行监控 (确保 7 天内 dashboard 跑过)"
    type: governance_loop_freshness
    status: active
    target: .omo/cron/governance-dashboard-crontab
    freshness:
      mechanism: manual-review
      threshold_days: 7
      action: warn
    owner: governance-team
    notes: >
      P90 R2 新增 rule (omo_lint.py 抗 god-module 监控).

