# X4 Consistency Rules — 跨层一致性治理
#
# 确保同一事实在文档、代码、MOF、BOS 路由、依赖声明中只有一种表述。

documentation_contract:
  ssot_role: authoritative_consistency_source
  derived_consumers:
    - AGENTS.md
    - .omo/INDEX.md
    - .omo/standards/omo-governance-surfaces.md

rules:
  - rule_id: X4-CONS-OMO-GOVERNANCE-SURFACES
    title: OMO 三层治理面必须口径一致
    type: governance_surface_consistency
    status: active
    created: '2026-06-16'
    description: >
      `.omo` 顶层目录分类、`projects/omo` 路径常量、`projects/c2g` 产物治理引用
      必须共享同一套目录治理口径，禁止文档、内核、入口三套说法。
    canonical_source:
      standard: .omo/standards/omo-governance-surfaces.md
      registry: .omo/_truth/registry/omo-governance-surfaces.yaml
      kernel_path_constants: projects/omo/src/omo/omo_paths.py
    forbidden_patterns:
      - "新增 .omo 顶层资产但未登记到 registry"
      - "projects/c2g 产物不携带 governance_refs"
      - "将 `.omo` 本身表述为完整治理执行内核"
    allowed_patterns:
      - "`.omo` = state plane"
      - "`projects/omo` = governance kernel"
      - "`projects/c2g` = strategic ingress"
    check_scope:
      - .omo/INDEX.md
      - .omo/standards/*.md
      - .omo/_truth/*.yaml
      - .omo/_truth/registry/*.yaml
      - projects/omo/src/omo/*.py
      - projects/c2g/src/c2g/*.py
    owner: governance-team
    enforcement: block-write

  - rule_id: X4-CONS-LLMGATEWAY-ARCHIVED
    title: llm-gateway 不得再以独立活跃项目形式出现
    type: cross_reference_consistency
    status: active
    created: '2026-06-16'
    description: >
      自 2026-06-16 起，llm-gateway 能力已并入 aetherforge/packages/gateway/。
      所有文档、MOF 节点、BOS 路由、依赖声明必须保持一致。
    canonical_source:
      project: aetherforge
      entrypoint: packages/gateway/
      mof_node: BOSROUTE-AETHERFORGE-llm-gateway
    forbidden_patterns:
      - "projects/llm-gateway/ 作为活跃 LLM 网关入口"
      - "bos://kairon/llm-gateway 作为主入口（deprecated alias 除外）"
      - "pyproject.toml 中直接依赖 llm-gateway"
    allowed_patterns:
      - "llm-gateway 已归档"
      - "llm-gateway 能力已迁移至 aetherforge/packages/gateway/"
      - "bos://kairon/llm-gateway 作为 deprecated alias"
    check_scope:
      - docs/*.md
      - projects/*/ARCHITECTURE.md
      - projects/*/CALLCHAIN.md
      - projects/*/BOUNDARY.md
      - projects/*/pyproject.toml
      - projects/agora/src/agora/mcp/resolver/services.py
    owner: architecture-team
    enforcement: block-write

  - rule_id: X4-CONS-P43-CLOSED-LOOP-SSOT
    title: P43 闭环 c2g→omo→mof 链路必须保持 SSOT 一致
    type: governance_loop_consistency
    status: active
    created: '2026-06-20'
    description: >
      P43 (2026-06-20) 收口的 c2g → omo → mof 闭环链路在以下 4 处必须口径一致:
      (a) Pitch 入口: c2g brainstorm / runtime/sandbox/pitches/*.md
      (b) Task 物化: omo governance ingress-task (broker) → .omo/tasks/planned/*.yaml
      (c) Debt 闭环: omo governance ingress-debt (broker + fcntl) → .omo/debt/items/*.yaml
      (d) 版本记录: bin/mof-version record → .omo/_truth/mof-version.yaml
      任何变更必须走 broker 入口, 禁止 ad-hoc yaml 直写。
    canonical_source:
      standard: .omo/standards/omo-governance-surfaces.md
      registry: .omo/_truth/registry/omo-governance-surfaces.yaml
      broker: projects/omo/src/omo/omo_ingress.py (ingress-task/ingress-debt)
      audit: .omo/_knowledge/audits/2026-06-20-debt-evidence-closure.md
    forbidden_patterns:
      - "bypass broker 直接 yaml.dump → .omo/tasks/planned/*.yaml"
      - "bypass broker 直接 yaml.dump → .omo/debt/items/*.yaml"
      - "c2g bet 路径绕过 omo governance ingress-task 直接修改 .omo/"
      - "mof-version record 跳过 commit message 含 governance_refs"
    allowed_patterns:
      - "omo governance ingress-task --ingress-plane projects/c2g"
      - "omo governance ingress-debt --ingress-plane projects/c2g"
      - "bin/mof-version record '<description>'"
    check_scope:
      - .omo/tasks/planned/*.yaml
      - .omo/debt/items/*.yaml
      - .omo/_truth/mof-version.yaml
      - .omo/_knowledge/audits/*.md
    owner: governance-team
    enforcement: block-write

  - rule_id: X4-CONS-DEBT-GITIGNORE-BOUNDARY
    title: .omo/debt/ gitignore 边界必须保持审计可达性
    type: git_scope_consistency
    status: active
    created: '2026-06-20'
    description: >
      .omo/debt/ 整目录在 .gitignore 中, yaml 状态不进入 git history;
      但治理审计必须保持可达。审计留痕路径:
      (a) OMO runtime: .omo/debt/items/*.yaml (lifecycle_state 单一状态源)
      (b) Audit log: .omo/_knowledge/audit/*.yaml (omo_audit AppendOnlyLog)
      (c) Governance history: .omo/_knowledge/governance-history.jsonl
      (d) Knowledge face: .omo/_knowledge/audits/*.md
      任何 debt closure 状态变化必须 4 路径全部产生 record, 防止 OMO runtime
      与 git history 漂移。
    canonical_source:
      gitignore: .gitignore (含 .omo/debt/)
      runtime: projects/omo/src/omo/omo_audit.py (AppendOnlyLog + governance_check_debt)
      audit_log: .omo/_knowledge/audit/
      governance_history: .omo/_knowledge/governance-history.jsonl
      knowledge_face: .omo/_knowledge/audits/
    forbidden_patterns:
      - "修改 .gitignore 移除 .omo/debt/ 排除规则"
      - "只更新 yaml 不 append audit log (违反 Round 13 P0 audit 机制)"
    allowed_patterns:
      - "omo governance ingress-debt 走 broker (自动 append audit log + governance history)"
      - ".omo/_knowledge/audits/*.md 作为知识面留痕"
    check_scope:
      - .gitignore
      - .omo/_knowledge/audit/*.yaml
      - .omo/_knowledge/governance-history.jsonl
      - .omo/_knowledge/audits/*.md
    owner: governance-team
    enforcement: block-write

  - rule_id: X4-CONS-DRIFT-VS-GOVERNANCE
    title: 漂移 vs 治理评分一致性
    type: cross_metric_consistency
    status: active
    created: '2026-06-23'
    target: "bin/mof-drift + omo governance"
    freshness:
      mechanism: cross-tool-consistency
      threshold_days: 1
      action: warn
    owner: governance-team
    notes: >
      mof-drift LOW 计数应与 governance score 反向相关 (drift 越少, 治理越好)。
      偏离时报警, 可能存在统计口径不一致或工具 bug。
      P52 v5 终极后稳态: drift LOW=2, governance=100 A+, 持续健康。
      实现: bin/check-drift-governance-consistency.py (P60+ 实现)
