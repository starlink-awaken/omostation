version: 1
task_id: "<TASK_ID>"
worker_id: "<codebuddy|reasonix|future-worker>"
transport_mode: "<cli_prompt|acp_stdio|acp_streamable_http>"
run_ref: ".omo/workers/runs/<dispatch-id>-dispatch.yaml"
knowledge_refs: []
handoff_refs: []

objective: "<one-sentence delivery goal>"
task_yaml: ".omo/tasks/active/<task-file>.yaml"

inputs:
  source_docs:
    - ".omo/plans/<phase-spec>.md"
    - ".omo/standards/<relevant-standard>.md"
  required_context:
    - ".omo/state/system.yaml"
    - ".omo/goals/current.yaml"
  prior_evidence: []

execution_context:
  space_ref: "<space manifest path>"
  membership_ref: "<space membership id>"
  action: "<capability action>"
  admission_contract_ref: "<identity/admission contract path>"
  required_capabilities:
    - "<capability action>"
  decision_mode: "<allow|conditional_approval|deny>"

rollout_context:
  rollout_policy_ref: "<rollout policy path>"
  runtime_boundary_ref: "<runtime boundary path>"
  acceptance_evidence_refs:
    - "<delivery evidence ref>"
  runtime_residue_paths:
    - "<runtime residue path>"

scope:
  allowed_write_paths:
    - "<declared output path>"
  forbidden_write_paths:
    - ".omo/state/system.yaml"
    - ".omo/goals/current.yaml"
    - "convergence.yaml"
  non_goals:
    - "Do not edit unrelated task YAML files"
    - "Do not enable blocked capabilities"

execution_policy:
  read_budget: 5
  heartbeat_interval_seconds: 300
  warning_after_seconds: 900
  lease_expired_after_seconds: 1200
  reclaim_after_seconds: 1800
  checkpoint_required: true
  require_partial_output_when_stuck: true

gates:
  allowed_operation_level: "L1"
  may_prepare_levels:
    - "L2"
  human_approval_required_for:
    - "L2"
    - "L3"
  approval_ref: null
  sensitive_capabilities_blocked: true

knowledge_contract:
  output_summary_required: true
  changed_files_required: true
  evidence_required: true
  unresolved_risks_required: true
  next_handoff_required: true

review:
  closeout_owner: "coordinator"
  worker_may_set_review: true
  worker_may_set_done: false
  worker_may_set_blocked: false
