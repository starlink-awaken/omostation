version: 1
dispatch_id: "<DISPATCH_ID>"
task_id: "<TASK_ID>"
worker_id: "<codebuddy|reasonix|future-worker>"
transport_mode: "<cli_prompt|acp_stdio|acp_streamable_http>"
run_ref: ".omo/workers/runs/<dispatch-id>-dispatch.yaml"

dispatch_state: "dispatched"
# valid states:
# - dispatched
# - acknowledged
# - running
# - review
# - warning
# - lease_expired
# - reclaimed
# - superseded
# - closed

coordinator: "<coordinator-id>"
launched_at: "<ISO8601>"

lease:
  heartbeat_interval_seconds: 300
  warning_after_seconds: 900
  lease_expired_after_seconds: 1200
  reclaim_after_seconds: 1800
  last_checkpoint_at: null
  last_material_write_at: null

inputs:
  task_yaml: ".omo/tasks/active/<task-file>.yaml"
  envelope_file: ".omo/workers/runs/<dispatch-id>-envelope.yaml"
  prompt_file: ".omo/workers/runs/<dispatch-id>-prompt.md"
  source_docs: []

execution:
  launch_command: '<worker command with prompt>'
  approval_ref: null
  session_ref: null
  log_ref: null
  checkpoint_refs: []

handoff:
  output_summary_ref: null
  evidence_paths: []
  unresolved_risks: []
  next_handoff: null

reclaim:
  required: false
  reason: null
  reclaimed_at: null
  successor_worker_id: null
  successor_dispatch_id: null
