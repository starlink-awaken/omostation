# ============================================================================
# 织星 L0 — 内部层次定义
# ============================================================================
# L0 不是单层——它内部有 6 个逻辑层次，从抽象到具体排列。
#
# SSOT: ecos/src/ecos/ssot/LAYER-L0.yaml
# 版本: 1.0.0 | 2026-06-06
# ============================================================================

version: "1.0.0"

l0_internal_layers:

  # ── L0-M3: 元元模型层 ──
  - id: L0-M3
    name: "元元模型层"
    description: "定义'定义的方式'——类型系统本身。最抽象层。"
    assets:
      - "mof/m3.yaml"
    tools: []
    depends_on: []
    feeds_into: [L0-M2]

  # ── L0-M2: 元模型层 ──  
  - id: L0-M2
    name: "元模型层"
    description: "定义 18 种要素类型的模具——每种东西长什么样。"
    assets:
      - "mof/m2/ (18 files)"
    tools: ["mof-bootstrap (M3↔M2 自反性)"]
    depends_on: [L0-M3]
    feeds_into: [L0-M1, L0-Registry]

  # ── L0-Registry: 注册表层 ──
  - id: L0-Registry
    name: "注册表层"
    description: "架构拓扑·模式·约束·治理配置——系统的硬性规则。"
    assets:
      - "registry/topology.yaml"
      - "registry/patterns.yaml"
      - "registry/layer-boundary.yaml"
      - "registry/L0-constraints.yaml"
      - "registry/governance/ (4 files)"
    tools: ["mof-enforce (层合规)"]
    depends_on: [L0-M2]
    feeds_into: [L0-M1, L0-Tools]

  # ── L0-M1: 模型层 ──
  - id: L0-M1
    name: "模型层"
    description: "576 个节点声明——全系统的模型化表达。"
    assets:
      - "mof/m1/ (18 directories, 576 nodes)"
    tools: ["mof-validate (M2→M1 校验)", "mof-scan (System→M1)", "mof-extract (提炼→M1)", "mof-generate (M1→System)"]
    depends_on: [L0-M2, L0-Registry]
    feeds_into: [L0-M0, L0-Tools]

  # ── L0-M0: 运行时层 ──
  - id: L0-M0
    name: "运行时层"
    description: "实际运行状态的快照——系统'现在'是什么样的。"
    assets:
      - "mof/m0/snapshot.yaml"
    tools: ["mof-audit (M1↔M0 漂移)", "mof-sla (SLA+M0快照)", "mof-events (M0→事件)"]
    depends_on: [L0-M1]
    feeds_into: [L0-Tools]

  # ── L0-Tools: 工具链层 ──
  - id: L0-Tools
    name: "工具链层"
    description: "17 个工具——连接所有层次的执行引擎。"
    assets:
      - "tools/ (17 files)"
    tools: ["mof (CLI)", "mof-pipeline (全链路)", "mof-derive (推理)", "mof-view (视图)", "mof-entity (解析)", "mof-trail (审计追踪)"]
    depends_on: [L0-M1, L0-M0, L0-Registry]
    feeds_into: []  # 工具链是末端——产出面向 Agent/人

# ══════════════════════════════════════════
# M3→M0 全链路管线
# ══════════════════════════════════════════
pipeline:
  description: "从最抽象的 M3 到最具体的 M0 的完整推导-校验-连接链路"
  stages:
    - order: 1
      name: "M3→M2 自反性"
      tool: "mof-bootstrap check_2"
      description: "M2 类型定义中的 m3_parent 必须在 M3 中存在"

    - order: 2
      name: "M2→M1 结构校验"  
      tool: "mof-validate"
      description: "每个 M1 节点必须满足对应 M2 类型的 requiredProperties 和 stateMachine"

    - order: 3
      name: "M1→M1 跨类型约束"
      tool: "mof-validate (cross_type)"
      description: "M1 节点之间的引用完整性检查"

    - order: 4
      name: "M1↔M0 漂移审计"
      tool: "mof-audit"
      description: "M1 声称的状态 vs M0 实际状态 —— 检测漂移"

    - order: 5
      name: "M0→事件发布"
      tool: "mof-events"
      description: "M0 异常状态 → 治理事件 → Agora event bus"

    - order: 6
      name: "System→M1 反向同步"
      tool: "mof-scan + mof-gate"
      description: "系统变更 → 自动发现 → M1 注册 → 门禁检查"

    - order: 7
      name: "M1→System 正向生成"
      tool: "mof-generate"
      description: "M1 节点 → 代码/配置骨架"

    - order: 8
      name: "全链路自举"
      tool: "mof-bootstrap (all)"
      description: "L0 自身的 M1 节点也受 M2 约束 —— 自反闭环"

# ══════════════════════════════════════════
# 能力矩阵
# ══════════════════════════════════════════
capability_matrix:
  derivation:    # 推导
    - { from: M3, to: M2, status: implemented, tool: mof-bootstrap }
    - { from: M2, to: M1, status: not_applicable, note: "M2 定义 M1 的结构约束，不是推导 M1 实例" }
    - { from: M1, to: Insight, status: implemented, tool: mof-derive }
    
  validation:    # 校验
    - { from: M3, to: M2, status: implemented, tool: mof-bootstrap }
    - { from: M2, to: M1, status: implemented, tool: mof-validate }
    - { from: M1, to: M1, status: implemented, tool: "mof-validate (cross_type)" }
    
  connection:    # 连接
    - { from: M1, to: M0, status: implemented, tool: mof-audit }
    - { from: System, to: M1, status: implemented, tool: mof-scan }
    - { from: M1, to: System, status: implemented, tool: mof-generate }
    - { from: M0, to: Event, status: implemented, tool: mof-events }
    
  enforcement:   # 强制执行
    - { from: Registry, to: System, status: implemented, tool: mof-enforce }
    - { from: L0, to: L0, status: implemented, tool: "mof-bootstrap (self)" }

meta:
  maintained_by: "织星 MOF"
  next_review: "2026-07-06"
