id: MECH-BOS-DISCOVERY
type: Mechanism
name: "BOS 自动服务发现"
description: "扫描 Workspace 下游项目 AGENTS.md，提取 bos:// URI 声明并自动注册到 BOSRouter"
domain: meta
layer: I0
status: active
version: "1.0.0"
created: "2026-06-07"

properties:
  trigger: "startup"
  source: "agora/mcp/bos_discovery.py"
  pattern: "AGENTS.md → bos://domain/package/action"
  relation_type: "Triggers"
  target: "BOSRouter"

relations:
  - type: Triggers
    from: MECH-BOS-DISCOVERY
    to: WORKFLOW-AGORA-ORCHESTRATOR
    note: "启动时发现 BOS 服务 → 更新 Agora 路由表"
