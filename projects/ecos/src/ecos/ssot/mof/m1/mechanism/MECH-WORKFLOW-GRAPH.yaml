id: MECH-WORKFLOW-GRAPH
type: Mechanism
name: "工作流依赖图可视化"
description: "基于 workflow-catalog.yaml 全局关系生成依赖图，支持 DOT/Mermaid/ASCII 格式"
domain: meta
layer: L0
status: active
version: "1.0.0"
created: "2026-06-07"

properties:
  trigger: "mof workflow graph --format dot|mermaid|ascii"
  source: "ecos/ssot/tools/mof-workflow.py:cmd_graph"
  formats:
    - "dot (Graphviz)"
    - "mermaid (web render)"
    - "ascii (terminal)"

relations:
  - type: DependsOn
    from: MECH-WORKFLOW-GRAPH
    to: WORKFLOW-CATALOG
    note: "数据源: workflow-catalog.yaml global_relations"
