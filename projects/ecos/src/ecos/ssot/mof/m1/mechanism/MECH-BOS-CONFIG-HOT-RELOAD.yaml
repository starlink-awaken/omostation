id: MECH-BOS-CONFIG-HOT-RELOAD
type: Mechanism
name: "BOS 配置热加载"
description: "SIGUSR1 信号触发 agora-bos-rates.yaml 热重载 + BOSRouter 路由刷新，无需重启"
domain: meta
layer: I0
status: active
version: "1.0.0"
created: "2026-06-07"

properties:
  trigger: "SIGUSR1 signal"
  source: "server/mcp.py:_install_signal_handler"
  reloads:
    - "agora-bos-rates.yaml (限流配置)"
    - "BOSRouter routes (从 POC_SERVICES)"

relations:
  - type: DependsOn
    from: MECH-BOS-CONFIG-HOT-RELOAD
    to: MECH-BOS-RATE-LIMITER
