id: NET-SCANNER
type: constraint_mgmt
scan_methods:
  mdns:
    enabled: true
    timeout_seconds: 3
    known_hosts:
    - macmini.local
    - y7000p.local
    - imac.local
    - nas.local
  tailscale:
    enabled: true
    timeout_seconds: 5
  proxy:
    enabled: true
    config_paths:
    - ~/.config/clash/config.yaml
    - ~/Library/Application Support/ClashX/config.yaml
    - ~/Library/Application Support/ClashX Meta/config.yaml
    - ~/.config/sing-box/config.json
  icloud:
    enabled: true
    patterns:
    - ClashX*/config.yaml
    - Proxy*/config.yaml
properties:
  constraint_desc: 网络扫描仪配置约束(check 工具默认端口/范围)
  severity: medium
