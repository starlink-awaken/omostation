# M1 Node: PROC-TASK-LIFECYCLE
# Type: Process
id: PROC-TASK-LIFECYCLE
type: Process
name: 任务全生命周期管理流程
description: 定时任务·脚本·工具从创建到退役的完整生命周期——创建→注册→调度→执行→监控→审计→退役
status: active
domain: meta
created: '2026-06-06'
version: 1.0.0
layer: L0
properties:
  states:
  - created
  - registered
  - scheduled
  - running
  - degraded
  - stopped
  - archived
  steps:
  - order: 1
    name: create
    action: 创建任务 (SKILL.md 或 Python 脚本)
    input: 任务需求
    output: 任务文件
  - order: 2
    name: register
    action: mof-register-tasks 扫描 → 生成 M1 Mechanism 节点 → 注册到 L0
    input: 任务文件
    output: M1 节点声明
  - order: 3
    name: schedule
    action: 配置调度 (launchd/cron/daemon)
    input: M1 节点 (interval)
    output: 调度配置
  - order: 4
    name: execute
    action: 按调度执行任务
    input: 触发信号
    output: 执行结果
  - order: 5
    name: monitor
    action: task-status --stale 检测逾期 + daemon SLA 追踪
    input: 执行日志
    output: 健康状态
  - order: 6
    name: audit
    action: mof-audit 漂移检测 + mof-enforce 层合规
    input: M1 声明 + M0 实际
    output: 漂移报告
  - order: 7
    name: retire
    action: 标记 archived + 从调度移除 + M1 节点更新
    input: 退役决策
    output: 归档
  sla:
    registration_latency_h: 24
    stale_detection_interval_h: 6
    max_consecutive_failures: 3
  owner: L0 治理框架
  decision_points:
  - condition: 连续失败 3 次
    branches:
    - 自动创建 CARDS DEBT 卡片
    - 通知 daemon
  - condition: 180 天未执行
    branches:
    - 标记为 candidate_archive
    - 人工审核退役
