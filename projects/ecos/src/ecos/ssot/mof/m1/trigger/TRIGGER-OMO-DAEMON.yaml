id: "TRIGGER-OMO-DAEMON"
type: "trigger"
name: "OMO Governance Daemon"
description: "OMO 治理守护进程 — 开机自启，崩溃自动重启"
status: "active"
domain: "meta"
layer: "L2"
created: "2026-06-09"
version: "1.0.0"
properties:
  trigger_type: "launchd"
  trigger_source: "launchd RunAtLoad + KeepAlive"
  trigger_action: "omo daemon start"
  schedule: "continuous"
  health_check:
    endpoint: "launchctl list com.omo.governance.daemon"
    expected_status: "running"
source: "omo/scripts/com.omo.governance.daemon.plist"
