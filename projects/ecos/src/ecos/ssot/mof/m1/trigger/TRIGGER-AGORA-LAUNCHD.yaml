id: "TRIGGER-AGORA-LAUNCHD"
type: "trigger"
name: "Agora MCP Hub Launchd"
description: "Agora MCP Hub — 开机自启，低优先级后台运行"
status: "active"
domain: "meta"
layer: "I0"
created: "2026-06-09"
version: "1.0.0"
properties:
  trigger_type: "launchd"
  trigger_source: "launchd RunAtLoad + KeepAlive"
  trigger_action: "agora-mcp serve"
  schedule: "continuous"
  health_check:
    endpoint: "http://127.0.0.1:8080/v1/health"
    expected_status: "200"
source: "agora/scripts/com.agora.serve.plist"
