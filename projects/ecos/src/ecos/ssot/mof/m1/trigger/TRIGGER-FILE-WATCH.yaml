id: "TRIGGER-FILE-WATCH"
type: "trigger"
name: "File Watch (ecos-event-watcher)"
description: "文件变更监控 — fswatch/watchdog 双方案，检测 CLAUDE.md/STATE.md 变更触发保鲜"
status: "active"
domain: "meta"
layer: "L0"
created: "2026-06-09"
version: "1.0.0"
properties:
  trigger_type: "file_watch"
  trigger_source: "fswatch --event Updated"
  trigger_action: "check-claude-freshness + event-stream.jsonl"
  schedule: "on_file_change"
  dependencies: []
  health_check:
    endpoint: "~/.ecos/watcher-state.json"
    expected_status: "last_event_within_1h"
source: "ecos/scripts/ecos-event-watcher.py"
