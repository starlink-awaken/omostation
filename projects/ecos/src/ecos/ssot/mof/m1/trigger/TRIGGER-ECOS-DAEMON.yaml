id: "TRIGGER-ECOS-DAEMON"
type: "trigger"
name: "eCOS Daemon"
description: "自治运维守护进程 — 每 6 小时执行健康检查+SLA+约束验证+自反验证"
status: "active"
domain: "meta"
layer: "L0"
created: "2026-06-09"
version: "1.0.0"
properties:
  trigger_type: "daemon"
  trigger_source: "while True sleep(6h)"
  trigger_action: "ecos-daemon.py cycle"
  schedule: "every 6h"
  interval_seconds: 21600
  dependencies:
    - "TRIGGER-AGORA-EVENTBUS"
  health_check:
    endpoint: "~/.ecos/daemon-state.db"
    expected_status: "last_cycle_within_12h"
source: "ecos/scripts/ecos-daemon.py"
