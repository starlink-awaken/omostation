# M1 Workflow: ECOS Daily Health
id: WORKFLOW-ECOS-DAILY-HEALTH
type: Workflow
subtype: ScheduledWorkflow
name: 每日健康巡检管线
description: '每日自动健康巡检: 健康检查→域校验→索引同步→BOS校验→路由更新 (每日 08:00)'
status: active
version: 1.0.0
domain: meta
layer: L0
created: '2026-06-07'
bos_uri: bos://ecos/workflow/daily-health
cross_layer:
  realized_by:
  - project: ecos
    package: ecos
    entrypoint: src/ecos/workflow/definitions/daily-health-report.yaml
  invoked_by:
  - layer: I0
    component: agora
    mechanism: MCP 工具调用
  - layer: L3
    component: cockpit
    mechanism: CLI 命令透传
steps:
- order: 1
  name: SystemHealthCheck
  action: ecos.health_check
  description: 全系统 9 项健康检查
  input:
    enabled_checks:
      type: array
      default:
      - ssb
      - domain
      - gateway
      - watchdog
      - agora
      - forge
      - agentmesh
      - cron
      - dashboard
  output:
    healthy:
      type: boolean
    results:
      type: array
  depends_on: []
- order: 2
  name: DomainValidateAll
  action: ecos.domain_validate_all
  description: 全量域 KEMS 六面结构校验
  input: {}
  output:
    passed:
      type: integer
    failed:
      type: integer
  depends_on:
  - SystemHealthCheck
- order: 3
  name: IndexSync
  action: ecos.domain_sync
  description: 同步 DOMAIN-INDEX.md
  input: {}
  output:
    synced:
      type: boolean
  depends_on:
  - DomainValidateAll
- order: 4
  name: BOSValidate
  action: ecos.bos_validate
  description: BOS URI 全量健康检查
  input: {}
  output:
    valid_uris:
      type: integer
  depends_on:
  - IndexSync
- order: 5
  name: RoutesUpdate
  action: ecos.domain_routes
  description: 更新 BOS 路由表缓存
  input: {}
  output:
    routes:
      type: integer
  depends_on:
  - BOSValidate
execution:
  mode: sequential
  max_retries: 3
  timeout: 600
  on_failure: abort
  audit_enabled: true
relations:
- type: triggers
  target: MECH-DAEMON-CYCLE
  note: Daemon 每 6 小时触发健康巡检
- type: data_flows
  target: bos://meta/health/report
  note: 健康报告输出到元系统域
sla:
  max_execution_time: 300
  expected_completion_rate: 0.99
  critical: true
tags:
- ecos
- health
- daily
- audit
- critical
maintained_by: ecos
last_reviewed: '2026-06-07'
