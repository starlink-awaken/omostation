# M1 Workflow: ECOS Weekly Audit
id: WORKFLOW-ECOS-WEEKLY-AUDIT
type: Workflow
subtype: ScheduledWorkflow
name: 每周全量审计管线
description: '每周一全量审计: KEMS校验→漂移检测→引用检查→BOS校验→路由更新→索引同步→健康检查'
status: active
version: 1.0.0
domain: meta
layer: L0
created: '2026-06-07'
bos_uri: bos://ecos/workflow/weekly-audit
cross_layer:
  realized_by:
  - project: ecos
    package: ecos
    entrypoint: src/ecos/workflow/definitions/weekly-audit.yaml
  invoked_by:
  - layer: I0
    component: agora
    mechanism: MCP 工具调用
  - layer: L3
    component: cockpit
    mechanism: CLI 命令透传
steps:
- order: 1
  name: KEMSValidateAll
  action: ecos.domain_validate_all
  description: KEMS 六面结构校验
  input:
    task:
      type: object
      required: true
      description: Task input
  output:
    passed:
      type: int
  depends_on: []
- order: 2
  name: DriftDetection
  action: ecos.domain_audit
  description: 注册表 vs 文件系统漂移检测
  input:
    task:
      type: object
      required: true
      description: Task input
  output:
    drifts:
      type: int
  depends_on:
  - KEMSValidateAll
- order: 3
  name: ReferenceCheck
  action: ecos.check_refs
  description: 跨域路径引用可解析性检查
  input:
    task:
      type: object
      required: true
      description: Task input
  output:
    broken_refs:
      type: int
  depends_on:
  - DriftDetection
- order: 4
  name: BOSValidate
  action: ecos.bos_validate
  description: BOS URI 健康检查
  input:
    task:
      type: object
      required: true
      description: Task input
  output:
    valid:
      type: int
  depends_on:
  - ReferenceCheck
- order: 5
  name: RoutesUpdate
  action: ecos.domain_routes
  description: 路由缓存更新
  input:
    task:
      type: object
      required: true
      description: Task input
  output:
    routes:
      type: int
  depends_on:
  - BOSValidate
- order: 6
  name: IndexSync
  action: ecos.domain_sync
  description: 索引同步
  input:
    task:
      type: object
      required: true
      description: Task input
  output:
    synced:
      type: bool
  depends_on:
  - RoutesUpdate
- order: 7
  name: HealthCheck
  action: ecos.health_check
  description: 最终全系统健康检查
  input:
    task:
      type: object
      required: true
      description: Task input
  output:
    healthy:
      type: bool
  depends_on:
  - IndexSync
execution:
  mode: sequential
  max_retries: 3
  timeout: 1200
  on_failure: abort
  audit_enabled: true
relations:
- type: triggers
  target: MECH-DAEMON-CYCLE
  note: Daemon 每周一触发全量审计
- type: data_flows
  target: bos://meta/audit/report
  note: 审计报告输出到元系统域
- type: depends_on
  target: WORKFLOW-ECOS-DAILY-HEALTH
  note: 周审计依赖每日巡检的基础数据
sla:
  max_execution_time: 600
  expected_completion_rate: 0.99
  critical: true
tags:
- ecos
- audit
- weekly
- drift
maintained_by: ecos
last_reviewed: '2026-06-07'
