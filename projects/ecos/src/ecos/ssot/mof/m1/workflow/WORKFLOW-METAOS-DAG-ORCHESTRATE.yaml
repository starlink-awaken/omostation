# M1 Workflow: WORKFLOW-METAOS-DAG-ORCHESTRATE
id: WORKFLOW-METAOS-DAG-ORCHESTRATE
type: Workflow
subtype: PipelineWorkflow
name: MetaOS DAG 编排管线
description: 有向无环图并行编排 — SQLite 持久化 + 并发执行 + 指数退避重试 + HITL 干预
status: active
version: 1.0.0
domain: omo
layer: L2
created: '2026-06-07'
bos_uri: bos://ecos/workflow/metaos-dag-orchestrate
cross_layer:
  realized_by:
  - project: metaos
    package: metaos
    entrypoint: src/metaos/core/workflow.py
  invoked_by:
  - layer: I0
    component: agora
    mechanism: MCP 工具调用
  - layer: L3
    component: cockpit
    mechanism: CLI 命令透传
steps:
- order: 1
  name: BuildDAG
  action: build_dag
  description: 解析任务定义，构建有向无环图依赖关系
  input:
    omo_task_created:
      type: object
      description: omo_task_created
  output:
    dag_graph:
      type: object
      description: dag_graph
  depends_on: []
- order: 2
  name: TopologicalSort
  action: topological_sort
  description: 对 DAG 进行拓扑排序，确定并行执行顺序
  input:
    dag_graph:
      type: object
      description: dag_graph
  output:
    execution_plan:
      type: object
      description: execution_plan
  depends_on:
  - BuildDAG
- order: 3
  name: ParallelExecute
  action: parallel_execute
  description: 按拓扑层级并发执行节点任务，支持指数退避重试
  input:
    execution_plan:
      type: object
      description: execution_plan
  output:
    node_results:
      type: object
      description: node_results
  depends_on:
  - TopologicalSort
- order: 4
  name: MonitorNodes
  action: monitor_nodes
  description: 实时监控各节点执行状态，异常节点触发 HITL 干预
  input:
    node_results:
      type: object
      description: node_results
  output:
    monitor_report:
      type: object
      description: monitor_report
  depends_on:
  - ParallelExecute
- order: 5
  name: CascadeResults
  action: cascade_results
  description: 级联汇总所有节点结果，输出最终完成状态
  input:
    node_results:
      type: object
      description: node_results
    monitor_report:
      type: object
      description: monitor_report
  output:
    omo_task_completed:
      type: object
      description: omo_task_completed
  depends_on:
  - MonitorNodes
execution:
  mode: dag
  max_retries: 3
  timeout: 1200
  on_failure: abort
  audit_enabled: true
relations:
- type: triggers
  target: bos://omo/task/created
  note: 新任务创建触发 DAG 编排
- type: data_flows
  target: bos://omo/task/completed
  note: 编排结果通知任务完成
sla:
  max_execution_time: 1200
  expected_completion_rate: 0.95
  critical: false
tags:
- dag
- orchestrate
- metaos
- parallel
maintained_by: metaos
last_reviewed: '2026-06-07'
