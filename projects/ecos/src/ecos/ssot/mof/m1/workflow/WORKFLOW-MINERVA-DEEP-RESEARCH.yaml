id: WORKFLOW-MINERVA-DEEP-RESEARCH
type: Workflow
subtype: PipelineWorkflow
name: Minerva 五级深度研究管线
description: "L0-L4 五级分层深度研究 — 分解 → 多源搜索 → 实体提取 → 深度阅读 → 交叉分析 → 反驳论证 → 多模型投票 → 质量门 → 输出"
status: active
version: "1.0.0"
domain: analysis
layer: L2
created: "2026-06-07"
bos_uri: bos://ecos/workflow/minerva-deep-research

cross_layer:
  realized_by:
    - project: kairon
      package: minerva
      entrypoint: src/minerva/pipeline/engine.py
  invoked_by:
    - layer: I0
      component: agora
      mechanism: MCP 工具调用
    - layer: L3
      component: cockpit
      mechanism: CLI 命令透传

steps:
  - order: 1
    name: Decompose
    action: decompose
    description: "将研究课题分解为多个子问题"
    input:
      - research_topic
    output:
      - sub_questions[]
    depends_on: []
  - order: 2
    name: MultiSourceSearch
    action: multi_source_search
    description: "从多个数据源并行搜索相关信息"
    input:
      - sub_questions[]
    output:
      - search_results[]
    depends_on:
      - Decompose
  - order: 3
    name: EntityExtraction
    action: entity_extraction
    description: "从搜索结果中提取命名实体和关键概念"
    input:
      - search_results[]
    output:
      - entities[]
      - concepts[]
    depends_on:
      - MultiSourceSearch
  - order: 4
    name: DeepRead
    action: deep_read
    description: "对关键文档进行深度阅读和要点提取"
    input:
      - search_results[]
      - entities[]
    output:
      - deep_insights[]
    depends_on:
      - EntityExtraction
  - order: 5
    name: CrossAnalyze
    action: cross_analyze
    description: "跨文档交叉分析，发现关联和矛盾"
    input:
      - deep_insights[]
    output:
      - cross_analysis
    depends_on:
      - DeepRead
  - order: 6
    name: CounterArgument
    action: counter_argument
    description: "生成反驳论证，检验结论健壮性"
    input:
      - cross_analysis
    output:
      - counter_arguments[]
    depends_on:
      - CrossAnalyze
  - order: 7
    name: MultiModelVoting
    action: multi_model_voting
    description: "多 LLM 模型投票表决，提高结论可靠性"
    input:
      - cross_analysis
      - counter_arguments[]
    output:
      - voting_results
    depends_on:
      - CounterArgument
  - order: 8
    name: QualityGate
    action: quality_gate
    description: "质量门校验 — 评估置信度、完整性、一致性"
    input:
      - voting_results
    output:
      - quality_report
    depends_on:
      - MultiModelVoting
  - order: 9
    name: Output
    action: output
    description: "输出最终研究报告和结论"
    input:
      - quality_report
    output:
      - bos://analysis/report
    depends_on:
      - QualityGate

execution:
  mode: sequential
  max_retries: 3
  timeout: 1200
  on_failure: abort
  audit_enabled: true

relations:
  - type: triggers
    target: MECH-SCHEDULED-kos-daily-ontology-sync
    note: "每日本体同步触发 Minerva 深度分析"
  - type: data_flows
    target: bos://analysis/report
    note: "分析报告输出到分析域"
  - type: depends_on
    target: WORKFLOW-KRONOS-INGEST
    note: "Minerva 分析依赖 Kronos 采集的数据"

sla:
  max_execution_time: 1200
  expected_completion_rate: 0.95
  critical: true

tags:
  - research
  - minerva
  - deep-analysis
  - llm

maintained_by: kairon/minerva
last_reviewed: "2026-06-07"
