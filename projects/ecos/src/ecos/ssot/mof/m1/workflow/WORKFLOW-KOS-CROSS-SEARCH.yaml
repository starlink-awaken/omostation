id: WORKFLOW-KOS-CROSS-SEARCH
type: Workflow
subtype: PipelineWorkflow
name: KOS 跨域搜索管线
description: "跨域知识搜索管线 — 解析查询 → 全文索引 → 语义匹配 → 排序 → 返回结果"
status: active
version: "1.0.0"
domain: memory
layer: L2
created: "2026-06-07"
bos_uri: bos://ecos/workflow/kos-cross-search

cross_layer:
  realized_by:
    - project: kairon
      package: kos
      entrypoint: src/kos/
  invoked_by:
    - layer: I0
      component: agora
      mechanism: MCP 工具调用
    - layer: L3
      component: cockpit
      mechanism: CLI 命令透传

steps:
  - order: 1
    name: ParseQuery
    action: parse_query
    description: "解析搜索查询，提取关键词、意图和过滤条件"
    input:
      - bos://analysis/query
    output:
      - parsed_query
    depends_on: []
  - order: 2
    name: FullTextIndex
    action: full_text_index
    description: "基于解析结果执行全文索引检索"
    input:
      - parsed_query
    output:
      - text_matches[]
    depends_on:
      - ParseQuery
  - order: 3
    name: SemanticMatch
    action: semantic_match
    description: "基于向量嵌入进行语义相似度匹配"
    input:
      - parsed_query
      - text_matches[]
    output:
      - semantic_results[]
    depends_on:
      - FullTextIndex
  - order: 4
    name: RankResults
    action: rank_results
    description: "融合全文匹配和语义匹配结果，多因子排序"
    input:
      - text_matches[]
      - semantic_results[]
    output:
      - ranked_results[]
    depends_on:
      - SemanticMatch
  - order: 5
    name: ReturnResults
    action: return_results
    description: "组装最终搜索结果并返回"
    input:
      - ranked_results[]
    output:
      - bos://analysis/results
    depends_on:
      - RankResults

execution:
  mode: sequential
  max_retries: 3
  timeout: 600
  on_failure: abort
  audit_enabled: true

relations:
  - type: triggers
    target: bos://analysis/query
    note: "分析查询触发 KOS 跨域搜索"
  - type: data_flows
    target: bos://analysis/results
    note: "搜索结果返回分析消费端"
  - type: depends_on
    target: WORKFLOW-KRONOS-INGEST
    note: "KOS 搜索依赖 Kronos 摄取的知识索引"

sla:
  max_execution_time: 600
  expected_completion_rate: 0.95
  critical: false

tags:
  - search
  - cross-domain
  - kos

maintained_by: kairon/kos
last_reviewed: "2026-06-07"
