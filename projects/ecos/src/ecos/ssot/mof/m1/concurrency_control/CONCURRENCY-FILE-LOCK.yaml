id: "CONCURRENCY-FILE-LOCK"
type: "ConcurrencyControl"
subtype: "FileLock"
name: "文件锁并发控制"
description: "L4 Kernel 的 fcntl.flock 文件锁并发控制"
status: "active"
domain: "meta"
layer: "L4"
created: "2026-06-09"
version: "1.0.0"
properties:
  lock_type: "file_lock"
  scope: "domain_control"
  timeout_seconds: 30
  retry_interval: 1
source: "l4-kernel/concurrency.py"
