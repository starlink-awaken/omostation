# M2: Protocol
# Split from M2-元模型.yaml

m2_type: Protocol
version: 1.0.0
created: '2026-06-06'
Protocol:
  m3_parent: BehavioralElement.Protocol
  description: 层间或系统间通信协议——定义'系统组件如何对话'。
  icon: 🔌
  stateMachine:
    planned:
      description: 规划中·未实现
      transitions:
      - active
      - cancelled
    active:
      description: 活跃使用中
      transitions:
      - aging
      - deprecated
    aging:
      description: 超半衰期·需审查
      transitions:
      - active
      - deprecated
    deprecated:
      description: 已废弃·迁移中
      transitions:
      - archived
    archived:
      description: 已完全移除
      transitions: []
    cancelled:
      description: 规划取消
      transitions: []
  requiredProperties:
    version_spec:
      type: semver
      description: 协议版本
    introduced:
      type: date
      description: 引入日期
    half_life:
      type: integer
      description: 价值半衰期(天)
    registered:
      type: boolean
      description: 是否已在 L0 Protocol Registry 注册
  optionalProperties:
    value_tier:
      type: integer
      description: 价值层级(1-5)
      min: 1
      max: 5
    mapping:
      type: map
      description: '操作映射 {operation: endpoint}'
    successor:
      type: ref
      description: 替代协议 (→Protocol)
    compatibility:
      type: enum
      description: 兼容性
      values:
      - backward
      - forward
      - breaking
      - none
  validationRules:
  - rule: registered == true
    level: error
    message: 协议必须在 L0 注册
  - rule: version_spec matches '^\\d+\\.\\d+\\.\\d+$'
    level: error
    message: 版本号须为 semver
  - rule: introduced != null
    level: error
    message: 必须有引入日期
  - rule: status == 'aging' implies successor != null
    level: warning
    message: 老化协议应声明替代方案
  relationConstraints:
    can_be_source_of:
    - CommunicatesVia
    can_be_target_of:
    - CommunicatesVia
    - Constrains
    - Realizes
  examples:
  - id: PROTO-2025-03-26-001
    name: MCP
    description: Model Context Protocol — 工具协议
  - id: PROTO-2026-01-01-001
    name: ACP
    description: Agent Communication Protocol
