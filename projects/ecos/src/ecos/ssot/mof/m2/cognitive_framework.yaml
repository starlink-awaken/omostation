# M2: CognitiveFramework
m2_type: CognitiveFramework
version: 1.0.0
created: '2026-06-07'
CognitiveFramework:
  m3_parent: GovernanceElement.Pattern
  description: 认知与思维框架——定义 AI 或 Agent 思考、分析、决策的模式和视角组合。如 BDSK (Builder, Devil, Sage, Keeper) 虚拟董事会框架。回答"以什么视角思考"。
  icon: 🧠
  stateMachine:
    active:
      description: active
      transitions:
      - deprecated
    deprecated:
      description: deprecated
      transitions:
      - archived
    archived:
      description: archived
      transitions: []
  requiredProperties:
    framework_name:
      type: string
      description: 框架名称
    core_purpose:
      type: string
      description: 核心目的与解决的问题
    personas:
      type: list
      description: 框架内包含的视角或人格列表
  optionalProperties:
    interaction_mode:
      type: enum
      values: [sequential, parallel, debate, hybrid]
      description: 各个视角之间的交互与决策模式
    trigger_conditions:
      type: list
      description: 适合激活此思维框架的场景或条件
  validationRules:
  - rule: framework_name != null
    level: error
    message: CognitiveFramework 必须有 framework_name
  - rule: personas.length >= 1
    level: error
    message: 至少需要包含一个思考视角 (persona)
  examples:
  - id: CFW-2026-06-07-001
    name: BDSK 虚拟董事会
    description: 由建造者、批判者、贤者、守夜人组成的四维度深度决策思维框架。
