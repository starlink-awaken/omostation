m2_type: ConstraintMgmt
version: 1.0.0
created: '2026-06-06'
constraint_mgmt:
  m3_parent: GovernanceElement.Constraint
  description: 管理约束——什么限制了我们。债务·违规·技术债。回答"什么阻碍"。
  icon: 🚧
  stateMachine:
    identified:
      description: 已识别
      transitions:
      - scored
      - accepted
      - resolved
    scored:
      description: 已评分
      transitions:
      - planned
      - accepted
    planned:
      description: 已纳入计划
      transitions:
      - in_progress
      - accepted
    in_progress:
      description: 处理中
      transitions:
      - resolved
      - accepted
    resolved:
      description: 已解决
      transitions:
      - archived
    accepted:
      description: 接受不处理
      transitions:
      - archived
    archived:
      description: 归档
      transitions: []
  requiredProperties:
    constraint_desc:
      type: string
      description: 约束描述
    severity:
      type: enum
      values:
      - critical
      - high
      - medium
      - low
      description: 严重度
  optionalProperties:
    blocks:
      type: list
      description: 阻塞的行动 (→Action)
    fix_action:
      type: ref
      description: 修复行动 (→Action)
  validationRules:
  - rule: constraint_desc != null
    level: error
    message: 约束必须有描述
  examples:
  - id: CONSTRAINT-2026-06-06-001
    name: ACP 协议衰减 87%
    description: 协议已超半衰期
