m2_type: vault_path
version: 1.0.0
created: '2026-06-08T23:35:00'
description: Vault 路径 SSOT 节点(治本硬编码治理债)

# 任何 vault/iCloud 路径必须在 protocols/vault-paths.yaml 声明(单一来源),
# 不准在代码中硬编码 ~/Documents/驾驶舱/ 等 iCloud 特定路径。
# L0 知识萃取(mof-extract)扫本 SSOT 文件 → 写 M1 convention 节点,
# mof-validate 校验 SSOT 完整性。

requiredProperties: {}
optionalProperties:
  path:
    type: string
    description: 路径字符串(SSOT 键值)
  layer:
    type: string
    description: 路径所属层(L0/L1/L2/L3/L4)
  status:
    type: string
    description: 状态(managed/migrated/legacy)
