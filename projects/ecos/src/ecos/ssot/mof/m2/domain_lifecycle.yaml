# M2: Domain Lifecycle
# 域生命周期类型定义

id: domain_lifecycle
type: Type
name: 域生命周期
description: 域的完整生命周期管理流程
m3_parent: BehavioralElement.Process
layer: L4
status: active
created: '2026-06-08'
version: 1.0.0

properties:
  domain_id:
    type: ref
    description: 关联的域
    target: Domain

stateMachine:
  states:
    - proposed    # 提议中
    - active      # 活跃
    - degraded    # 降级
    - frozen      # 冻结
    - archived    # 归档
    - removed     # 已删除
    - rejected    # 已拒绝
  initial: proposed
  transitions:
    - { from: proposed, to: active, trigger: create }
    - { from: proposed, to: rejected, trigger: reject }
    - { from: active, to: degraded, trigger: degrade }
    - { from: active, to: frozen, trigger: freeze }
    - { from: degraded, to: active, trigger: restore }
    - { from: frozen, to: active, trigger: unfreeze }
    - { from: active, to: archived, trigger: archive }
    - { from: archived, to: active, trigger: restore }
    - { from: archived, to: removed, trigger: remove }

requiredProperties:
  domain_id:
    type: string
    description: 域 ID

optionalProperties:
  reason:
    type: string
    description: 状态变更原因
  dry_run:
    type: boolean
    description: 是否试运行

examples:
  - { domain_id: vault, action: create, status: active }
  - { domain_id: personal, action: freeze, reason: "数据迁移" }
  - { domain_id: test-domain, action: archive, reason: "不再使用" }
