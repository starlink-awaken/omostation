# M2: Model
# Split from M2-元模型.yaml

m2_type: Model
version: 1.0.0
created: '2026-06-06'
Model:
  m3_parent: DescriptiveElement.Model
  description: 系统的抽象表示——定义元素之间的映射、投影和转换规则。
  icon: 🧩
  stateMachine:
    draft:
      description: 草稿·概念阶段
      transitions:
      - active
      - discarded
    active:
      description: 生效中·被系统引用
      transitions:
      - deprecated
      - superseded
    deprecated:
      description: 已废弃·仍可读
      transitions:
      - archived
    superseded:
      description: 被新版本替代
      transitions:
      - archived
    archived:
      description: 归档·仅历史参考
      transitions: []
    discarded:
      description: 放弃
      transitions: []
  requiredProperties:
    source:
      type: ref
      description: 建模源 (被建模的元素)
    mapping:
      type: map
      description: 映射规则 (source→target 的转换逻辑)
    formality:
      type: enum
      description: 形式化程度
      values:
      - informal
      - semiformal
      - formal
  optionalProperties:
    target:
      type: ref
      description: 建模目标
    projects_to:
      type: list
      description: 可投影为哪些 View
    assumptions:
      type: list
      description: 建模假设
    limitations:
      type: string
      description: 已知局限
  validationRules:
  - rule: source != null
    level: error
    message: 模型必须声明建模源
  - rule: mapping.size > 0
    level: error
    message: 模型必须定义至少一条映射规则
  - rule: status == 'active' implies formality != 'informal'
    level: warning
    message: 生效中的模型应至少有 semi-formal 定义
  relationConstraints:
    can_be_source_of:
    - References
    - EquivalentTo
    - Generalizes
    can_be_target_of:
    - References
    - Realizes
    - Constrains
    cardinality_rules:
    - relation: Realizes
      from: Architecture
      to: Model
      cardinality: 1:N
      note: 一个架构可实现多个模型
  examples:
  - id: MODEL-2026-06-05-001
    name: 统一架构模型
    description: 5+4+1 ↔ L0-L4+X1-X4 双向映射模型
  - id: MODEL-2026-06-06-001
    name: M3-元元模型
    description: MOF 类型系统本身的模型（自反）
