# M2: Artifact
# Split from M2-元模型.yaml

m2_type: Artifact
version: 1.0.0
created: '2026-06-06'
Artifact:
  m3_parent: StructuralElement.Artifact
  description: 可寻址的文件/数据产物——脚本、配置、文档、数据库。
  icon: 📄
  stateMachine:
    active:
      description: 活跃使用中
      transitions:
      - deprecated
      - archived
    deprecated:
      description: 已废弃
      transitions:
      - archived
    archived:
      description: 归档
      transitions: []
  requiredProperties:
    path:
      type: string
      description: 文件路径或数据源路径
    format:
      type: enum
      description: 格式
      values:
      - python
      - yaml
      - markdown
      - sqlite
      - json
      - shell
  optionalProperties:
    size:
      type: integer
      description: 字节数
    mtime:
      type: string
      description: 最后修改时间
    layer:
      type: string
      description: 所属层
  validationRules:
  - rule: path != null
    level: error
    message: 产物必须声明路径
  relationConstraints:
    can_be_target_of:
    - Invokes
    - References
    - Constrains
  examples:
  - id: ARTIFACT-SCRIPT-ecos-daemon
    name: ecos-daemon.py
    description: L1 守护进程脚本
