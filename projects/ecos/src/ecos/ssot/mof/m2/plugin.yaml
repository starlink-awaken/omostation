# M2: Plugin
# 插件扩展框架类型定义

id: plugin
type: Type
name: 插件
description: 域类型插件扩展 — 为不同域类型提供业务动作、工作流、规范、机制
m3_parent: StructuralElement.Component
layer: L4
status: active
created: '2026-06-08'
version: 1.0.0

properties:
  domain_type:
    type: enum
    description: 适用的域类型
    values: [document, config, engine, tool, workspace, storage, model]

  plugin_type:
    type: enum
    description: 插件类型
    values: [builtin, external, community]

requiredProperties:
  domain_type:
    type: string
  name:
    type: string

optionalProperties:
  actions:
    type: list
    description: 业务动作列表
    items:
      type: string
  workflows:
    type: list
    description: 工作流模板列表
    items:
      type: ref
      target: Workflow
  specifications:
    type: list
    description: 规范列表
    items:
      type: ref
      target: Specification
  mechanisms:
    type: list
    description: 自动机制列表
    items:
      type: ref
      target: Mechanism

relationConstraints:
  can_be_source_of: [Contains, References]
  can_be_target_of: [Contains]

examples:
  - { id: PLUGIN-document-kems, domain_type: document, name: "DocumentKemsPlugin", actions: [state_review, signal_respond, status_evaluate] }
  - { id: PLUGIN-config-schema, domain_type: config, name: "ConfigSchemaPlugin", actions: [validate_schema, diff_config] }
