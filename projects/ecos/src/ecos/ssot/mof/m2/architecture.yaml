# M2: Architecture
# Split from M2-元模型.yaml

m2_type: Architecture
version: 1.0.0
created: '2026-06-06'
Architecture:
  m3_parent: DescriptiveElement.Architecture
  description: 系统的组件-连接器-拓扑结构——定义'系统如何组织'。
  icon: 🏗️
  stateMachine:
    draft:
      description: 设计阶段
      transitions:
      - active
    active:
      description: 当前架构·系统遵循
      transitions:
      - evolving
      - deprecated
    evolving:
      description: 演化中·部分变更
      transitions:
      - active
    deprecated:
      description: 已废弃·新架构生效
      transitions:
      - archived
    archived:
      description: 历史归档
      transitions: []
  requiredProperties:
    topology:
      type: enum
      description: 拓扑类型
      values:
      - layered
      - mesh
      - hub_spoke
      - pipeline
      - modular
    components:
      type: list
      description: 组件清单 (至少列出顶层组件)
  optionalProperties:
    connectors:
      type: list
      description: 连接器/协议清单
    quality_attrs:
      type: map
      description: '{属性: 目标值}'
    evolution_path:
      type: list
      description: 演化路径 [当前→下一阶段→目标]
    debts:
      type: list
      description: 架构债务
  validationRules:
  - rule: components.size >= 1
    level: error
    message: 架构必须声明至少一个组件
  - rule: topology != null
    level: error
    message: 架构必须声明拓扑类型
  - rule: status == 'active' implies debts == []
    level: warning
    message: 活跃架构不应有未解决的架构债务
  relationConstraints:
    can_be_source_of:
    - Contains
    - References
    - Generalizes
    can_be_target_of:
    - Realizes
    - Constrains
    - Audits
  examples:
  - id: ARCH-2026-06-05-001
    name: eCOS v5 架构
    description: '5+4+1 层结构: L0-L4+X1-X4+I0+P0'
  - id: ARCH-2026-06-06-001
    name: 织星架构
    description: 5层技术栈·4维治理·1织物·1界面
