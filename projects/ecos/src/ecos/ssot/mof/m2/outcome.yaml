Outcome:
  m3_parent: StructuralElement.Artifact
  description: 成果——产出了什么。交付物·变更·产出。回答"产出了什么"。
  icon: 📦
  stateMachine:
    draft:
      description: 草稿
      transitions:
      - review
      - published
    review:
      description: 审阅中
      transitions:
      - published
      - draft
    published:
      description: 已发布
      transitions:
      - maintained
      - superseded
    maintained:
      description: 维护中
      transitions:
      - superseded
    superseded:
      description: 被替代
      transitions:
      - archived
    archived:
      description: 归档
      transitions: []
  requiredProperties:
    outcome:
      type: string
      description: 成果描述
    from_action:
      type: ref
      description: 来源行动 (→Action)
  optionalProperties:
    artifact:
      type: ref
      description: 关联产物 (→Artifact)
    url:
      type: string
      description: 可访问地址
  validationRules:
  - rule: outcome != null
    level: error
    message: 成果必须有描述
  examples:
  - id: OUTCOME-2026-06-06-001
