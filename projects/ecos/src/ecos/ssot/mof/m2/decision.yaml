# M2: Decision
# Split from M2-元模型.yaml

m2_type: Decision
version: 1.0.0
created: '2026-06-06'
Decision:
  m3_parent: GovernanceElement.Policy
  description: 架构决策记录 (ADR) — 记录关键设计决策及其理由。回答'为什么这样做'。
  icon: 🧭
  stateMachine:
    proposed:
      description: 提议中
      transitions:
      - accepted
      - rejected
      - superseded
    accepted:
      description: 已接受·当前生效
      transitions:
      - superseded
      - deprecated
    rejected:
      description: 已拒绝
      transitions:
      - archived
    superseded:
      description: 被替代
      transitions:
      - archived
    deprecated:
      description: 不再适用
      transitions:
      - archived
    archived:
      description: 归档
      transitions: []
  requiredProperties:
    problem:
      type: string
      description: 要解决的问题或背景
    decision:
      type: string
      description: 最终选择的方案
    rationale:
      type: string
      description: 选择理由
  optionalProperties:
    options:
      type: list
      description: 候选方案
    consequences:
      type: string
      description: 决策后果
    superseded_by:
      type: ref
      description: 替代决策
  validationRules:
  - rule: problem != null and decision != null
    level: error
    message: 决策必须有 问题/决策
  examples:
  - id: DEC-2026-06-05-001
    name: CARDS v2.0 SQLite 替代 Markdown
    description: 追踪系统 SSOT 从 Markdown → SQLite + MCP
