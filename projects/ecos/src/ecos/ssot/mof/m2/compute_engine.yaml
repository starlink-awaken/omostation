m2_type: compute_engine
version: 1.0.0
created: '2026-06-07'
compute_engine:
  m3_parent: StructuralElement.Component
  description: 大模型运行时引擎 (Compute Engine)
  icon: ⚙️
  stateMachine:
    active:
      description: 运行中
      transitions: []
  requiredProperties:
    node_ref:
      type: ref
      description: 关联的算力节点
    engine_type:
      type: string
      description: 引擎类型 (local_daemon, cloud_api)
    supported_protocols:
      type: list
      description: 支持的协议列表
    cost_multiplier:
      type: float
      description: 成本乘数
  optionalProperties:
    base_url:
      type: string
      description: 引擎接入点地址
    auth_source:
      type: string
      description: 认证中心
