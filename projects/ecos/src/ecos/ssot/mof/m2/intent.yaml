# M2: Intent

m2_type: Intent
version: 1.0.0
created: '2026-06-06'
Intent:
  m3_parent: GovernanceElement.Policy
  description: 意图——为什么要做。目标·决策·想法。回答"为什么"。
  icon: 🎯
  stateMachine:
    proposed:
      description: 提议中
      transitions:
      - accepted
      - rejected
      - superseded
    accepted:
      description: 已接受·执行中
      transitions:
      - completed
      - superseded
      - cancelled
    completed:
      description: 已完成
      transitions:
      - archived
    rejected:
      description: 已拒绝
      transitions:
      - archived
    superseded:
      description: 被替代
      transitions:
      - archived
    cancelled:
      description: 已取消
      transitions:
      - archived
    archived:
      description: 归档
      transitions: []
  requiredProperties:
    goal:
      type: string
      description: 目标描述（一句话）
    rationale:
      type: string
      description: 为什么做这个
  optionalProperties:
    metrics:
      type: map
      description: 成功度量
    parent:
      type: ref
      description: 上层意图 (→Intent)
    drives:
      type: list
      description: 驱动的行动 (→Action)
  validationRules:
  - rule: goal != null
    level: error
    message: 意图必须有目标描述
  examples:
  - id: INTENT-2026-06-06-001
    name: 新增 X4 一致性治理维
    description: 将一致性从 X2 独立为第 4 治理维度
