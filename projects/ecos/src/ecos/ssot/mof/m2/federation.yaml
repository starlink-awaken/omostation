# M2: Federation
# 联邦中枢类型定义

id: federation
type: Type
name: 联邦中枢
description: 多节点 L4 域联邦管理 — 节点注册、域同步、跨节点信号路由
m3_parent: StructuralElement.Component
layer: L4
status: active
created: '2026-06-08'
version: 1.0.0

properties:
  node_id:
    type: string
    description: 当前节点 ID

  federation_mode:
    type: enum
    description: 联邦模式
    values: [standalone, primary, replica, observer, coordinator]

requiredProperties:
  node_id:
    type: string

optionalProperties:
  peers:
    type: list
    description: 对等节点列表
    items:
      type: ref
      target: PeerNode

  federated_domains:
    type: list
    description: 联邦域列表
    items:
      type: ref
      target: FederatedDomain

  sync_strategies:
    type: list
    description: 支持的同步策略
    items:
      type: enum
      values: [push, pull, merge, none]

  task_strategies:
    type: list
    description: 任务分配策略
    items:
      type: enum
      values: [affinity, load_balance, capability]

examples:
  - { node_id: mac-primary, federation_mode: primary, peers: 3, federated_domains: 5 }
  - { node_id: linux-replica, federation_mode: replica, sync_strategy: pull }
