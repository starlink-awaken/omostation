# M2: Entity
# Split from M2-元模型.yaml

m2_type: Entity
version: 1.0.0
created: '2026-06-06'
Entity:
  m3_parent: StructuralElement.Entity
  description: 有身份、可跨域追踪的事物——定义'系统中有哪些重要的东西'。
  icon: 🏷️
  stateMachine:
    emerging:
      description: 浮现中·未正式定义
      transitions:
      - active
    active:
      description: 活跃实体
      transitions:
      - inactive
      - merged
      - archived
    inactive:
      description: 不活跃·保留
      transitions:
      - active
      - archived
    merged:
      description: 已合并到其他实体
      transitions:
      - archived
    archived:
      description: 归档
      transitions: []
  requiredProperties:
    domain:
      type: string
      description: SSOT 所在域 (如 领域知识库/人物)
    entity_type:
      type: enum
      description: 实体分类
      values:
      - person
      - organization
      - project
      - asset
      - concept
      - document
      - system
  optionalProperties:
    identity:
      type: map
      description: 跨域解析键 (用于 entity resolution)
    attributes:
      type: map
      description: 域特有属性
    relations:
      type: list
      description: 与其他实体的关系 (→Entity)
    sources:
      type: list
      description: SSOT 来源文件列表
    cross_domain_refs:
      type: list
      description: 跨域指针
  validationRules:
  - rule: domain != null
    level: error
    message: 实体必须声明 SSOT 所在域
  - rule: identity != null or sources != null
    level: error
    message: 实体必须有身份键或来源文件
  - rule: status == 'merged' implies relations exists (target of merge)
    level: warning
    message: 合并的实体应指向合并目标
  relationConstraints:
    can_be_source_of:
    - References
    - DependsOn
    - BelongsTo
    can_be_target_of:
    - References
    - DependsOn
    - BelongsTo
    - Attributes
    cardinality_rules:
    - relation: BelongsTo
      from: Entity
      to: Entity
      cardinality: N:1
      note: 多个实体可属于同一个组织/域
  examples:
  - id: ENT-2026-05-22-001
    name: 夏明星
    description: '个人实体 — SSOT: 领域知识库/人物/实体/'
  - id: ENT-2026-05-22-002
    name: 房山区卫健委
    description: '组织实体 — SSOT: 领域知识库/组织/实体/'
