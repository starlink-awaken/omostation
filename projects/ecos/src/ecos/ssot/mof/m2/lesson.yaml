# M2: Lesson
# Split from M2-元模型.yaml

m2_type: Lesson
version: 1.0.0
created: '2026-06-06'
Lesson:
  m3_parent: GovernanceElement.Pattern
  description: 从实践中提炼的经验教训——记录'发生了什么、学到了什么'。
  icon: 📖
  stateMachine:
    recorded:
      description: 已记录
      transitions:
      - validated
      - archived
    validated:
      description: 已验证
      transitions:
      - promoted
      - archived
    promoted:
      description: 已升级为 Pattern/Constraint
      transitions: []
    archived:
      description: 归档
      transitions: []
  requiredProperties:
    incident:
      type: string
      description: 触发事件
    lesson:
      type: string
      description: 学到的教训
  optionalProperties:
    root_cause:
      type: string
      description: 根因分析
    prevention:
      type: string
      description: 预防措施
    source:
      type: ref
      description: 来源文件
    severity:
      type: enum
      values:
      - critical
      - high
      - medium
      - low
      description: 严重度
  validationRules:
  - rule: incident != null and lesson != null
    level: error
    message: 教训必须有 事件/教训
  examples:
  - id: LESS-2026-06-06-001
    name: Daemon 需要运行存在而非设计存在
    description: 文件存在 ≠ 系统在运行 — launchctl 未加载
