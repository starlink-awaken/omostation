# M2: Domain
# Domain 类型定义 — 19 域异构体系的元模型

m2_type: Domain
version: 1.0.0
created: '2026-06-07'
Domain:
  m3_parent: StructuralElement.Component
  description: 织星生态的域——异构体系的基本组织单元，每个域封装一类资产（文档/配置/引擎/工具/工作空间/存储/模型）。
  icon: 🌐
  stateMachine:
    emerging:
      description: 浮现中·已识别但未正式建模
      transitions:
      - active
    active:
      description: 活跃域·可 BOS URI 寻址
      transitions:
      - dormant
      - deprecated
    dormant:
      description: 休眠·路径不可达但保留注册
      transitions:
      - active
      - deprecated
    deprecated:
      description: 已废弃·功能被其他域承接
      transitions:
      - archived
    archived:
      description: 已归档
      transitions: []
  requiredProperties:
    bos_uri_pattern:
      type: string
      description: BOS URI 模式, 如 bos://{id}/**
    domain_type:
      type: enum
      description: 域类型分类
      values: [document, config, engine, tool, workspace, storage, model]
    layer:
      type: string
      description: 所属层 (L0-L4 / I0 / X1-X4)
  optionalProperties:
    kems_planes:
      type: list
      description: KEMS 标准面列表 (仅 document 域适用)
      items:
        type: string
    capabilities:
      type: list
      description: 域提供的能力清单
      items:
        type: string
    entry_points:
      type: map
      description: 访问入口 cli/mcp/web
      keys:
        type: string
      values:
        type: string
    governance_tier:
      type: integer
      description: 治理层级 1-3
      min: 1
      max: 3
    storage:
      type: string
      description: 物理存储路径
    claude_md:
      type: string
      description: CLAUDE.md 入口文件路径
  validationRules:
    - { rule: domain_type == 'document' implies kems_planes != null, level: warning, message: "文档域应定义 KEMS 面" }
    - { rule: governance_tier >= 1, level: info, message: "建议设置治理层级" }
  relationConstraints:
    can_be_source_of: [Contains, CommunicatesVia]
    can_be_target_of: [Contains, Manages]
  examples:
    - { id: DOMAIN-cockpit, name: 驾驶舱, domain_type: document, bos_uri: "bos://cockpit/**" }
    - { id: DOMAIN-minerva, name: Minerva引擎, domain_type: engine, bos_uri: "bos://minerva/**" }
    - { id: DOMAIN-toolbox, name: ToolBox, domain_type: tool, bos_uri: "bos://toolbox/**" }
