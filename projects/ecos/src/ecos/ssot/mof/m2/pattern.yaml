# M2: Pattern
# Split from M2-元模型.yaml

m2_type: Pattern
version: 1.0.0
created: '2026-06-06'
Pattern:
  m3_parent: GovernanceElement.Pattern
  description: 可复用的解决方案模板——定义'这类问题怎么解决'。
  icon: 📐
  stateMachine:
    emerging:
      description: 浮现中·从实践中提炼
      transitions:
      - documented
    documented:
      description: 已记录·可供引用
      transitions:
      - validated
      - deprecated
    validated:
      description: 已验证·推荐使用
      transitions:
      - deprecated
    deprecated:
      description: 不再推荐·有更好的替代
      transitions:
      - archived
    archived:
      description: 归档
      transitions: []
  requiredProperties:
    problem:
      type: string
      description: 要解决的问题
    context:
      type: string
      description: 适用上下文 (何时用/何时不用)
    solution:
      type: string
      description: 解决方案描述
  optionalProperties:
    known_uses:
      type: list
      description: 已知应用实例 (→M1节点引用)
    anti_pattern:
      type: string
      description: 反模式 (看起来像但实际不适用的情况)
    forces:
      type: list
      description: 权衡因素
    related_patterns:
      type: list
      description: 相关模式 (→Pattern)
  validationRules:
  - rule: problem != null and context != null and solution != null
    level: error
    message: 模式必须包含问题/上下文/解决方案
  - rule: status == 'validated' implies known_uses.size >= 2
    level: warning
    message: 验证过的模式应有≥2个应用实例
  relationConstraints:
    can_be_source_of:
    - Generalizes
    - References
    can_be_target_of:
    - Generalizes
    - References
    - Realizes
  examples:
  - id: PATT-2026-06-06-001
    name: SSOT 级联模式
    description: 上层定义·下层继承·不重复——确保每个事实只有一个权威位置
  - id: PATT-2026-06-06-002
    name: CARDS parent→child 模式
    description: 单向 parent 指针替代双向 children 维护——降低 Agent 写入成本
