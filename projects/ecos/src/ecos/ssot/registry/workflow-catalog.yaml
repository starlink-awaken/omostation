# ============================================================================
# 全局工作流注册表 (Global Workflow Catalog)
# eCOS v5 | L0 织星 MOF | Phase 33 · 2026-06-07
# BOS Namespace: bos://ecos/workflow
# ============================================================================

version: "1.0.0"
created: "2026-06-07"
description: "全局工作流注册表 — 所有层的所有工作流统一清单，按 BOS 5 域 + meta 分组"
bos_namespace: bos://ecos/workflow

# ============================================================================
# 按域分组
# ============================================================================
domains:
  # ── 域 1: bos://memory — 记忆与事实源 ──
  memory:
    description: "记忆与事实源域 — 知识摄取、存储、同步、搜索"
    workflows:
      - id: WORKFLOW-KRONOS-INGEST
        name: "Kronos 摄取管线"
        description: "ETL 知识摄取: 多源采集 → 内容提取 → 分发到 Vault/WPS/KOS"
        layer: L2
        project: kairon/kronos
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/kronos-ingest
        triggers:
          - bos://memory/feeds/rss
          - bos://memory/feeds/gzh
        outputs:
          - bos://memory/kos/ontology
          - bos://memory/gbrain/tables
        entrypoint: src/kronos/dispatcher.py

      - id: WORKFLOW-GBRAIN-KNOWLEDGE-SYNC
        name: "gbrain 知识同步管线"
        description: "TypeScript 知识库与 Postgres 同步管线，67 MCP 工具"
        layer: L2
        project: gbrain
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/gbrain-knowledge-sync
        triggers:
          - bos://memory/kos
        outputs:
          - bos://memory/gbrain
        entrypoint: src/

      - id: WORKFLOW-SOT-BRIDGE-SYNC
        name: "SSOT 桥接同步管线"
        description: "单一事实源桥接: SharedBrain ↔ KOS ↔ Vault 双向同步"
        layer: L2
        project: kairon/sot-bridge
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/sot-bridge-sync
        triggers:
          - bos://memory/vault
          - bos://persona/sharedbrain
        outputs:
          - bos://memory/kos
        entrypoint: src/sot_bridge/

      - id: WORKFLOW-KOS-CROSS-SEARCH
        name: "KOS 跨域搜索管线"
        description: "跨域知识搜索: 全文索引 → 语义匹配 → 结果排序"
        layer: L2
        project: kairon/kos
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/kos-cross-search
        triggers:
          - bos://analysis/query
        outputs:
          - bos://analysis/results
        entrypoint: src/kos/

  # ── 域 2: bos://omo — 治理与律法 ──
  omo:
    description: "治理与律法域 — 任务编排、H-M 协议、多工具链"
    workflows:
      - id: WORKFLOW-METAOS-DAG-ORCHESTRATE
        name: "MetaOS DAG 编排管线"
        description: "有向无环图并行编排: SQLite 持久化 + 并发执行 + 指数退避重试 + HITL"
        layer: L2
        project: metaos
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/metaos-dag-orchestrate
        triggers:
          - bos://omo/task/created
        outputs:
          - bos://omo/task/completed
        entrypoint: src/metaos/core/workflow.py

      - id: WORKFLOW-METAOS-H-M-PROTOCOL
        name: "MetaOS 六步 H-M 标准协议"
        description: "H-M 交互核心: 权限判定 → 路由 → M执行 → 免疫检测 → 结果组装 → H确认"
        layer: L2
        project: metaos
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/metaos-h-m-protocol
        triggers:
          - bos://omo/decision/request
        outputs:
          - bos://omo/decision/result
        entrypoint: src/metaos/core/engine.py

      - id: WORKFLOW-EIDOS-PIPELINE
        name: "Eidos 多工具编排链"
        description: "通过 subprocess 串联 eidos/kos/minerva/ontoderive 多工具链式调用"
        layer: L2
        project: kairon/eidos
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/eidos-pipeline
        triggers:
          - bos://omo/schema/change
        outputs:
          - bos://omo/schema/validated
        entrypoint: src/eidos/pipeline/__init__.py

  # ── 域 3: bos://analysis — 认知与推演 ──
  analysis:
    description: "认知与推演域 — 深度研究、并行执行、向量嵌入、文档代码对齐"
    workflows:
      - id: WORKFLOW-MINERVA-DEEP-RESEARCH
        name: "Minerva 五级深度研究管线"
        description: "L0-L4 五级分层研究: Decompose→Search→EntityExtraction→DeepRead→CrossAnalyze→CounterArgument→MultiModelVoting→QualityGate→Output"
        layer: L2
        project: kairon/minerva
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/minerva-deep-research
        triggers:
          - MECH-SCHEDULED-kos-daily-ontology-sync
        outputs:
          - bos://analysis/report
        entrypoint: src/minerva/pipeline/engine.py

      - id: WORKFLOW-MINERVA-PONTUS-DAG
        name: "Minerva Pontus DAG 并行执行器"
        description: "基于拓扑排序的 DAG 并行管线执行器，支持异步/同步双模式"
        layer: L2
        project: kairon/minerva
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/minerva-pontus-dag
        triggers:
          - WORKFLOW-MINERVA-DEEP-RESEARCH
        outputs:
          - bos://analysis/parallel-results
        entrypoint: src/minerva/pipeline/pontus/scheduler.py

      - id: WORKFLOW-MINERVA-VECTOR
        name: "Minerva VectorPipeline 向量嵌入"
        description: "高性能批量文档向量化与索引构建管线"
        layer: L2
        project: kairon/minerva
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/minerva-vector
        triggers:
          - bos://memory/kos/update
        outputs:
          - bos://analysis/vectors
        entrypoint: src/minerva/index/vector_pipeline.py

      - id: WORKFLOW-ONTODERIVE-DLOGOS
        name: "Ontoderive D-Logos 文档代码对齐"
        description: "文档-代码对齐批量管线: Scan→Align→Validate→Evolve，支持断点续传"
        layer: L2
        project: kairon/ontoderive
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/ontoderive-dlogos
        triggers:
          - bos://forge/codebase/change
        outputs:
          - bos://analysis/alignment
        entrypoint: src/ontoderive/engine/pipeline.py

  # ── 域 4: bos://persona — 人格与心智 ──
  persona:
    description: "人格与心智域 — SharedBrain 桥接"
    workflows:
      - id: WORKFLOW-SHAREDBRAIN-BRIDGE
        name: "SharedBrain 桥接管线"
        description: "SharedBrain 知识图谱 ↔ KOS 语义网双向桥接同步"
        layer: L2
        project: kairon/sot-bridge
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/sharedbrain-bridge
        triggers:
          - bos://persona/sharedbrain/update
        outputs:
          - bos://memory/kos
        entrypoint: src/sot_bridge/

  # ── 域 5: bos://forge — 能力与生态 ──
  forge:
    description: "能力与生态域 — 运行时场景、HITL 处理、KEI 沙箱"
    workflows:
      - id: WORKFLOW-RUNTIME-SCENARIO
        name: "Runtime 场景管线"
        description: "6 预定义场景: standard/quick-analysis/full-review/learning-cycle/knowledge-refresh/deep-analysis"
        layer: L1
        project: runtime
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/runtime-scenario
        triggers:
          - bos://forge/agent/request
        outputs:
          - bos://forge/result
        entrypoint: src/runtime/executor/workflows/SCENARIOS.py

      - id: WORKFLOW-RUNTIME-HITL
        name: "Runtime HITL 五阶段处理管线"
        description: "Human-in-the-Loop 知识处理: 意图拆解→多源检索→洞察生成→图谱更新→闭环验证"
        layer: L1
        project: runtime
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/runtime-hitl
        triggers:
          - bos://forge/task/complex
        outputs:
          - bos://forge/insight
        entrypoint: src/runtime/executor/workflows/scenario3/run_pipeline.py

      - id: WORKFLOW-RUNTIME-KEI
        name: "Runtime KEI 沙箱执行管线"
        description: "受控沙箱执行: 环境准备 → 代码执行 → 结果收集 → 安全审计"
        layer: L1
        project: runtime
        subtype: PipelineWorkflow
        bos_uri: bos://ecos/workflow/runtime-kei
        triggers:
          - bos://forge/code/execute
        outputs:
          - bos://forge/result
        entrypoint: src/runtime/executor/

  # ── 域 meta: 元系统跨域 ──
  meta:
    description: "元系统跨域 — L0 审计、巡检、同步，I0 代理编排"
    workflows:
      - id: WORKFLOW-ECOS-DAILY-HEALTH
        name: "每日健康巡检管线"
        description: "健康检查→域校验→索引同步→BOS校验→路由更新 (每日 08:00)"
        layer: L0
        project: ecos
        subtype: ScheduledWorkflow
        bos_uri: bos://ecos/workflow/daily-health
        triggers:
          - MECH-DAEMON-CYCLE
        outputs:
          - bos://meta/health/report
        entrypoint: src/ecos/workflow/definitions/daily-health-report.yaml

      - id: WORKFLOW-ECOS-WEEKLY-AUDIT
        name: "每周全量审计管线"
        description: "KEMS校验→漂移检测→引用检查→BOS校验→路由更新→健康检查 (每周一 09:00)"
        layer: L0
        project: ecos
        subtype: ScheduledWorkflow
        bos_uri: bos://ecos/workflow/weekly-audit
        triggers:
          - MECH-DAEMON-CYCLE
        outputs:
          - bos://meta/audit/report
        entrypoint: src/ecos/workflow/definitions/weekly-audit.yaml

      - id: WORKFLOW-ECOS-SYNC-ALL
        name: "全量同步管线"
        description: "域索引同步 + BOS 路由更新"
        layer: L0
        project: ecos
        subtype: ScheduledWorkflow
        bos_uri: bos://ecos/workflow/sync-all
        triggers:
          - bos://meta/domain/change
        outputs:
          - bos://meta/index
        entrypoint: src/ecos/workflow/definitions/sync-all.yaml

      - id: WORKFLOW-AGORA-PIPELINE
        name: "Agora MCP 工具编排管线"
        description: "多步 MCP 工具调用编排: 顺序/流式/并行三种执行模式"
        layer: I0
        project: agora
        subtype: MCPWorkflow
        bos_uri: bos://ecos/workflow/agora-pipeline
        triggers:
          - bos://forge/tool/chain
        outputs:
          - bos://forge/chain/result
        entrypoint: src/agora/pipeline.py

      - id: WORKFLOW-AGORA-ORCHESTRATOR
        name: "Agora 工具全流程编排"
        description: "MCP 工具生命周期: 发现→保存→安装→加载→健康检查→空闲超时卸载"
        layer: I0
        project: agora
        subtype: MCPWorkflow
        bos_uri: bos://ecos/workflow/agora-orchestrator
        triggers:
          - bos://forge/tool/discover
        outputs:
          - bos://forge/tool/loaded
        entrypoint: src/agora/mcp_registry/orchestrator.py

# ============================================================================
# Agent Workflows (L3 入口层) — 6 个已有，不变
# ============================================================================
  infra:
    description: "L3 Agent 原生工作流 — 由 Agent 调用触发"
    workflows:
      - id: WORKFLOW-CREATE
        name: "Create 工作流"
        description: "脚手架→编码→文档→提交"
        layer: L3
        project: cockpit
        subtype: AgentWorkflow
        bos_uri: bos://ecos/workflow/create
        triggers:
          - agent-invoke
      - id: WORKFLOW-DEBUG
        name: "Debug 工作流"
        description: "定位问题→分析根因→修复→验证"
        layer: L3
        project: cockpit
        subtype: AgentWorkflow
        bos_uri: bos://ecos/workflow/debug
        triggers:
          - agent-invoke
      - id: WORKFLOW-DEPLOY
        name: "Deploy 工作流"
        description: "构建→测试→部署→健康检查"
        layer: L3
        project: cockpit
        subtype: AgentWorkflow
        bos_uri: bos://ecos/workflow/deploy
        triggers:
          - agent-invoke
      - id: WORKFLOW-ENHANCE
        name: "Enhance 工作流"
        description: "现有工程增强流程"
        layer: L3
        project: cockpit
        subtype: AgentWorkflow
        bos_uri: bos://ecos/workflow/enhance
        triggers:
          - agent-invoke
      - id: WORKFLOW-PLAN
        name: "Plan 工作流"
        description: "需求分析→方案设计→任务分解→分配"
        layer: L3
        project: cockpit
        subtype: AgentWorkflow
        bos_uri: bos://ecos/workflow/plan
        triggers:
          - agent-invoke
      - id: WORKFLOW-TEST
        name: "Test 工作流"
        description: "测试流程"
        layer: L3
        project: cockpit
        subtype: AgentWorkflow
        bos_uri: bos://ecos/workflow/test
        triggers:
          - agent-invoke

# ============================================================================
# 全局关系图 (Global Relations)
# ============================================================================
global_relations:
  # ── 触发链 ──
  triggers:
    - from: MECH-DAEMON-CYCLE
      to: WORKFLOW-ECOS-DAILY-HEALTH
      cardinality: "1:N"
      note: "Daemon 每 6h → 健康巡检 + 周审计 (周一)"
    - from: MECH-SCHEDULED-kos-daily-ontology-sync
      to: WORKFLOW-MINERVA-DEEP-RESEARCH
      cardinality: "1:1"
      note: "每日本体同步 → Minerva 深度分析"
    - from: WORKFLOW-MINERVA-DEEP-RESEARCH
      to: WORKFLOW-MINERVA-PONTUS-DAG
      cardinality: "1:1"
      note: "Minerva 研究 → Pontus 并行执行器"
    - from: MECH-SCHEDULED-rss-fetcher
      to: WORKFLOW-KRONOS-INGEST
      cardinality: "1:1"
      note: "RSS 定时采集 → Kronos 摄取管线"
    - from: WORKFLOW-RUNTIME-SCENARIO
      to: WORKFLOW-RUNTIME-HITL
      cardinality: "N:1"
      note: "场景触发 HITL 五阶段处理"

  # ── 数据流 ──
  data_flows:
    - from: bos://memory/kos
      to: bos://analysis/minerva
      note: "KOS 知识库 → Minerva 输入源"
    - from: bos://memory/vault
      to: bos://memory/kos
      note: "Vault Obsidian → KOS 索引"
    - from: bos://forge/codebase
      to: bos://analysis/ontoderive
      note: "代码库 → Ontoderive 文档对齐"
    - from: bos://analysis/minerva
      to: bos://forge/result
      note: "Minerva 分析结果 → 运行时消费"
    - from: bos://omo/schema
      to: bos://analysis/eidos
      note: "Schema 变更 → Eidos 编排处理"

  # ── 依赖关系 ──
  dependencies:
    - dependent: WORKFLOW-MINERVA-DEEP-RESEARCH
      depends_on: WORKFLOW-KRONOS-INGEST
      note: "Minerva 分析依赖 Kronos 采集的数据"
    - dependent: WORKFLOW-MINERVA-VECTOR
      depends_on: WORKFLOW-KRONOS-INGEST
      note: "向量嵌入依赖 Kronos 摄取的新文档"
    - dependent: WORKFLOW-SOT-BRIDGE-SYNC
      depends_on: WORKFLOW-KRONOS-INGEST
      note: "SSOT 桥接依赖 Kronos 基础数据"
    - dependent: WORKFLOW-ONTODERIVE-DLOGOS
      depends_on: WORKFLOW-MINERVA-DEEP-RESEARCH
      note: "文档对齐依赖 Minerva 深度分析结果"
    - dependent: WORKFLOW-AGORA-PIPELINE
      depends_on: WORKFLOW-AGORA-ORCHESTRATOR
      note: "Pipeline 编排依赖 Orchestrator 的工具加载"

# ============================================================================
# 统计摘要
# ============================================================================
stats:
  total: 26
  by_layer:
    L0: 3
    L1: 3
    L2: 12
    I0: 2
    L3: 6
    L4: 0
  by_domain:
    memory: 4
    omo: 3
    analysis: 4
    persona: 1
    forge: 3
    meta: 5
    infra: 6
  by_subtype:
    PipelineWorkflow: 14
    AgentWorkflow: 6
    ScheduledWorkflow: 3
    MCPWorkflow: 3
