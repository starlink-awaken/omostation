# kos-index.yaml — L4 Vault + 领域知识库 KOS 索引配置
#
# 目的：将 L4 自我层的文档体系纳入 KOS（L2 引擎平面）索引，
#       使 Agent 可通过 `kos search` MCP tool 搜索 L4 内容。
#
# 消费方：kairon/packages/kos — `kos index --config <本文件>`
# SSOT：本文件定义"哪些 L4 路径进入 KOS 索引"
#
# v1.0 | 2026-06-06 | L4 收敛 — P0+P1 治理修复

version: "1.0"

# ── 索引数据库 ──
index:
  db_path: ~/Documents/.kos-index.db          # L4 本地索引（与 Workspace kos-index 独立）
  # 说明：本索引为 L4 专用。Workspace 的 kos-index.sqlite 索引 Workspace 代码和工程文档。
  #       当 Agent 搜"四平面"时，同时查两个索引或由 Agora 路由聚合。

# ── 索引源 ──
sources:

  # ── 学习进化 Vault（知识面主体）──
  - name: vault-knowledge
    path: ~/Documents/学习进化/2-knowledge/
    include:
      - "**/*.md"
    exclude:
      - "**/.obsidian/**"
      - "**/.DS_Store"
      - "**/_archive/**"          # 归档内容不入索引
    priority: high
    description: 方法论·基建架构·创意创作·渠道传播·经验积累

  - name: vault-active
    path: ~/Documents/学习进化/1-active/
    include:
      - "**/*.md"
    exclude:
      - "**/收件箱/**"            # 收件箱是暂存区，不入索引
    priority: high
    description: 自我剖析·收件箱（活跃内容）

  - name: vault-archive
    path: ~/Documents/学习进化/3-archive/
    include:
      - "**/*.md"
    priority: medium
    description: 灵感顿悟·资料库（归档内容，搜索结果中降权）

  # ── 领域知识库（SSOT 实体）──
  - name: domain-entities
    path: ~/Documents/领域知识库/
    include:
      - "**/*.md"
    priority: high
    description: 医疗信息化等领域的 SSOT 实体定义

  # ── 驾驶舱（控制面）──
  - name: cockpit
    path: ~/Documents/驾驶舱/
    include:
      - "**/*.md"
      - "**/*.yaml"
    exclude:
      - "CARDS/**"               # CARDS 由 cards MCP 独立提供，不重复索引
    priority: high
    description: 架构文档·统一模型·视图·hooks

  # ── 工作文档（工作域）──
  - name: work-docs
    path: ~/Documents/工作文档/
    include:
      - "**/*.md"
    exclude:
      - "个人资料/**"             # 敏感信息不入索引
      - "**/*.pdf"
      - "**/*.docx"
      - "**/*.xlsx"
    priority: medium
    description: 卫健委·国转中心·合同协议的方法论文档

  # ── 家庭生活（家庭域）──
  - name: family
    path: ~/Documents/家庭生活/
    include:
      - "**/*.md"
    exclude:
      - "99.文件中转/**"
      - "**/*.pdf"
      - "**/*.jpg"
      - "**/*.png"
      - "**/.omc/**"
    priority: low
    description: 家庭管理·医疗·育儿方法（低优先级，非知识面主体）

  # ── 工具箱（工具注册）──
  - name: toolbox
    path: ~/Documents/工具箱/
    include:
      - "**/*.md"
    priority: medium
    description: 工具注册表·管线·工作流

# ── 索引策略 ──
strategy:
  full_text: true              # 全文索引
  frontmatter: true            # YAML frontmatter 结构化提取
  headings: true               # 标题层级索引
  update_mode: incremental     # 增量更新（首次全量）
  schedule: manual             # 手动触发：`kos index --config kos-index.yaml`
                               # 后续可改为 daemon 自动

# ── 与 Workspace KOS 的桥接 ──
bridge:
  # 当 Agent 通过 Agora (I0) 发起搜索时，Agora 应同时查询：
  #   1. Workspace kos-index.sqlite （L2 工程知识）
  #   2. 本文件定义的 .kos-index.db （L4 文档知识）
  # 两个索引的聚合路由由 Agora 的 `kos_search` MCP tool 内部实现。
  #
  # 当前状态：Agora 尚未实现双索引聚合。本配置为后续聚合提供 L4 侧的索引定义。
  status: provisioned
  target_mcp_tool: kos_search
  aggregation: agora_routing  # 由 Agora 负责双索引结果合并
