# eCOS v5 X3 — 价值堆栈跨域注册表
# ===========================================
# Phase X3 / BKL-014 / DEBT-X-007
# 为 5 个功能域定义 value_tier / consensus / half_life
#
# 字段说明:
#   value_tier:     该域在系统中的价值层级 (1=核心宪法, 2=关键基础设施, 3=业务价值, 4=支持, 5=实验)
#   consensus:      多 Agent 对该域价值判断的一致性 (high/medium/low/unknown)
#   half_life_days: 该域信息价值的半衰期（天）— 超过此期限的信息应重新评估
#   cost_attribution: 成本归因状态 (implemented/planned/none)
#   owner:          责任 Worker

domains:
  CARDS:
    value_tier: 2
    label: "关键基础设施"
    consensus: high
    half_life_days: 7
    cost_attribution: planned
    owner: Worker-C
    description: "追踪体系——想法·研究·任务·债务·交付的 SSOT"
    value_metrics:
      - metric: "active_cards"
        description: "活跃卡片数"
        target_range: "5-20"
      - metric: "avg_cycle_time_days"
        description: "卡片平均生命周期"
        target_range: "1-14"
      - metric: "close_rate_weekly"
        description: "周关闭率"
        target_range: "20-50%"

  OMO:
    value_tier: 1
    label: "核心宪法"
    consensus: high
    half_life_days: 30
    cost_attribution: implemented
    owner: Worker-C
    description: "工程治理——任务调度·Worker 管理·债务追踪"
    value_metrics:
      - metric: "debt_count"
        description: "活跃债务数"
      - metric: "phase_progress"
        description: "Phase 完成进度"
      - metric: "omo_cost"
        description: "已实现成本归因"

  Kairon:
    value_tier: 2
    label: "关键基础设施"
    consensus: medium
    half_life_days: 14
    cost_attribution: planned
    owner: Worker-C
    description: "知识研究——31 Python 包·KOS 索引·Agora 路由·LLM Gateway"
    value_metrics:
      - metric: "package_count"
        description: "活跃包数"
      - metric: "api_calls_daily"
        description: "日均 API 调用量"
      - metric: "avg_latency_ms"
        description: "平均延迟"

  Vault:
    value_tier: 1
    label: "核心宪法"
    consensus: high
    half_life_days: 90
    cost_attribution: planned
    cost_plan: "基于 check-claude-freshness.py 扩展为价值归因: Agent读取频次 × 文件权重"
    owner: Worker-C
    description: "知识存储——Markdown 三层架构·方法论·身份·创作"
    value_metrics:
      - metric: "file_count"
        description: "活跃文件数"
      - metric: "stale_days_max"
        description: "最旧文件未更新天数"
      - metric: "cross_refs"
        description: "跨文档引用数"

  域系统:
    value_tier: 3
    label: "业务价值"
    consensus: low
    half_life_days: 30
    cost_attribution: planned
    cost_plan: "基于 CARDS domain 过滤统计各域任务吞吐量+活跃度"
    owner: Worker-C
    description: "家庭/工作领域——卫健委·国转中心·合同协议·家庭生活"
    value_metrics:
      - metric: "domain_count"
        description: "活跃域数"
      - metric: "task_throughput"
        description: "域任务吞吐量"

# 跨域汇总
summary:
  total_domains: 5
  tier_distribution:
    tier_1_core: 2    # OMO, Vault
    tier_2_infra: 2   # CARDS, Kairon
    tier_3_business: 1 # 域系统
  consensus_maturity:
    high: 3     # OMO, CARDS, Vault
    medium: 1   # Kairon
    low: 1      # 域系统
  cost_attribution_coverage:
    implemented: 1   # OMO
    planned: 4       # CARDS, Kairon, Vault, 域系统 (2026-06-06台账启动)
    none: 0

# 元信息
meta:
  version: "1.1.0"
  created: "2026-06-06"
  updated: "2026-06-06"
  phase: "X3"
  ssot: "学习进化/2-knowledge/体系/eCOS-v5-X-axis-upgrade-plan.md"
  next_review: "2026-07-06"
  change_log: "v1.1: Vault+域系统 cost_attribution none→planned (台账治理启动)"
