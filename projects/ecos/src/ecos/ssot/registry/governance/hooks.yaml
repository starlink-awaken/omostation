# hooks.yaml — L4 生命周期钩子（结构化定义）
#
# SSOT 来源：CLAUDE_COWORK_GLOBAL.md §9
# 本文件是 §9 散文定义的机器可解析版本。
# Agent 启动时优先读本文件，fallback 到 §9。
#
# v1.0 | 2026-06-06 | L4 收敛 — 网关结构化

version: "1.0"
source: CLAUDE_COWORK_GLOBAL.md §9

hooks:

  # ── 会话启动 ──
  on_session_start:
    trigger: 每次新会话
    description: 严格按序执行启动链，不可跳步
    steps:
      - order: 1
        action: read_file
        target: CLAUDE_COWORK_GLOBAL.md
        note: Cowork MEMORY → 上次遗留、全局状态
      - order: 2
        action: read_file
        target: 学习进化/1-active/自我剖析/STATE.md
        note: 当前活跃项目 + 信号
      - order: 3
        action: read_file
        target: 驾驶舱/DASHBOARD.md
        note: 全局域健康度 + 跨域信号
      - order: 4
        action: mcp_call
        tool: cards_status
        server: omo
        note: 获取所有活跃卡片，按 priority 排序
      - order: 5
        action: mcp_call
        tool: cards_check
        server: omo
        note: 检查 overdue / 约束违规
      - order: 6
        action: read_file
        target: 学习进化/1-active/自我剖析/README.md
        note: 完整画像（首次或久未更新时）
        condition: first_session_or_stale

  # ── 进入域 ──
  on_domain_enter:
    trigger: 用户触发某域意图
    steps:
      - action: read_file
        target: "{domain}/CLAUDE.md"
        note: 域操作规则
      - action: read_file
        target: "{domain}/STATE.md"
        note: 域状态（如存在）
        optional: true
    domains:
      知识管理: 学习进化/CLAUDE.md
      创作项目: 学习进化/2-knowledge/创意创作/CLAUDE.md
      渠道发布: 学习进化/2-knowledge/渠道传播/CLAUDE.md
      基建架构: 学习进化/2-knowledge/基建架构/CLAUDE.md
      工作文档: 工作文档/CLAUDE.md
      工具查询: 工具箱/REGISTRY.md
      全局状态: 驾驶舱/DASHBOARD.md
      任务追踪: 驾驶舱/CARDS/
      领域实体: 领域知识库/CLAUDE.md
      能力全貌: 学习进化/AGENTS.md

  # ── 任务开始前 ──
  before_task:
    trigger: 任何 ≥3 步的任务
    mandatory: true
    steps:
      - action: todo_write
        note: 建 TodoList。≥3步无 TodoList = 违规
    constraint:
      max_in_progress: 1

  # ── 任务完成后 ──
  after_task:
    trigger: 任务完成
    steps:
      - action: report
        note: 一句话汇报，不确定标「需确认」
      - action: mcp_call
        tool: cards_update
        server: omo
        note: 更新 CARDS 对应卡片 status
      - action: check
        note: 检查是否需要更新 STATE.md / DASHBOARD

  # ── 新想法闪现 ──
  on_idea_flash:
    trigger: 新想法闪现
    steps:
      - action: cli
        command: cards create idea "{title}"
        note: 创建 CARDS idea 卡片
      - action: remind
        note: 或提醒用户评估是否值得跟进

  # ── 跨域信号 ──
  on_cross_domain_signal:
    trigger: 操作波及他域
    steps:
      - action: write_file
        target: 驾驶舱/SIGNALS.md
        note: 登记跨域信号（日期/信号/类型/来源域/波及域/状态）

  # ── 会话结束 ──
  on_session_end:
    trigger: 会话结束前
    steps:
      - action: cli
        command: uv --directory projects/omo run cards daemon
        note: 刷新 Obsidian 视图 + DASHBOARD
      - action: check
        note: 检查 CARDS/ 中 status 变更是否已同步到 STATE.md

# ── 级联规则 ──
cascade:
  L0_Kernel: CLAUDE_COWORK_GLOBAL.md  # 定义全局钩子契约
  L1_Vault: 学习进化/CLAUDE.md        # 不重复 Kernel 钩子
  L2_Domain: "{domain}/CLAUDE.md"     # 不重复 Kernel 钩子，可追加域特有钩子
