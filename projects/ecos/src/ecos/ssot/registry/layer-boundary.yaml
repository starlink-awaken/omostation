# ============================================================================
# 织星 L0 — 层边界规则 (Layer Boundary Rules)
# ============================================================================
# 定义 5+4+1 架构中每层允许和禁止的资产类型。
# 由 mof-enforce 消费，检测资产是否在错误的层中。
#
# SSOT: ecos/src/ecos/ssot/layer-boundary.yaml
# 版本: 1.0.0 | 2026-06-06
# ============================================================================

version: "1.0.0"

# ══════════════════════════════════════════
# 每层的资产规则
# ══════════════════════════════════════════
layers:

  # ── L0: 协议编织层 ──
  L0:
    description: "协议规范·元模型·约束·模式·拓扑——系统的'DNA'"
    allowed:
      - { type: "*.yaml", condition: "constraint|protocol|topology|pattern|meta.model|ontology", note: "治理配置文件" }
      - { type: "*.py", condition: "mof-|ecos-constraint|ecos-compiler", note: "L0 工具链" }
      - { type: "directory", condition: "mof/", note: "MOF 引擎" }
      - { type: "directory", condition: "tools/", note: "L0 工具" }
      - { type: "directory", condition: "constraints/", note: "约束定义" }
      - { type: "directory", condition: "governance/", note: "治理配置" }
    forbidden:
      - { pattern: "*.md", unless: "README|INDEX|CHANGELOG", note: "L0 不存人类知识文档（那是 L4 的职责）" }
      - { pattern: "*.db|*.sqlite", note: "L0 不存运行时数据（那是 L1/L4 的职责）" }
      - { pattern: "docker-compose*|Dockerfile|Makefile", note: "L0 不存部署配置（那是 L1 的职责）" }

  # ── L1: 运行时矩阵层 ──
  L1:
    description: "服务编排·资源管理·健康监控·进程生命周期"
    allowed:
      - { type: "*.py", condition: "daemon|sla|healer|runtime|matrix|monitor|health", note: "运行时脚本" }
      - { type: "*.yaml", condition: "runtime|boundary|matrix|registry", note: "运行时配置" }
      - { type: "*.plist", note: "launchd 配置" }
    forbidden:
      - { pattern: "*.md", unless: "README", note: "L1 不存人类知识文档" }
      - { pattern: "*constraint*|*protocol*|*pattern*|*ontology*", note: "约束/协议/模式定义属于 L0" }

  # ── L2: 内核三平面层 ──
  L2:
    description: "治理引擎(OMO)·知识引擎(Kairon)·记忆引擎(gBrain)"
    allowed:
      - { type: "*.py", note: "引擎代码" }
      - { type: "*.yaml", condition: "interface|debt|task|phase|state", note: "治理配置" }
      - { type: "*.ts|*.tsx", note: "TypeScript 项目(gBrain)" }
      - { type: "*.json", condition: "package|tsconfig", note: "项目配置" }
      - { type: "*.md", note: "项目文档 (README/AGENTS/CLAUDE/docs/ 等标准项目文档是合法的)" }
    forbidden:
      - { pattern: "*constraint*|*protocol*register*|*topology*", unless: "docs/|README", note: "L0 类的约束/协议/拓扑定义文件属于 L0" }
      - { pattern: "*constraints.yaml", unless: "ssot/constraints/", note: "constraints.yaml 属于 L0 ssot/" }

  # ── L3: 入口桥接层 ──
  L3:
    description: "多入口适配·MCP Server·API Gateway"
    allowed:
      - { type: "*.py", condition: "mcp|server|adapter|gateway|entry|bridge", note: "入口服务" }
      - { type: "*.html|*.css|*.js", note: "Web 界面" }
    forbidden:
      - { pattern: "*engine*|*kernel*|*planner*", note: "引擎逻辑属于 L2" }
      - { pattern: "*daemon*|*runtime*|*matrix*", note: "运行时逻辑属于 L1" }

  # ── L4: 自我层 ──
  L4:
    description: "身份锚·认知框架·宪法·个人文档体系——纯文档·被动"
    allowed:
      - { type: "*.md", note: "Markdown 知识文档" }
      - { type: "*.yaml", note: "L4 治理配置" }
      - { type: "*.py", note: "L4 治理脚本 (只读辅助: brief/health/whoami/bootstrap/onboard/check-*/value-*/coverage/task-status)" }
      - { type: "*.sh", note: "Shell 脚本" }
      - { type: "*.db", note: "CARDS SQLite" }
    forbidden:
      - { pattern: "*compiler*|*constraint-validator*|*mof-*", note: "MOF 工具链属于 L0 (已迁移到 ecos/tools/)" }
      - { pattern: "*mcp-server*|*runtime-mcp*", note: "MCP Server 属于 L3" }
      - { pattern: "*fix-debts*|*ecos-daemon*|*ecos-healer*", note: "运行时工具属于 L1 (已迁移)" }

  # ── I0: 集成织物层 ──
  I0:
    description: "跨层通信总线·服务发现·MCP路由·事件总线"
    allowed:
      - { type: "*.py", condition: "agora|router|proxy|discovery|event|pipeline|registry", note: "Agora 服务" }
      - { type: "*.json", condition: "agora-services|agora-routes|agora-events", note: "服务注册" }
      - { type: "*.yaml", condition: "INTERFACE", note: "接口定义" }
    forbidden:
      - { pattern: "*business*logic*|*domain*model*", note: "业务逻辑属于 L2/L4" }

  # ── X1-X4: 治理维度 ──
  X_governance:
    description: "X1审计·X2保鲜·X3价值·X4一致性——横向切面"
    allowed:
      - { type: "*.py", condition: "check-|audit|freshness|value|coverage|consistency|cards-state", note: "治理脚本" }
      - { type: "*.yaml", condition: "value-stack|constraint|coverage", note: "治理配置" }
    forbidden:
      - { pattern: "*engine*|*kernel*", note: "治理脚本不包含引擎逻辑" }

# ══════════════════════════════════════════
# 违规严重度
# ══════════════════════════════════════════
severity_rules:
  - { condition: "Python 脚本在 L4 且不在 allowed 列表中", severity: "high", action: "标记为应下沉到 L0/L1/L3" }
  - { condition: "YAML 约束/协议/拓扑在 L4 且不在 L0", severity: "high", action: "复制到 L0 + L4 保留指针" }
  - { condition: "MCP Server 在 L4", severity: "high", action: "迁移到 L3 cockpit/" }
  - { condition: ".md 知识文档在 L0-L3", severity: "medium", action: "检查是否应为 L4 知识" }
  - { condition: "L0 中有 .db/.sqlite", severity: "medium", action: "检查是否为 L1 运行时数据" }

# ══════════════════════════════════════════
# 定期扫描配置
# ══════════════════════════════════════════
scan_schedule:
  frequency: "every 6 hours (daemon cycle)"
  auto_create_cards: true
  card_priority: "P2"
  card_domain: "meta"
  report_output: "health-digest.md (追加 '层合规' 章节)"

meta:
  maintained_by: "mof-enforce"
  next_review: "2026-07-06"
