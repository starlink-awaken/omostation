# eCOS v5 Pattern Registry (SSOT)
# ==================================
# Defines the architectural patterns that are allowed or mandated across the system.
# Enforced by ecos-architecture-validator at CI/CD time or by L0 runtime hooks.

version: "1.0.0"
updated_at: "2026-06-06"

patterns:
  - id: PTN-BOS-ROUTING
    name: "BOS URI Service Mesh Routing"
    description: "All inter-subsystem (cross-layer) calls MUST be routed via I0/Agora using bos:// URIs."
    rules:
      - "ast_deny_direct_http_to_internal_ports"
      - "enforce_httpx_usage_with_agora_base_url"
    tags: ["routing", "mandatory"]

  - id: PTN-IMMUTABLE-AUDIT
    name: "Immutable Audit Trail via SSB"
    description: "High-risk state transitions or security interceptions MUST append to the L0 ecos-ssb log."
    rules:
      - "require_ssb_logging_on_state_machine_transition"
      - "require_ssb_logging_on_validation_failure"
    tags: ["security", "audit", "mandatory"]

  - id: PTN-CODEGRAPH-BLAST-RADIUS
    name: "Pre-execution Blast Radius Check"
    description: "Agents modifying code MUST query codegraph to understand impact before committing changes."
    rules:
      - "agent_runtime_hook: assert_codegraph_impact_called"
    tags: ["safety", "workflow"]

  - id: PTN-CONTRACT-DISPATCH
    name: "OMO Contract-Based Dispatch"
    description: "Tasks MUST be dispatched via omo-cli (Micro-DAG) and reclaimed with proper reviews. No ad-hoc running."
    rules:
      - "enforce_workspace_runs_structure"
    tags: ["governance", "mandatory"]

  # ── Phase 7.3 新增: 织星架构核心模式 ──
  - id: PTN-SSOT-CASCADE
    name: "SSOT Cascade Pattern"
    description: "Every fact has exactly one authoritative location. Upper layers define, lower layers inherit via pointers — never duplicate."
    rules:
      - "ssot_declared_in_claude_md_section_0"
      - "cross_domain_pointers_must_reference_ssot_not_copy"
      - "state_md_is_pointer_not_source"
      - "generated_views_must_declare_source"
    tags: ["consistency", "X4", "mandatory", "织星架构"]
    known_uses:
      - "CLAUDE.md inheritance chain (L0 Kernel → L1/L2)"
      - "CARDS SQLite → CARDS/*.md (auto-generated views)"
      - "领域知识库/实体 SSOT → 域 ENTITIES.md (domain attributes only)"
      - "DASHBOARD.md aggregation from domain STATE.md files"

  - id: PTN-PARENT-POINTER
    name: "Unidirectional Parent Pointer Pattern"
    description: "Use single child→parent pointer instead of bidirectional parent↔children maintenance. Query children by reverse-searching parent field."
    rules:
      - "card_relation_must_be_parent_only"
      - "agent_write_should_not_require_parent_update"
    tags: ["data-model", "agent-efficiency", "recommended", "织星架构"]
    known_uses:
      - "CARDS ID→TASK→DEL chain (parent field only)"
      - "OMO debt chain (debt.parent → source task)"
      - "CLAUDE.md inheritance (child declares 'inherits from L0 Kernel')"

  - id: PTN-MOF-SELF-REFERENTIAL
    name: "MOF Self-Referential Closure Pattern"
    description: "The meta-model (M2) itself is an instance of the meta-meta-model (M3). L0 governs itself through the same mechanisms it provides."
    rules:
      - "l0_m1_nodes_must_pass_mof_validate"
      - "l0_changes_must_be_tracked_in_cards"
      - "l0_topology_self_describes"
    tags: ["meta", "X4", "mandatory", "织星架构"]
    known_uses:
      - "M3-元元模型 defines types that describe M2-元模型 itself"
      - "L0-constraints.yaml validated by ecos-constraint-validator which is itself registered in L0"
      - "mof-audit audits the MOF nodes directory as M1 nodes"
