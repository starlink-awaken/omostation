# eCOS v5 Topology Registry (SSOT)
# ==================================
# Defines the physical bounds and allowed import paths for the 5+4+1 architecture.
# Enforced by ecos-architecture-validator

version: "1.0.0"
updated_at: "2026-06-06"

layers:
  # ── L0: Protocol Weave ──
  - id: L0
    name: "Protocol Weave"
    packages: 
      - ecos
      - ssot
    submodules:
      mof:
        description: "织星 MOF 元模型治理引擎 — M3/M2/M1/M0 全栈类型系统"
        assets:
          - "mof/M3-元元模型.yaml   (16 Element类型·12 Relation类型)"
          - "mof/M2-元模型.yaml     (8要素+Artifact·状态机·约束)"
          - "mof/M2-本体映射.yaml   (等价·泛化·依赖·推导规则)"
          - "mof/nodes/             (59 M1节点声明)"
      tools:
        - "tools/mof-scan.py       (M1自动扫描器)"
        - "tools/mof-validate.py   (M1↔M2校验器)"
        - "tools/mof-audit.py      (M1↔M0漂移审计)"
        - "tools/mof-derive.py     (本体推理引擎)"
    allowed_dependencies: [] # The absolute bottom, cannot depend on higher layers
    description: "Protocol specs, registry, versioning, meta-model constraints. 织星 MOF 提供完整的模型驱动治理基座。"

  # ── L1: Runtime Matrix ──
  - id: L1
    name: "Runtime Matrix"
    packages: 
      - runtime
      - agent-runtime
    allowed_dependencies: [L0]
    description: "Sandbox, Service Registry, Health monitoring, Matrix Engine."

  # ── L2: Kernel Tri-Plane ──
  - id: L2
    name: "Kernel Tri-Plane"
    packages:
      - omo
      - gbrain
      - metaos
      - eidos
      - minerva
      - ontoderive
      - codeanalyze
      - protocols_layer
      - symphony_protocol
      - sharedbrain_bridge
    allowed_dependencies: [L0, L1]
    description: "Knowledge Engine, Governance Plane, Orchestration."

  # ── L3: Entry Bridge ──
  - id: L3
    name: "Entry Bridge Matrix"
    packages:
      - cockpit
      - hermes-console
      - llm_gateway_kernel
    allowed_dependencies: [L0, L1, L2]
    description: "Unifies access from various external agents."

  # ── I0: Integration Mesh ──
  - id: I0
    name: "Integration Service Mesh"
    packages:
      - agora
    allowed_dependencies: [L0] # Agora acts as a proxy, shouldn't import business logic
    description: "BOS URI router, dynamic reverse proxy."
