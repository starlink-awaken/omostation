domain: system
description: "System infrastructure domain (services, configs, deployments, health)"
authority: local
owner: "governance"
write_policy: "admin_only"
schema_version: "0.2.0"

metadata:
  domain_id: "system.infrastructure"
  version: "0.1.0"
  maintainer: "@self"
  source: "Docker, K8s, environment configs"
  sync_mode: "pull"

schemas:
  service:
    description: "A running service or daemon in the stack"
    fields:
      name:
        type: string
        description: "Service name"
        required: true
        unique: true
      type:
        type: string
        description: "Service category"
        enum: ["api", "worker", "database", "queue", "proxy", "agent", "adapter"]
        required: true
      host:
        type: string
        description: "Host or endpoint address"
      port:
        type: integer
        description: "Primary port number"
      status:
        type: string
        description: "Operational status"
        enum: ["running", "stopped", "degraded", "provisioning"]
        default: "running"
      health_endpoint:
        type: string
        description: "Health check URL path"
        default: "/health"
      dependencies:
        type: array
        description: "Other services this depends on"
        items:
          type: string

  config:
    description: "A configuration entry, secret, or environment variable"
    fields:
      key:
        type: string
        description: "Configuration key (dot-notation supported)"
        required: true
        unique: true
      value:
        type: string
        description: "Configuration value (may be a templated reference)"
      scope:
        type: string
        description: "Scope this config applies to"
        enum: ["global", "service", "domain", "user"]
        default: "global"
      source:
        type: string
        description: "Origin (env, file, vault, inline)"
        default: "env"
      sensitive:
        type: boolean
        description: "Whether this value is a secret"
        default: false
      updated:
        type: string
        description: "ISO 8601 last-updated timestamp"

conflict_resolution:
  strategy: "last_write_wins"
  authority: local
  precedence:
    - local

data_flow:
  inbound:
    direction: pull
    schedule: "every 1 minute"
    via: "eidos/adapters/system_ingest.py"
  outbound:
    direction: push
    via: "eidos/adapters/system_to_bos.py"
