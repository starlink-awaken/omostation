domain: data
description: "Data management domain (vaults, backups, sync status, lineage)"
authority: local
owner: "@self"
write_policy: "admin_only"
schema_version: "0.1.0"

metadata:
  domain_id: "data.management"
  version: "0.1.0"
  maintainer: "@self"
  source: "Obsidian vault tracking, git repos, S3 buckets"
  sync_mode: "pull"

schemas:
  vault:
    description: "A data vault, repository, or storage root"
    fields:
      name:
        type: string
        description: "Vault name"
        required: true
        unique: true
      path:
        type: string
        description: "Local or remote path"
        required: true
      type:
        type: string
        description: "Storage type"
        enum: ["obsidian", "git", "s3", "local", "gdrive", "icloud"]
        required: true
      size_mb:
        type: integer
        description: "Approximate size in MB"
      last_synced:
        type: string
        description: "ISO 8601 last sync timestamp"
      status:
        type: string
        description: "Sync health status"
        enum: ["synced", "pending", "conflict", "error", "uninitialized"]
        default: "pending"

  sync_status:
    description: "A sync operation record between sources"
    fields:
      id:
        type: string
        description: "Unique sync operation ID"
        required: true
        unique: true
      source_vault:
        type: string
        description: "Source vault name"
        required: true
      target_vault:
        type: string
        description: "Target vault name"
        required: true
      started_at:
        type: string
        description: "ISO 8601 start timestamp"
      completed_at:
        type: string
        description: "ISO 8601 completion timestamp"
      files_total:
        type: integer
        description: "Total files scanned"
      files_changed:
        type: integer
        description: "Files actually synced"
      outcome:
        type: string
        description: "Result of the sync"
        enum: ["success", "partial", "failed", "cancelled"]
        default: "success"

conflict_resolution:
  strategy: "authoritative_wins"

data_flow:
  inbound:
    direction: pull
    schedule: "every 30 minutes"
    via: "eidos/adapters/data_ingest.py"
  outbound:
    direction: push
    via: "eidos/adapters/data_to_bos.py"
