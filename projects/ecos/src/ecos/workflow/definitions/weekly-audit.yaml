# Workflow: 每周审计
name: weekly-audit
description: "每周全量审计——KEMS校验+漂移检测+引用检查+BOS健康+审计报告"
trigger: "bos://_workflow/weekly-audit"
schedule: "weekly monday 09:00"

steps:
  - name: domain-validate-all
    action: domain_validate_all
    description: "全量document域KEMS结构校验"

  - name: domain-audit
    action: domain_audit
    description: "注册表vs文件系统漂移检测"

  - name: check-references
    action: domain_check_refs
    description: "跨域路径引用可解析性检查"

  - name: bos-validate
    action: bos_validate
    description: "BOS URI全量健康检查"

  - name: routes-update
    action: domain_routes
    description: "更新BOS路由缓存"

  - name: sync-index
    action: domain_sync
    description: "同步DOMAIN-INDEX.md"

  - name: health-check
    action: health_check
    description: "9项全系统健康检查"
    on_failure: continue
