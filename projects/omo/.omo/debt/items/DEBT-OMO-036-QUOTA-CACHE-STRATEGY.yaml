id: DEBT-OMO-036-QUOTA-CACHE-STRATEGY
title: 实现基于 codexbar/models 的异步计费与配额缓存策略
description: |
  解决大模型高并发或高频请求时，每次都调用命令行工具 (codexbar / models) 获取配额和价格导致的性能瓶颈。
  架构方案：
  1. 缓存机制：增加内存或 Redis 缓存，每 5 分钟（可配置）异步拉取一次配额阈值和最新定价。
  2. 乐观记账：网关实时扣减缓存中的预估预算，后台异步线程（如 apscheduler）负责将账单推送到远端或本地数据库进行对齐（True Up）。
  3. 熔断保护：当缓存中估算剩余额度 < 5% 时，强制降级为每次请求实时查验。
priority: P1
severity: high
