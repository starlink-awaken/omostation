id: DEBT-OMO-032-ASYNC-GOVERNANCE
title: 将 Git Hook 同步萃取改造为基于 OMO Task 的异步风控审批流
description: |
  目前的 mof-extract 萃取机制是直接通过 post-commit 钩子在后台异步触发，存在无法拦截语义错误以及缺乏大模型风控的局限性。
  目标是将其重构为真正的 Event-Driven Governance：
  1. Git Hook 仅抛出 OMO-DEBT 任务卡片（omo task create）。
  2. 交由现有的 omo worker 或 runtime/scheduler 常驻轮询。
  3. L3 Agent 领取任务后，调用 LLM 评估 L4 文档变更的架构风险。
  4. 如果无风险则自动生成 L0 节点，高风险则挂起等待人类在 cockpit 审批。
priority: P2
