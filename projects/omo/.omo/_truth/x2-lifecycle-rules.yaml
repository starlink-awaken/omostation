version: 1
updated: "2026-06-05"
rules:
  - id: "X2-FRESH-001"
    name: "服务保鲜"
    category: "freshness"
    interval_hours: 720  # 30 days
    description: "长期运行服务每30天验证一次健康状态"
    action: "health-scan detects failure → create DEBT with x2_freshness=now"
    triggers:
      - "cron:ecos-health-scan"
    verification: "DEBT items with x2_freshness < 30d ago should be reviewed"
  - id: "X2-FRESH-002"
    name: "知识保鲜"
    category: "freshness"
    interval_hours: 168  # 7 days
    description: "活跃知识资产每7天检查新鲜度"
    action: "KOS freshness_check.sh flagged items → create DEBT"
    triggers:
      - "kos freshnes_check script"
    verification: "DEBT items tagged Knowledge tier have recent x2_freshness"
  - id: "X2-LIFECYCLE-001"
    name: "闲置退役"
    category: "lifecycle"
    interval_hours: 0
    description: "连续30天无变更的服务标记为观察期"
    action: "service idle 7d → X2 warning debt; 30d → lifecycle downgrade"
    triggers:
      - "runtime_matrix health scan"
    verification: "DEBT with x2_freshness > 30d old triggers auto-downgrade proposal"
  - id: "X2-LIFECYCLE-002"
    name: "债务半衰期"
    category: "lifecycle"
    interval_hours: 0
    description: "未解决的 DEBT 按 X3 半衰期衰减权重"
    action: "compute_weight() applies half-life decay based on opened_at and x3_tier"
    triggers:
      - "omo debt weight computation"
    verification: "older debts have lower computed weight vs same-tier newer debts"
