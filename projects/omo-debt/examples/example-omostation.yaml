title: kairon 包测试覆盖率不足
description: |
  kairon monorepo (17 个包) 的测试覆盖率不均衡：
  
  覆盖率现状：
  - 核心包 (agora, ontoderive): 85-90% ✅
  - 工具包 (wksp, kos): 60-70% ⚠️
  - 新包 (sophia, minerva): 40-50% ❌
  
  影响：
  1. 重构风险高（缺少回归测试）
  2. Bug 容易进入生产
  3. 代码质量难以保证
  
  根本原因：
  - 快速开发期间测试滞后
  - 缺少测试覆盖率 CI 门禁

