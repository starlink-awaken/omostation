# Agora BOS 限流 + 缓存 TTL 配置 (agora-bos-rates.yaml)
# 配置文件支持热加载: ConfigWatcher 每 5s 检查变化
# 手动触发: kill -SIGUSR1 <agora-pid>
#
# cache_ttl: 缓存有效秒数 (默认 30s, 无配置时回退)
#   高频访问/稳定数据 → 较长的 TTL (60-120s)
#   实时查询/易变数据 → 较短的 TTL (5-15s)

routes:
  # Memory 域 — 搜索/查询稳定, 缓存久一点
  - prefix: "bos://memory/kos/"
    qps: 20
    cache_ttl: 60
  - prefix: "bos://memory/kronos/"
    qps: 10
    cache_ttl: 30

  # Analysis 域 — 研究结果可缓存, 但实时性要求高
  - prefix: "bos://analysis/minerva/"
    qps: 5
    cache_ttl: 120
  - prefix: "bos://analysis/code/"
    qps: 10
    cache_ttl: 15
  - prefix: "bos://analysis/iris/"
    qps: 10
    cache_ttl: 30

  # Governance 域 — 审计结果短时缓存
  - prefix: "bos://governance/omo/"
    qps: 10
    cache_ttl: 15
  - prefix: "bos://governance/metaos/"
    qps: 5
    cache_ttl: 30

  # Persona 域 — 个人信息相对稳定
  - prefix: "bos://persona/"
    qps: 10
    cache_ttl: 60

  # Forge 域 — 工具列表可缓存, 执行结果不缓存 (默认 30s 不影响)
  - prefix: "bos://forge/"
    qps: 10
    cache_ttl: 30

  # Ecos workflow 域 (M1 自动注册) — 实时流程不缓存
  - prefix: "bos://ecos/"
    qps: 5
    cache_ttl: 10
