# MCP Service Registry — Workspace 统一服务发现
# Agora 自动发现所有 workspace 内的 MCP 服务

services:
  - name: minerva-deep-research
    description: 深度研究引擎 — 5 Super Tools (Dropbox Dash pattern)
    mcp_url: "http://minerva:7421/sse"
    health_url: "http://minerva:8765/health"
    tags: [research, knowledge, llm]
    tools:
      - research_now: {description: "立即执行研究", args: {query: string, level: string}}
      - research_schedule: {description: "定时研究", args: {query: string, cron: string}}
      - research_watch: {description: "主题监控", args: {topic: string, interval_m: int}}
      - knowledge_search: {description: "搜索知识库", args: {query: string, top_k: int}}
      - knowledge_ingest: {description: "摄入知识", args: {content: string, source: string}}

  - name: ontoderive-engine
    description: 事实驱动知识工程引擎 — ToolForge + 推导 + 规约检查
    mcp_url: "stdio://ontoderive"
    health_url: "cli://ontoderive check"
    tags: [knowledge-engineering, ontology, derivation]
    tools:
      - toolforge_match: {description: "思维工具匹配", args: {goal: string, context: string}}
      - derive: {description: "事实推导", args: {project: string, goal: string, with_tools: bool}}
      - check: {description: "规约检查", args: {project: string}}

  - name: sophia-paradigm-engine
    description: 符号化研究范式编译器 — 状态机形式化
    mcp_url: "stdio://sophia"
    tags: [paradigm, state-machine, compiler]
    tools:
      - compile_paradigm: {description: "编译研究范式", args: {spec: dict}}
      - list_paradigms: {description: "列出可用范式", args: {}}

  - name: agentmesh-gateway
    description: 多Agent网关调度器
    mcp_url: "http://agentmesh:3000"
    health_url: "http://agentmesh:3000/health"
    tags: [agent, gateway, scheduler]
    tools:
      - list_agents: {description: "列出Agent", args: {}}
      - run_agent: {description: "运行Agent", args: {agent_id: string, task: string}}

  - name: hermes-ops
    description: 统一运维中心 — 20+ MCP 工具：日志/监控/事件/告警/指标/链路追踪/事故管理/安全扫描
    mcp_url: "stdio://hermes-ops"
    health_url: "cli://hermes-ops health"
    tags: [operations, monitoring, logging, security, incidents]
    tools:
      - ops_log: {description: "写日志", args: {level: string, source: string, message: string}}
      - ops_logs: {description: "查询日志", args: {source: string, level: string, limit: int}}
      - ops_health: {description: "检查服务健康", args: {service: string}}
      - ops_status: {description: "整体运维状态概览", args: {}}
      - ops_event: {description: "发射运维事件", args: {event_type: string, payload: string}}
      - ops_events: {description: "查询事件历史", args: {event_type: string, limit: int}}
      - ops_alert: {description: "触发告警", args: {severity: string, message: string}}
      - ops_alerts: {description: "查询告警历史", args: {severity: string, limit: int}}
      - ops_alert_rules: {description: "列出告警规则", args: {}}
      - ops_report: {description: "生成报告", args: {report_type: string}}
      - ops_reports_list: {description: "列出已生成报告", args: {}}
      - ops_metrics: {description: "查询系统指标", args: {limit: int}}
      - ops_metrics_collect: {description: "采集并存储指标快照", args: {}}
      - ops_capacity: {description: "容量检查（磁盘/内存）", args: {}}
      - ops_trace_link: {description: "关联流水线追踪到协作任务", args: {pipeline_id: string, collab_task_id: string}}
      - ops_trace: {description: "查询追踪（含完整上下文）", args: {pipeline_id: string, collab_task_id: string}}
      - ops_incident_declare: {description: "声明事故", args: {severity: string, title: string, description: string}}
      - ops_incidents: {description: "列出事故", args: {status: string}}
      - ops_incident_resolve: {description: "解决事故", args: {incident_id: int}}
      - ops_security_scan: {description: "扫描凭据泄露", args: {}}
      - ops_audit_deps: {description: "审计依赖新鲜度", args: {}}

  - name: markitdown-converter
    description: Microsoft MarkItDown — 文件和 Office 文档 → Markdown
    mcp_url: "stdio://markitdown"
    tags: [markdown, document-conversion, pdf, office]
    tools:
      - markitdown_list_supported: {description: "列出支持的文件格式", args: {}}
      - markitdown_convert_file: {description: "转换文件为 Markdown", args: {file_path: string}}
      - markitdown_convert_stdin: {description: "从标准输入转换", args: {file_path: string}}

  - name: sharedbrain-runtime-kernel
    description: B-OS v10.0.0 运行时内核 — 19 MCP 工具：记忆/执行/经济/免疫/门控/监控/日志/Voice/身份/自愈/代谢
    mcp_url: "http://sharedbrain:7421/sse"
    health_url: "http://sharedbrain:8080/health/simple"
    tags: [runtime, kernel, mcp, system-orchestration]
    tools:
      - memory_search: {description: "D-Memory 语义搜索", args: {query: string, top_k: int, filter: string}}
      - memory_store: {description: "D-Memory 存储", args: {key: string, value: string, ttl: int}}
      - task_submit: {description: "D-Execution 提交任务", args: {task_type: string, params: dict}}
      - task_status: {description: "D-Execution 任务状态", args: {task_id: string}}
      - economy_balance: {description: "D-Economy 余额查询", args: {agent_id: string}}
      - economy_consume: {description: "D-Economy 消费", args: {agent_id: string, units: int}}
      - immunity_audit: {description: "D-Immunity 语义审计", args: {content: string, context: string}}
      - immunity_health: {description: "D-Immunity 系统免疫状态", args: {}}
      - gateway_health: {description: "D-Gateway 健康检查", args: {service: string}}
      - monitoring_state: {description: "D-Monitoring 系统状态", args: {scope: string}}
      - monitorin_pulse: {description: "D-Monitoring 心跳", args: {source: string}}
      - logos_docs: {description: "D-Logos 文档查询", args: {query: string}}
      - voice_stt: {description: "D-Voice 语音转文字", args: {audio_path: string, lang: string}}
      - voice_tts: {description: "D-Voice 文字转语音", args: {text: string, voice: string}}
      - genesis_health: {description: "D-Genesis 器官自愈健康", args: {organ: string}}
      - genesis_trigger: {description: "D-Genesis 触发自愈", args: {organ: string, reason: string}}
      - identity_resolve: {description: "identity_bridge 身份解析", args: {agent_role: string}}
      - identity_register: {description: "identity_bridge 注册身份", args: {agent_id: string, role: string}}
      - identity_list: {description: "identity_bridge 列出身份", args: {}}
      - excretion_cleanup: {description: "D-Excretion 代谢清理", args: {target: string, older_than_h: int}}

pipelines:
  match-derive:
    description: 工具匹配 → 事实推导
    stages:
      - {service: ontoderive-engine, tool: toolforge_match}
      - {service: ontoderive-engine, tool: derive}

  research-derive:
    description: 深度研究 → 事实推导
    stages:
      - {service: minerva-deep-research, tool: research_now}
      - {service: ontoderive-engine, tool: derive}

  derive-check:
    description: 事实推导 → 规约检查
    stages:
      - {service: ontoderive-engine, tool: derive}
      - {service: ontoderive-engine, tool: check}

  full-pipeline:
    description: "全流程: 匹配 → 推导 → 检查"
    stages:
      - {service: ontoderive-engine, tool: toolforge_match}
      - {service: ontoderive-engine, tool: derive}
      - {service: ontoderive-engine, tool: check}
