site_name: AetherForge
site_description: 你的个人 AI 算力中心 — LLM 网关 + 算力网格 + 多 Agent 编排
site_url: https://aetherforge.dev
repo_url: https://github.com/aetherforge/aetherforge
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        scheme: slate
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        scheme: default
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - content.code.copy
    - content.tabs.link

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aetherforge/aetherforge

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - 使用指南:
    - LLM 调用 (Gateway): guide/gateway.md
    - 算力网格 (Mesh): guide/mesh.md
    - 多 Agent (Swarm): guide/swarm.md
  - API 参考: api.md
  - 架构: architecture.md
  - 对比: comparison.md
  - 开发: development.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src", "packages/gateway/src", "packages/mesh/src", "packages/swarm/src"]

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2026 AetherForge
