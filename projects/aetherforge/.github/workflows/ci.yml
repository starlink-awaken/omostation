name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check packages/ src/ tests/
      - name: Contract Gatekeeper
        run: python scripts/contract_gatekeeper.py packages/ src/ tests/

      - name: Gateway tests
        run: uv run python3 packages/gateway/tests/test_gateway.py

      - name: E2E tests
        run: uv run python3 tests/test_e2e.py

      - name: Supplemental tests
        run: uv run python3 tests/test_supplemental.py

      - name: Benchmark (quick)
        run: uv run python3 tests/benchmark.py --json

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Build
        run: uv build
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
