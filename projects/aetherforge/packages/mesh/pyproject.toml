[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aetherforge-mesh"
version = "0.1.0"
description = "AetherForge Mesh — 算力网格 (拓扑发现/资源池/调度扩展/Worker管理)"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["compute", "mesh", "scheduler", "worker", "aetherforge"]

dependencies = [
    "aetherforge-gateway",
    "pyyaml>=6.0",
    "httpx>=0.27",
    "pydantic>=2.0",
    "fastmcp>=3.4",
    "structlog>=24.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
mesh = "compute_mesh.api.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/compute_mesh"]
