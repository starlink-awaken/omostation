apiVersion: v1
kind: Service
metadata:
  name: {{ include "aetherforge.fullname" . }}
  labels:
    {{- include "aetherforge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: mcp
      protocol: TCP
      name: mcp
  selector:
    {{- include "aetherforge.selectorLabels" . | nindent 4 }}
