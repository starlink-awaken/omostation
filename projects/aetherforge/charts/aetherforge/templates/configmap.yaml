apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aetherforge.fullname" . }}-config
  labels:
    {{- include "aetherforge.labels" . | nindent 4 }}
data:
  aetherforge.yaml: |
    gateway:
      enabled: true
      auto_detect: {{ .Values.gateway.autoDetect }}
    rate_limiter:
      enabled: {{ .Values.rateLimiter.enabled }}
      default_tpm: {{ .Values.rateLimiter.defaultTpm }}
      default_rpm: {{ .Values.rateLimiter.defaultRpm }}
    topology:
      enabled: true
      scan_on_start: {{ .Values.topology.scanOnStart }}
      health_check_interval: {{ .Values.topology.healthCheckInterval }}
      probe_local: {{ .Values.topology.probeLocal }}
      detect_cloud: {{ .Values.topology.detectCloud }}
    pool:
      workers_per_node: 2
      auto_scale: true
    metrics:
      enabled: {{ .Values.monitoring.enabled }}
    logging:
      level: INFO
