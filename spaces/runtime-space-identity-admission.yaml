apiVersion: omo/v1
kind: SpaceIdentityAdmission
id: runtime-space-identity-admission
space_ref: spaces/runtime-space.yaml
identity_anchor: actor_space_membership
actors:
  - id: automation-agent
    actor_type: agent
memberships:
  - id: runtime-space-observer-membership
    actor_ref: automation-agent
    space_ref: spaces/runtime-space.yaml
    roles:
      - runtime-observer
capability_bindings:
  - id: runtime-observer-binding
    membership_ref: runtime-space-observer-membership
    capabilities:
      - runtime.observe
admission:
  decision_scope: cross_root_action
  subject_binding: membership
  default_mode: explicit_grant
