  cockpit-ui:
    layer: "L3"
    stack: "TypeScript (Vite, React)"
    role: "Web 控制台 UI (作为 cockpit 前端表现层挂载至/)"
    note: "非 git 子模块，直接在 projects/ 下，由 cockpit 托管"

  toolbox:
