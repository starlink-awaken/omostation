# docs/project-registry.yaml — 项目元数据 SSOT
#
# 本文件是所有项目元数据的唯一读源 (Single Source of Truth)。
# 所有 markdown 文档 (CLAUDE.md / AGENTS.md / README.md / LAYER-INDEX.md 等)
# 必须引用本文件，不得硬编码以下任何值。
#
# 更新方式: 修改实际代码后，同步更新本文件。CI 门禁 (bin/ssot/doc-ssot-lint.py) 会检测
# markdown 中的硬编码数字是否与本注册表冲突。
#
# drift 检测: python3 bin/mof/gen-project-registry.py (registry version/python vs pyproject.toml)
# 自动修复: python3 bin/mof/gen-project-registry.py --write (修复 version/python drift)

workspace:
  architecture: "5+4+1+1"
  ecos_version: "v6"
  total_submodules: 17          # git submodule status | wc -l
  total_projects: 17            # ls projects/*/ | wc -l (含 cockpit-ui 非子模块)

layers:
  L0: "协议层 (ecos)"
  L1: "运行时 (runtime)"
  L2: "引擎面 (kairon / gbrain / omo / metaos)"
  L3: "入口层 (cockpit 控制面; cockpit-ui 表现面, layer=L3)"
  L4: "自我层 (l4-kernel)"
  I0: "织层 (agora)"
  M0: "横切框架 (model-driven)"
  X:  "横切扩展 (aetherforge / c2g / bus-foundation / omo-debt / observability / family-hub)"

projects:
  # mesh-router 不是独立 git 仓 — 实现 = bin/gac/gac-mesh-router.py (HTTP server on port 7437)
  # P76 Phase 7.4 决议: 标 implemented-in-bin, 移除 submodule init 期望
  mesh-router:
    layer: "L0"
    stack: "Python (http/urllib)"
    role: "omlx 算力网格智能路由代理"
    version: "1.0.0"
    port: 7437
    status: "implemented-in-bin"
    physical_location: "bin/gac/gac-mesh-router.py"
    port_registry_ref: "protocols/port-registry.yaml::7437"
    note: "无独立仓. 历史 .gitmodules 期望已废弃 (Phase 7.4 决议). 见 ADR-0162 P76 Phase 7."

  # ── Python projects ──
  agora:
    layer: "I0"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "3.0.0"
    role: "MCP Hub · BOS URI 路由"
    bos_services: 114             # grep -c 'uri: "bos://' projects/agora/etc/bos-services.yaml
    src_dir: "src/agora/"

  kairon:
    layer: "L2"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "1.0.0"
    role: "知识引擎 monorepo"
    packages: 16                 # ls packages/*/ | wc -l
    package_list:
      - codeanalyze
      - core-models
      - eidos
      - forge
      - health-profile
      - iris
      - kairon-lib-events
      - kairon-observability
      - kairon-pipeline
      - kairon-plugin-sdk
      - kairon-utils
      - kos
      - kronos
      - minerva
      - ontoderive
      - sophia
    kos_details:
      role: "知识检索系统 (KOS)"
      rest_api: "http://localhost:8766"
      endpoints: 9
      modules:
        - graphrag_engine (LLM推理)
        - ontology/auto_builder (自动本体)
        - search/ranker (排序学习)
        - monitoring (可观测性)
        - agent/client (Agent SDK)
        - web/app (REST API)
      mcp_tools: 25
      embedding_model: "BAAI/bge-small-zh-v1.5"
      vector_dim: 512

  gbrain:
    layer: "L2"
    stack: "TypeScript (bun)"
    role: "Postgres 知识数据库"
    src_dir: "src/"

  omo:
    layer: "L2"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "uv_build"
    version: "1.0.0"
    role: "治理中枢 · Agent OS 内核"
    src_files: 173               # find src/omo -name "*.py" | wc -l
    cli_subcommands: 39          # grep -c 'args\[0\]' cli.py
    mcp_tools: 19                # grep -c '@mcp.tool()' mcp_server.py

  metaos:
    layer: "L2"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "1.0.0"
    role: "编排引擎 · 决策门控/免疫/路由"

  runtime:
    layer: "L1"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "1.0.0"
    role: "运行时 · Matrix/Scheduler/KEI 沙箱"

  ecos:
    layer: "L0"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "0.8.0"
    role: "SSB 签名链 + MOF 元模型 + L0 约束"
    mof_tools: 34                # find ssot/tools -name "*.py" ! -name "__init__" ! -name "_*" | wc -l
    m1_yaml: 1196                # find mof/m1 -name "*.yaml" | wc -l
    m2_yaml: 55                  # find mof/m2 -name "*.yaml" | wc -l
    m1_domains: 28               # find mof/m1/domain -name "*.yaml" | wc -l
    governance_modules: 15       # find l0/governance -name "*.py" ! -name "__init__" | wc -l

  cockpit:
    layer: "L3"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "0.4.0"
    role: "统一入口 (CLI + MCP + Web)"
    cli_entry: "cockpit"
    coverage:
      - "agora (BOS 网关)"
      - "model-driven (生命周期 / OKR)"
      - "gbrain (Postgres 知识库)"
      - "kairon (知识引擎 monorepo)"
      - "bus (Omni-Bus 三平面)"
      - "observe (Langfuse 可观测性)"
      - "family-hub (家庭数字枢纽)"
      - "mesh (算力网格路由)"
      - "bos capability (toolbox 外部能力)"

  l4-kernel:
    layer: "L4"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "1.0.0"
    role: "自我层管理面 · 域统一注册 · KEMS"
    domains: 28                 # grep -c "Domain(" registry.py

  model-driven:
    layer: "M0"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "1.0.0"
    role: "生命周期横切框架 · M3→M2→M1 桥接"

  aetherforge:
    layer: "X"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "1.0.0"
    role: "能力与算力框架 (gateway/mesh/swarm)"

  c2g:
    layer: "X"
    stack: "Python (uv)"
    python: ">=3.13"
    build_backend: "uv_build"
    version: "0.1.0"
    role: "战略需求引擎 (V2P → C2G)"

  bus-foundation:
    layer: "X"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "0.3.0"
    role: "Omni-Bus (Data/Event/Control)"

  omo-debt:
    layer: "L2"
    stack: "Python (uv, pytest)"
    python: ">=3.13"
    build_backend: "hatchling"
    version: "1.0.0"
    role: "技术债务评分 CLI"

  observability:
    layer: "X"
