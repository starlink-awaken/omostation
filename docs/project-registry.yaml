# ── Cross-project facts ──
bos:
  service_count: 114            # grep -c 'uri: "bos://' projects/agora/etc/bos-services.yaml
  domains:
    primary: ["memory", "governance", "analysis", "persona", "capability"]
    extended: ["meta", "omo", "swarm", "system", "toolbox"]

gac:
  rules_count: 96                # grep -c '    - id: CR-' .omo/_truth/registry/governance-checks.yaml (gac-validate 报 146 含 X1-X4 legacy_index)

# ── Archived projects (historical reference) ──
archived:
  - name: "compute-mesh"
    merged_into: "aetherforge/packages/mesh"
  - name: "swarm-engine"
    merged_into: "aetherforge/packages/swarm"
  - name: "hermes-console"
    merged_into: "cockpit-ui"
  - name: "agora-dashboard"
    merged_into: "cockpit HTTP :8090"

# ── Submodule Branch Policy (GaC #39) ──
# stable:  子模块在 main 上, 跟踪上游发布
# feature: 子模块在功能分支上, 允许偏离 main
# tolerance_days: 超出此天数无更新 → warning (尚未强制)
submodule_policy:
  stable:
    - projects/bus-foundation
    - projects/kairon
    - projects/l4-kernel
    - projects/omo-debt
  feature:
    - projects/cockpit       # codex/cockpit-instance-contract
    - projects/metaos        # work/adr-0181-scheme-c
    - projects/aetherforge   # r94-otel-linkage
    - projects/agora         # work/add-pydantic-dep
  tracking:                   # detached HEAD — 由 CI/bot 保持
    - projects/ecos
    - projects/runtime
    - scripts
    - projects/omo
  dormant:                    # 低活跃, 不频繁更新
    - projects/family-hub
    - projects/model-driven
    - projects/observability
    - projects/gbrain
  tolerance_days: 30

